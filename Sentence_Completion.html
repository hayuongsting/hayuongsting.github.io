<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Entrance Exam - Full Collection</title>
    <style>
        :root {
            --primary-bg: #1a1a2e; --card-bg: rgba(255, 255, 255, 0.15);
            --correct-color: #4cd137; --wrong-color: #e84118;
            --text-color: #ffffff; --accent-color: #fbc531;
            --nav-bg: rgba(0, 0, 0, 0.3);
        }
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: url('assets/Background.svg') no-repeat center center fixed;
            background-size: cover; background-color: #0f0c29; color: var(--text-color);
            display: flex; justify-content: center; min-height: 100vh; padding: 20px 0;
        }
        .container {
            width: 95%; max-width: 1100px; background: var(--card-bg); backdrop-filter: blur(12px);
            padding: 30px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6); text-align: center;
        }
        h1 { font-size: 1.8rem; margin-bottom: 15px; color: var(--accent-color); }
        
        /* === TEST SELECTOR === */
        #test-selector-screen {
            padding: 10px 0;
        }
        .test-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; 
            margin-top: 25px;
        }
        .test-btn {
            background: rgba(0, 0, 0, 0.4); border: 2px solid var(--accent-color);
            color: var(--text-color); font-size: 1.2rem; font-weight: bold;
            padding: 25px 15px; border-radius: 15px; cursor: pointer; transition: all 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
        }
        .test-btn:hover { background: var(--accent-color); color: #000; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(251,197,49,0.4);}
        .test-btn span { font-size: 0.85rem; font-weight: normal; opacity: 0.8; }

        /* === QUIZ SCREEN === */
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .back-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white;
            padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 1rem;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        
        .score-board {
            font-weight: bold; color: var(--accent-color); margin: 0;
            background: rgba(0, 0, 0, 0.4); display: inline-block; padding: 10px 25px; border-radius: 20px;
            font-size: 1.15rem; border: 1px solid rgba(251,197,49,0.3);
        }

        .layout-wrapper { display: flex; flex-direction: row; align-items: flex-start; gap: 25px; text-align: left; }
        .sidebar { flex: 0 0 320px; background: var(--nav-bg); padding: 18px; border-radius: 15px; order: -1; }
        .nav-panel {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
            max-height: 500px; overflow-y: auto; padding-right: 5px;
        }
        .nav-btn {
            width: 100%; aspect-ratio: 1; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.3);
            background: transparent; color: var(--text-color); cursor: pointer; font-weight: bold;
            display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
        }
        .nav-btn.active { border: 2px solid var(--accent-color); box-shadow: 0 0 10px var(--accent-color); background: rgba(251,197,49,0.2); }
        .nav-btn.correct { background: var(--correct-color); border: none; color: #fff;}
        .nav-btn.wrong { background: var(--wrong-color); border: none; color: #fff;}
        
        .main-content { flex: 1; }
        .question-box {
            margin-bottom: 20px; font-size: 1.25rem; font-weight: 600; background: rgba(255,255,255,0.05);
            padding: 22px; border-radius: 15px; min-height: 80px; line-height: 1.6;
        }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .option-btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 16px 20px; color: white; border-radius: 10px; cursor: pointer; text-align: left;
            font-size: 1.1rem; transition: all 0.2s; line-height: 1.4;
        }
        .option-btn:not(:disabled):hover { background: rgba(255,255,255,0.2); transform: translateX(5px); }
        .option-btn.correct { background: var(--correct-color) !important; color: #fff; font-weight: bold; border-color: transparent;}
        .option-btn.wrong { background: var(--wrong-color) !important; color: #fff; border-color: transparent;}
        
        #explanation {
            margin-top: 20px; padding: 18px; background: rgba(0,0,0,0.5); border-radius: 10px;
            border-left: 6px solid var(--accent-color); display: none; font-size: 1.05rem; line-height: 1.6;
        }
        #explanation strong { color: #fbc531; font-weight: 700; }
        #next-btn {
            margin-top: 20px; padding: 14px 35px; background: var(--accent-color); border: none; color: #000;
            border-radius: 10px; font-weight: bold; cursor: pointer; display: none; font-size: 1.1rem; transition: 0.2s;
        }
        #next-btn:hover { background: #e6b800; transform: scale(1.05); }

        /* === MUSIC PLAYER === */
        .music-player {
            margin: 0 auto 25px auto; max-width: 600px;
            background: rgba(0, 0, 0, 0.45); border: 1px solid rgba(251, 197, 49, 0.35);
            border-radius: 16px; padding: 12px 20px; display: flex; align-items: center; gap: 14px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.4);
        }
        .music-icon { font-size: 1.5rem; animation: spin-note 3s linear infinite; display: inline-block; flex-shrink: 0; }
        @keyframes spin-note { 0% { transform: rotate(0deg); } 25% { transform: rotate(10deg); } 75% { transform: rotate(-10deg); } 100% { transform: rotate(0deg); } }
        .music-info { flex: 1; min-width: 0; text-align: left;}
        .music-title { font-size: 0.85rem; color: var(--accent-color); font-weight: 700; letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
        .music-progress-wrap { display: flex; align-items: center; gap: 8px; }
        .music-time { font-size: 0.72rem; color: rgba(255,255,255,0.55); flex-shrink: 0; width: 38px; text-align: right; }
        #music-progress { flex: 1; height: 4px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.2); border-radius: 4px; cursor: pointer; outline: none; }
        #music-progress::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent-color); cursor: pointer; }
        .music-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .music-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25); color: #fff; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.15s; flex-shrink: 0; }
        .music-btn:hover { background: rgba(251,197,49,0.25); transform: scale(1.1); }
        .music-btn.play-btn { width: 42px; height: 42px; background: var(--accent-color); color: #000; font-size: 1.1rem; border: none; }
        .music-btn.play-btn:hover { background: #e6b800; }
        .volume-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .vol-icon { font-size: 0.9rem; color: rgba(255,255,255,0.6); }
        #music-volume { width: 64px; height: 4px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.2); border-radius: 4px; cursor: pointer; outline: none; }
        #music-volume::-webkit-slider-thumb { -webkit-appearance: none; width: 11px; height: 11px; border-radius: 50%; background: rgba(255,255,255,0.7); cursor: pointer; }
        
        @media (max-width: 850px) { 
            .layout-wrapper { flex-direction: column; } 
            .sidebar { flex: none; width: 100%; order: unset; } 
            .volume-wrap { display: none; } 
            .quiz-header { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="main-title">English Quiz: Ultimate Collection</h1>

        <div class="music-player">
            <span class="music-icon" id="music-note">🎵</span>
            <div class="music-info">
                <div class="music-title" id="music-title">Playlist_6.mp3</div>
                <div class="music-progress-wrap">
                    <span class="music-time" id="music-cur">0:00</span>
                    <input type="range" id="music-progress" value="0" min="0" step="0.1">
                    <span class="music-time" id="music-dur" style="text-align:left">0:00</span>
                </div>
            </div>
            <div class="music-controls">
                <button class="music-btn play-btn" id="play-btn" onclick="togglePlay()" title="Play / Pause">▶</button>
                <button class="music-btn" onclick="restartTrack()" title="Restart">⟳</button>
            </div>
            <div class="volume-wrap">
                <span class="vol-icon">🔈</span>
                <input type="range" id="music-volume" min="0" max="1" step="0.01" value="0.6" oninput="setVolume(this.value)">
                <span class="vol-icon">🔊</span>
            </div>
        </div>
        <audio id="bg-audio" src="assets/Playlist_6.mp3" preload="auto"></audio>
        
        <div id="test-selector-screen">
            <button class="back-btn" onclick="window.location.href='index.html'" style="margin-bottom: 20px;">🏠 Về Trang Chủ</button>
            <p style="font-size: 1.1rem; opacity: 0.9;">Vui lòng chọn một Test để bắt đầu làm bài. Mỗi Test bao gồm 20 câu hỏi ngẫu nhiên và không lặp lại.</p>
            <div class="test-grid" id="test-grid">
                </div>
        </div>

        <div id="quiz-screen" style="display: none;">
            <div class="quiz-header">
                <button class="back-btn" onclick="goHome()">🔙 Quay lại Chọn Test</button>
                <div class="score-board">Câu: <span id="cur-idx">1</span>/<span id="total-idx">0</span> | Điểm: <span id="score">0</span></div>
            </div>
            
            <div class="layout-wrapper">
                <div class="sidebar">
                    <div style="font-size:0.95rem; margin-bottom:12px; color: #fbc531; font-weight:bold;">Bảng câu hỏi:</div>
                    <div class="nav-panel" id="nav-panel"></div>
                </div>
                <div class="main-content">
                    <div class="question-box" id="question"></div>
                    <div class="options-grid" id="options"></div>
                    <div id="explanation"></div>
                    <button id="next-btn" onclick="handleNext()">TIẾP THEO ▶</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const qData = [
            // Đã giữ nguyên toàn bộ mảng qData của bạn ở đây (bạn có thể copy dán thêm câu hỏi vào mảng này bao nhiêu tùy thích)
            { q: "It is _______ to mistakenly take someone else's phone.", options: ["amazing", "helpless", "brilliant", "embarrassing"], correct: 3, ext: "Từ vựng: **embarrassing** (gây lúng túng, xấu hổ). Việc lấy nhầm điện thoại của người khác thật đáng xấu hổ." },
            { q: "I'm feeling pretty tired. Do you mind ______ me home?", options: ["taking", "took", "take", "to take"], correct: 0, ext: "Ngữ pháp: Cấu trúc **Do you mind + V-ing?** (Bạn có phiền làm gì không?). Take sb home: đưa ai về nhà." },
            { q: "My sister always goes to school ______ foot.", options: ["by", "in", "with", "on"], correct: 3, ext: "Cụm từ cố định: **on foot** (đi bộ). Các phương tiện khác thường dùng giới từ 'by' (by bus, by car), nhưng đi bộ thì luôn dùng 'on foot'." },
            { q: "Scientists and engineers have invented devices to remove ______ from industrial wastes.", options: ["polluted", "pollute", "polluting", "pollutants"], correct: 3, ext: "Từ loại: Đứng sau động từ 'remove' (loại bỏ) cần một danh từ. **Pollutants** (Các chất ô nhiễm)." },
            { q: "To stay healthy, you should take _____ a sport and exercise more often.", options: ["off", "down", "up", "in"], correct: 2, ext: "Phrasal verb: **take up** (bắt đầu một thói quen, sở thích hoặc môn thể thao). Để khỏe mạnh, bạn nên bắt đầu chơi một môn thể thao." },
            { q: "She hardly ever eats fast food, ______?", options: ["does she", "doesn't she", "is she", "isn't she"], correct: 0, ext: "Ngữ pháp: Câu hỏi đuôi (Tag question). Từ **hardly** mang nghĩa phủ định (hiếm khi), nên phần mệnh đề được tính là phủ định. Do đó phần đuôi phải ở dạng khẳng định là **does she**." },
            { q: "Nam looks much ______ today than yesterday.", options: ["good", "well", "better", "the best"], correct: 2, ext: "Ngữ pháp: So sánh hơn của từ 'good/well' là **better**. Câu có từ 'than' (hơn) nên dùng so sánh hơn." },
            { q: "The flora and fauna on Earth create an _____ balance, making life possible for humans.", options: ["ecological", "ecologically", "ecology", "ecologist"], correct: 0, ext: "Từ loại: Chỗ trống nằm trước danh từ 'balance' nên cần một tính từ. **Ecological** (thuộc về sinh thái). Hệ động thực vật tạo ra sự cân bằng sinh thái." },
            { q: "The Pikes put ______ their trip because of bad weather.", options: ["away", "up", "out", "off"], correct: 3, ext: "Phrasal verb: **put off** (trì hoãn). Gia đình Pike đã hoãn chuyến đi vì thời tiết xấu." },
            { q: "My brother practises playing ______ guitar every day to join a music festival next month.", options: ["a", "the", "an", "Ø"], correct: 1, ext: "Ngữ pháp: Mạo từ (Article). Dùng mạo từ **the** trước tên các loại nhạc cụ khi nói về việc chơi nhạc cụ đó (play the guitar, play the piano)." },
            { q: "Kevin and his mother are talking about modern robots at home.\n- Mom: \"Robots can recognize people's voices and do what they say.\"\n- Kevin: \"_____\"", options: ["What a great robot!", "I know. It's a new one.", "How amazing!", "Don't worry! It's easy!"], correct: 2, ext: "Giao tiếp: Phản hồi khi nghe một thông tin ấn tượng. **How amazing!** (Thật kinh ngạc/Tuyệt vời làm sao!)." },
            { q: "Neither Linh nor her classmates ______ the National Museum so far.", options: ["visit", "visited", "have visited", "has visited"], correct: 2, ext: "Ngữ pháp: Cấu trúc **Neither A nor B + Động từ chia theo B**. B là 'her classmates' (số nhiều) nên dùng số nhiều. Dấu hiệu 'so far' chỉ thì Hiện tại hoàn thành -> **have visited**." },
            { q: "The traditional family with three or four ______ living under one roof still remains in this region.", options: ["customs", "anniversaries", "generations", "performances"], correct: 2, ext: "Từ vựng: **generations** (thế hệ). 'Three or four generations living under one roof' nghĩa là 3-4 thế hệ cùng chung sống dưới một mái nhà." },
            { q: "Nga: \"You look nervous! ______\" - Hoa: \"This thunder scares me to death.\"", options: ["How are you?", "Why's that?", "Come on!", "What's wrong?"], correct: 3, ext: "Giao tiếp: Hỏi thăm khi thấy ai đó lo lắng, bồn chồn: **What's wrong?** (Có chuyện gì vậy?)." },
            { q: "I have just finished my writing about animals in cold regions. _____ I get to school, I will show it to you.", options: ["While", "Until", "Till", "As soon as"], correct: 3, ext: "Liên từ: **As soon as** (Ngay khi). 'Ngay khi tôi đến trường, tôi sẽ cho bạn xem nó'." },
            { q: "He was homesick and he ______ all his family and friends.", options: ["missed", "wished", "desired", "hoped"], correct: 0, ext: "Từ vựng: **missed** (nhớ). Homesick là bệnh nhớ nhà. Anh ấy nhớ nhà và nhớ tất cả gia đình, bạn bè." },
            { q: "The teacher made us ______ homework every day.", options: ["do", "did", "doing", "to do"], correct: 0, ext: "Ngữ pháp: Cấu trúc Make. **Make somebody + V(nguyên thể)** (Bắt/Yêu cầu ai đó làm gì). Do đó chọn 'do'." },
            { q: "I'm very ______ to you for putting in so much hard work.", options: ["thoughtful", "grateful", "considerate", "careful"], correct: 1, ext: "Từ vựng: Cấu trúc **be grateful to sb for sth** (biết ơn ai vì điều gì). Tôi rất biết ơn bạn vì đã làm việc chăm chỉ." },
            { q: "The police are questioning Tim now. If he _____ the truth earlier, they wouldn't arrest him at the moment.", options: ["tells", "would tell", "told", "had told"], correct: 3, ext: "Ngữ pháp: Câu điều kiện hỗn hợp loại 3-2 (If + S + had PII, S + would/could + V-bare). Giả định một điều trái ngược trong quá khứ dẫn đến kết quả trái ngược ở hiện tại." },
            { q: "If you come to the theatre late, you have to wait until the ______ to get in.", options: ["break", "refreshment", "interval", "half-time"], correct: 2, ext: "Từ vựng: **interval** (thời gian nghỉ giải lao giữa một vở kịch, bộ phim hoặc buổi hòa nhạc)." },
            { q: "There is a lack of ______ in the articles she writes. They are all the same.", options: ["creatively", "create", "creativity", "creative"], correct: 2, ext: "Từ loại: Đứng sau giới từ 'of' cần một danh từ. **Creativity** (sự sáng tạo). Bài viết của cô ấy thiếu đi sự sáng tạo, tất cả đều giống nhau." },
            { q: "I don't believe Mary can do this exercise, ______?", options: ["do I", "don't I", "can she", "can't she"], correct: 2, ext: "Ngữ pháp: Câu hỏi đuôi. Mệnh đề chính bắt đầu bằng 'I don't believe' (mang nghĩa phủ định) nên phần đuôi phải là khẳng định. Chủ ngữ để chia đuôi tính theo mệnh đề phụ 'Mary can' -> **can she**." },
            { q: "We _____ a video conference when the internet connection suddenly became very slow.", options: ["are having", "had", "have", "were having"], correct: 3, ext: "Ngữ pháp: Thì quá khứ tiếp diễn kết hợp quá khứ đơn (When + S + V-ed, S + was/were V-ing). Một hành động đang xảy ra (đang họp) thì hành động khác xen vào (mạng chậm)." },
            { q: "People in Ireland dance ______ Easter day to win prize cakes.", options: ["at", "on", "for", "in"], correct: 1, ext: "Giới từ: Dùng giới từ **on** trước các ngày lễ cụ thể có chữ 'day' (on Easter day)." },
            { q: "With online resources available, it's easier than ever to ______ basic English.", options: ["copy", "pick up", "go over", "look up"], correct: 1, ext: "Phrasal verb: **pick up** (học lỏm, tự học được một kỹ năng hay ngôn ngữ một cách tự nhiên). Nhờ tài nguyên mạng, việc tự học tiếng Anh cơ bản dễ hơn bao giờ hết." },
            { q: "I don't like to eat out because it isn't easy to find a restaurant ______ has good food and service.", options: ["where", "which", "who", "whom"], correct: 1, ext: "Đại từ quan hệ: Thay thế cho danh từ chỉ vật 'a restaurant' làm chủ ngữ, ta dùng **which** (hoặc that)." },
            { q: "We are planning a summer trip to _____ Mount Everest and _____ Mekong River in southern Vietnam.", options: ["the / the", "Ø / the", "the / Ø", "Ø / Ø"], correct: 1, ext: "Ngữ pháp: Mạo từ. Không dùng 'the' trước tên một ngọn núi đơn lẻ (Mount Everest). Dùng 'the' trước tên dòng sông (the Mekong River)." },
            { q: "______ youngest boy has just started going to school.", options: ["The", "An", "A", "X"], correct: 0, ext: "Ngữ pháp: Mạo từ **The** luôn đứng trước tính từ so sánh nhất (youngest)." },
            { q: "John: \"Have a nice weekend!\" ~ Peter: \"______\"", options: ["You the same.", "So do I.", "Will you?", "The same to you!"], correct: 3, ext: "Giao tiếp: Để đáp lại lời chúc 'Have a nice weekend' (Cuối tuần vui vẻ nhé), ta dùng **The same to you!** (Bạn cũng vậy nhé!)." },
            { q: "Jane invites Mary to go to the cinema.\nJane: \"Would you like to go to the cinema with me this weekend?\" - Mary: \"______.\"", options: ["Yes, I do", "Yes, I'd love to", "Yes, it is", "I agree with you"], correct: 1, ext: "Giao tiếp: Lời đáp lịch sự khi nhận được lời mời (Would you like to...). **Yes, I'd love to** (Vâng, mình rất thích)." },
            { q: "The strong tornado _____ some trees and dropped them miles away.", options: ["picked out", "took off", "pulled up", "cut out"], correct: 2, ext: "Phrasal verb: **pull up** (nhổ bật rễ). Trận lốc xoáy mạnh đã nhổ bật rễ một vài cái cây." },
            { q: "His car is expensive. ______ is cheap.", options: ["My", "Me", "Mine", "I"], correct: 2, ext: "Ngữ pháp: Đại từ sở hữu **Mine** (xe của tôi) thay thế cho cụm 'My car' để tránh lặp từ." },
            { q: "After receiving the results of the last test, he promised ______ harder for the next exam.", options: ["study", "studied", "studying", "to study"], correct: 3, ext: "Ngữ pháp: **Promise to V** (Hứa sẽ làm gì). Anh ấy hứa sẽ học chăm chỉ hơn." },
            { q: "Who's going to look ______ your children while you're away.", options: ["at", "up", "over", "after"], correct: 3, ext: "Phrasal verb: **look after** (chăm sóc). Ai sẽ chăm sóc con bạn khi bạn đi vắng?" },
            { q: "While we _____ Son Dong, we found a river in this biggest cave.", options: ["were exploring", "explore", "was exploring", "explored"], correct: 0, ext: "Ngữ pháp: Quá khứ tiếp diễn đi sau 'While' (Trong khi). Chủ ngữ 'we' số nhiều nên dùng **were exploring** (đang khám phá)." },
            { q: "I wish my friends ______ more time on outdoor activities instead of playing computer games now.", options: ["spend", "spent", "spending", "to spend"], correct: 1, ext: "Ngữ pháp: Câu ước ở hiện tại (dấu hiệu: now), động từ phải lùi về quá khứ đơn -> **spent**." },
            { q: "When we ______ along Hai Thinh Beach, we saw many people enjoying the fresh air.", options: ["walked", "are walking", "were walking", "have walked"], correct: 2, ext: "Ngữ pháp: Hành động đang xảy ra trong quá khứ bị hành động khác xen vào. 'Khi chúng tôi đang đi dạo (were walking) thì chúng tôi thấy (saw)...'." },
            { q: "Mr Smith is having lunch at a restaurant.\nMr Smith: \"Could you bring me some water?\" - Waiter: \"______\"", options: ["No, I don't", "I don't want", "No, thanks", "Certainly sir."], correct: 3, ext: "Giao tiếp: Đáp lại lời yêu cầu lịch sự của khách hàng, nhân viên phục vụ dùng **Certainly sir** (Chắc chắn rồi thưa ngài)." },
            { q: "He suggested _____ concert tickets in advance so that we could have a good view of the stage.", options: ["booking", "book", "to book", "booked"], correct: 0, ext: "Ngữ pháp: **Suggest + V-ing** (Đề xuất làm việc gì đó). Anh ấy đề nghị đặt vé (booking) trước." },
            { q: "I think she didn't accept his invitation, ______?", options: ["didn't she", "did she", "do I", "don't I"], correct: 1, ext: "Ngữ pháp: Câu hỏi đuôi. Bắt đầu bằng 'I think', ta tính câu hỏi đuôi theo mệnh đề sau. 'She didn't accept' là mệnh đề phủ định -> phần đuôi khẳng định là **did she**." },
            { q: "Tam Chuc Pagoda is ______ than many other pagodas in Vietnam.", options: ["beautiful", "the most beautiful", "most beautiful", "more beautiful"], correct: 3, ext: "Ngữ pháp: Câu so sánh hơn (có từ 'than'). 'Beautiful' là tính từ dài nên dùng **more beautiful**." },
            { q: "Mr John is ______ old customer and an honest man.", options: ["a", "an", "the", "X"], correct: 1, ext: "Ngữ pháp: Mạo từ **an** đứng trước danh từ (hoặc tính từ bổ nghĩa cho danh từ) bắt đầu bằng nguyên âm (o trong từ old)." },
            { q: "If she learns English well, she _____ in English-speaking countries.", options: ["study", "studies", "will study", "would study"], correct: 2, ext: "Ngữ pháp: Câu điều kiện loại 1 (If + Hiện tại đơn, Tương lai đơn). Chỉ một khả năng có thể xảy ra ở hiện tại hoặc tương lai." },
            { q: "My car is blue. ______ is white.", options: ["Her", "Hers", "She", "Mine"], correct: 1, ext: "Ngữ pháp: Đại từ sở hữu **Hers** thay thế cho cụm 'Her car'. Xe của tôi màu xanh. Xe của cô ấy màu trắng." },
            { q: "I wish I _____ how to paint on ceramic pots.", options: ["know", "knew", "knows", "known"], correct: 1, ext: "Ngữ pháp: Câu điều ước ở hiện tại (Wish + S + V-quá khứ). Diễn tả một điều ước không có thật ở hiện tại. Động từ chia quá khứ là **knew**." },
            { q: "Would you mind ______ the door.", options: ["open", "opened", "opening", "to open"], correct: 2, ext: "Ngữ pháp: Cấu trúc **Would you mind + V-ing?** (Bạn có phiền làm gì đó không?). Đề nghị lịch sự." },
            { q: "My cousin is not good at communicative English. He wishes he ______ speak English more fluently.", options: ["could", "can", "will", "must"], correct: 0, ext: "Ngữ pháp: Câu ước ở hiện tại. 'Can' lùi thì thành **could** (ước rằng anh ấy có thể nói trôi chảy hơn)." },
            { q: "People in big cities are afraid ______ traffic jam.", options: ["on", "at", "in", "of"], correct: 3, ext: "Giới từ: Cụm tính từ **be afraid of** (sợ hãi cái gì đó). Người dân thành phố lớn rất sợ tắc đường." },
            { q: "_____ it rains heavily, we decide to start the match on time.", options: ["Since", "Although", "Despite", "Because"], correct: 1, ext: "Liên từ: **Although + Mệnh đề** (Mặc dù). Mặc dù trời mưa to, chúng tôi vẫn quyết định bắt đầu trận đấu đúng giờ." },
            { q: "Tet is the most important ______ for Vietnamese people.", options: ["celebration", "decoration", "preparation", "invention"], correct: 0, ext: "Từ vựng: **celebration** (lễ kỷ niệm/ngày lễ). Tết là dịp lễ kỷ niệm quan trọng nhất của người Việt." },
            { q: "During the interview, the teacher asked me ______.", options: ["where I am studying now", "where I was studying then", "where was I studying then", "where I have studied then"], correct: 1, ext: "Ngữ pháp: Câu tường thuật dạng câu hỏi WH-. Trật tự từ là Chủ ngữ + Động từ (không đảo ngữ) và phải lùi thì. Hiện tại tiếp diễn lùi về quá khứ tiếp diễn -> **where I was studying then**." },
            { q: "I'll phone you as soon as I ______ to Ho Chi Minh city.", options: ["reach", "arrive", "get", "will get"], correct: 2, ext: "Từ vựng: Cụm từ **get to + địa điểm** (đến nơi nào đó). (Reach không đi với to; Arrive đi với in/at). Sau 'as soon as' ta dùng thì HTĐ mang nghĩa tương lai." },
            { q: "Today's cities are _____ than cities in the past.", options: ["lots larger", "much larger", "as large", "the largest"], correct: 1, ext: "Ngữ pháp: Nhấn mạnh cấu trúc so sánh hơn. Dùng **much + so sánh hơn** (much larger) để nhấn mạnh sự khác biệt lớn." },
            { q: "If only my father ______ a doctor.", options: ["is", "be", "were", "has been"], correct: 2, ext: "Ngữ pháp: Câu ước (If only = I wish). Ở hiện tại, động từ to-be lùi về quá khứ và dùng **were** cho tất cả các ngôi." },
            { q: "Many tourists visit Trang An Landscape every year to ______ its breathtaking natural beauty.", options: ["explore", "exploring", "exploration", "exploratory"], correct: 0, ext: "Ngữ pháp/Từ loại: Sau 'to' chỉ mục đích cần một động từ nguyên thể. **Explore** (Khám phá vẻ đẹp thiên nhiên ngoạn mục)." },
            { q: "Is this my key, or is it ______?", options: ["your", "yours", "the your", "the yours"], correct: 1, ext: "Ngữ pháp: Đại từ sở hữu **yours** (của bạn) thay thế cho 'your key' để tránh lặp từ." },
            { q: "This river now is much less _____ than before. People are aware of the environment and they try to keep the river clean.", options: ["polluted", "pollutes", "polluting", "pollution"], correct: 0, ext: "Từ loại: Đứng sau 'much less' cần một tính từ. **Polluted** (bị ô nhiễm). Con sông nay đã bớt ô nhiễm hơn nhiều." },
            { q: "The man and the dog ______ I had taken a photo of were in the park.", options: ["which", "who", "whose", "that"], correct: 3, ext: "Đại từ quan hệ: Khi cụm danh từ phía trước bao gồm cả 'người và vật' (The man and the dog), ta bắt buộc dùng đại từ **that**." },
            { q: "This village is famous for its local ______, especially traditional handmade products.", options: ["traditions", "customs", "specialities", "services"], correct: 2, ext: "Từ vựng: **specialities** (đặc sản). Ngôi làng nổi tiếng với các đặc sản địa phương, đặc biệt là đồ thủ công truyền thống." },
            { q: "She washes her hands before meals, and ______.", options: ["so does he", "he is, too", "neither does he", "he doesn't either"], correct: 0, ext: "Ngữ pháp: Cấu trúc đồng tình khẳng định: **So + trợ động từ + S**. Động từ chính là 'washes' (HTĐ) nên trợ động từ là 'does' -> **so does he**." },
            { q: "Huy got a bad mark for his English test. He must have been really _____.", options: ["disappointed", "relaxing", "interested", "happy"], correct: 0, ext: "Từ vựng: Huy bị điểm kém nên chắc hẳn anh ấy rất **disappointed** (thất vọng)." },
            { q: "This bicycle costs ______ the other one.", options: ["twice as much as", "as twice much as", "as much as twice", "twice as much than"], correct: 0, ext: "Ngữ pháp: Cấu trúc so sánh gấp nhiều lần: **Số lần (twice) + as + much/many + as**." },
            { q: "People who exercise regularly and eat fresh food often have a ______ lifestyle.", options: ["lazy", "careless", "harmful", "healthy"], correct: 3, ext: "Từ vựng: **healthy** (khỏe mạnh). Những người tập thể dục và ăn thức ăn tươi sẽ có một lối sống lành mạnh." },
            { q: "She was the first woman in India ______ the president.", options: ["be", "is", "to be", "being"], correct: 2, ext: "Ngữ pháp: Rút gọn mệnh đề quan hệ khi đại từ quan hệ đứng sau các từ chỉ số thứ tự (the first, the second, the last...) -> dùng động từ nguyên thể có to (**to be**)." },
            { q: "Eating _____ food is a popular habit of young people in big cities in Vietnam.", options: ["canteen", "stall", "street", "shop"], correct: 2, ext: "Cụm danh từ: **Street food** (Thức ăn đường phố/Ăn vặt lề đường). Đây là thói quen phổ biến của giới trẻ." },
            { q: "I'd rather my vacation ______ longer.", options: ["is", "were", "be", "has been"], correct: 1, ext: "Ngữ pháp: Cấu trúc giả định **S1 + would rather + S2 + V(quá khứ)** (mong muốn ai/điều gì đó ở hiện tại). Kì nghỉ lùi về quá khứ dùng **were**." },
            { q: "Cuc Phuong National Park often ______ a large number of tourists because of its rich wildlife and beautiful natural scenery.", options: ["reduces", "avoids", "attracts", "prevents"], correct: 2, ext: "Từ vựng: **attract** (thu hút). Vườn quốc gia Cúc Phương thu hút lượng lớn khách du lịch nhờ động vật hoang dã phong phú." },
            { q: "She wanted a bike like ______.", options: ["me", "mine", "I", "the mine"], correct: 1, ext: "Ngữ pháp: Đại từ sở hữu **mine** (của tôi) thay thế cho 'my bike' để tránh lặp từ. Cô ấy muốn một chiếc xe giống chiếc xe của tôi." },
            { q: "The children in my home village used to go _____, even in winter. Now they all have shoes.", options: ["on foot", "barefoot", "ground foot", "soil foot"], correct: 1, ext: "Từ vựng: **go barefoot** (đi chân trần/chân đất). Trẻ em quê tôi từng phải đi chân đất dù là mùa đông." },
            { q: "I'm bored ______ doing the same job for a long time.", options: ["of", "to", "with", "about"], correct: 2, ext: "Giới từ: Cụm tính từ **be bored with** (chán nản với việc gì). Tôi chán phải làm một công việc trong thời gian dài." },
            { q: "By watching English movies and talking to foreigners, students can gradually ______ new vocabulary and pronunciation.", options: ["pick up", "turn down", "look around", "break up"], correct: 0, ext: "Phrasal verb: **pick up** (học hỏi/tiếp thu tự nhiên). Học sinh có thể dần dần tiếp thu từ vựng mới thông qua xem phim." },
            { q: "I'll phone you as soon as I ______ Ho Chi Minh city.", options: ["reach", "arrive", "get", "will get"], correct: 0, ext: "Ngữ pháp/Từ vựng: Động từ **reach** (đến) đi trực tiếp với tân ngữ, không cần giới từ đi kèm (khác với arrive in/at và get to)." },
            { q: "The closest potentially _____ planet ever found has been spotted by Australian scientists, and it's just 14 light-years away.", options: ["habitable", "foreseeable", "transferable", "workable"], correct: 0, ext: "Từ vựng: **habitable** (có thể sinh sống được). Hành tinh có khả năng sống được." },
            { q: "A: \"Would you mind if I sat here?\" - B: \"______.\"", options: ["Yes, that would be fine", "Yes, let's", "No, I don't mind", "Thanks"], correct: 2, ext: "Giao tiếp: Lời đáp cho câu hỏi xin phép lịch sự 'Bạn có phiền không?'. Nếu đồng ý cho họ ngồi, ta nói **No, I don't mind** (Không, tôi không phiền)." },
            { q: "Many urban areas lack basic public ______ such as parks, libraries and hospitals.", options: ["locations", "amenities", "systems", "utilities"], correct: 1, ext: "Từ vựng: **amenities** (tiện nghi, tiện ích công cộng). Các khu vực đô thị thường thiếu các tiện ích cơ bản như công viên, bệnh viện." },
            { q: "New pencil case is ______ the old one.", options: ["as half cheap as", "half as cheap as", "half cheaper than", "as cheap as half"], correct: 1, ext: "Ngữ pháp: Cấu trúc so sánh gấp số lần/phân số. **Số lần/phân số (half) + as + adj + as**. Hộp bút mới rẻ bằng một nửa hộp cũ." },
            { q: "I don't think Fred gets _____ with Daniel. They always argue.", options: ["up", "through", "over", "on well"], correct: 3, ext: "Phrasal verb: **get on well with** (hòa thuận, có mối quan hệ tốt với ai). Họ luôn cãi nhau nên chắc chắn không hòa thuận." },
            { q: "After Nga's birthday, her mother was the only person ______ the house.", options: ["clean", "cleaned", "cleaning", "to clean"], correct: 3, ext: "Ngữ pháp: Rút gọn mệnh đề quan hệ khi danh từ phía trước có các cụm từ chứa 'the only', 'the first'... Ta dùng động từ nguyên mẫu có to (**to V**)." },
            { q: "\"Thank you for your birthday gift, I really like it.\" - \"______\"", options: ["I'm happy you like it.", "Of course, it's valuable.", "Not at all.", "It's nice of you."], correct: 0, ext: "Giao tiếp: Đáp lại lời cảm ơn khi nhận quà. **I'm happy you like it** (Mình rất vui vì bạn thích nó) là cách phản hồi lịch sự và tự nhiên nhất." },
            { q: "They didn't go picnic last weekend, and she didn't ______.", options: ["neither", "either", "too", "so"], correct: 1, ext: "Ngữ pháp: Câu đồng tình phủ định đứng ở cuối câu ta dùng **either** (cô ấy cũng không). (Neither đứng đầu mệnh đề hoặc dùng trong 'neither did she')." },
            { q: "We are going to have an outdoor activity _____ Sunday afternoon.", options: ["in", "on", "to", "for"], correct: 1, ext: "Ngữ pháp: Giới từ thời gian. Đứng trước các buổi của một ngày cụ thể (Sunday afternoon) ta dùng giới từ **on**." },
            { q: "Lan wishes she ______ enough money now to buy her mother a bike.", options: ["has", "will have", "had", "has had"], correct: 2, ext: "Ngữ pháp: Câu ước ở hiện tại (now). Động từ phải lùi một thì về quá khứ đơn -> **had**." },
            { q: "John is very busy. ______, he is always willing to give a hand with the housework.", options: ["In spite", "Therefore", "However", "Because"], correct: 2, ext: "Liên từ: **However** (Tuy nhiên). Liên kết 2 vế có ý nghĩa tương phản. Mặc dù bận rộn nhưng anh ấy vẫn luôn sẵn lòng giúp việc nhà (give a hand)." },
            { q: "The TV ______ has been repaired looks OK.", options: ["who", "which", "whose", "where"], correct: 1, ext: "Đại từ quan hệ: Thay thế cho danh từ chỉ vật 'The TV' làm chủ ngữ cho vế sau, ta dùng **which**." },
            { q: "My brother wants to be _____ electrical engineer in the future.", options: ["a", "the", "Ø", "an"], correct: 3, ext: "Ngữ pháp: Mạo từ. Từ 'electrical' bắt đầu bằng một nguyên âm (e) nên dùng mạo từ **an** chỉ nghề nghiệp." },
            { q: "A popular newspaper with a ______ of over five million daily makes a lot of money.", options: ["column", "circulation", "message", "review"], correct: 1, ext: "Từ vựng: **circulation** (tổng số phát hành/lượng báo phát hành). Tờ báo nổi tiếng với lượng phát hành hơn 5 triệu bản mỗi ngày." },
            { q: "You have never been to Nha Trang, ______?", options: ["have you", "haven't you", "you have", "you haven't"], correct: 0, ext: "Ngữ pháp: Câu hỏi đuôi. Mệnh đề trước chứa từ phủ định 'never', nên phần đuôi phải là khẳng định **have you**." },
            { q: "Hello, ______ name is Linda and I am a student from the USA.", options: ["me", "I", "my", "mine"], correct: 2, ext: "Ngữ pháp: Đứng trước danh từ 'name' cần một tính từ sở hữu. **my** (Tên CỦA tôi là Linda)." },
            { q: "_____ his bad cold, he continued to revise the lessons until late.", options: ["Because of", "Because", "In spite of", "Although"], correct: 2, ext: "Ngữ pháp: 'his bad cold' là một cụm danh từ. Thể hiện sự nhượng bộ (Mặc dù) đi kèm cụm danh từ ta dùng **In spite of** hoặc Despite." },
            { q: "I was tired, ______ I went to bed early last night.", options: ["however", "although", "because", "so"], correct: 3, ext: "Liên từ: **so** (vì vậy, cho nên) nối hai mệnh đề nguyên nhân - kết quả. Tôi mệt, VÌ VẬY tôi đi ngủ sớm." },
            { q: "That company is going to ______ a new building on this corner.", options: ["take after", "show off", "put up", "cut down"], correct: 2, ext: "Phrasal verb: **put up** (xây dựng lên, dựng lên). Công ty dự định xây một tòa nhà mới ở góc đường này." },
            { q: "The children enjoy ______ soccer after school.", options: ["playing", "to play", "play", "played"], correct: 0, ext: "Ngữ pháp: Động từ đi sau cấu trúc **enjoy + V-ing** (thích làm gì đó). Bọn trẻ thích đá bóng." },
            { q: "Last night the firefighters worked all night to _____ the flames before they spread further.", options: ["take off", "put out", "turn on", "bring up"], correct: 1, ext: "Phrasal verb: **put out** (dập tắt lửa). Lính cứu hỏa đã làm việc cả đêm để dập lửa." },
            { q: "Nam is a student. He always goes to ______ school at 6.30 in the morning.", options: ["a", "an", "the", "Φ"], correct: 3, ext: "Ngữ pháp: Khi đi đến một địa điểm đúng với mục đích chính của nó (học sinh đến trường để học), ta dùng 'go to school' (không có mạo từ **Φ**)." },
            { q: "Solar energy doesn't cause ______.", options: ["pollution", "polluted", "pollute", "pollutant"], correct: 0, ext: "Từ loại: Đứng sau động từ 'cause' (gây ra) cần một danh từ. **Pollution** (Sự ô nhiễm). Năng lượng mặt trời không gây ô nhiễm." },
            { q: "Lan: \"How long does it take you to go to school?\"\n- Hoa: \"______.\"", options: ["by motorbike", "30 minutes", "30 kilometers", "to the West of the city"], correct: 1, ext: "Giao tiếp: Câu hỏi 'How long' dùng để hỏi về độ dài thời gian. Đáp án phù hợp là khoảng thời gian **30 minutes** (30 phút)." },
            { q: "She _____ a self-portrait using her smartphone's beauty filter to make her skin look more even and radiant.", options: ["took", "got", "made", "had"], correct: 0, ext: "Cụm từ cố định: **take a portrait / take a photo** (chụp ảnh chân dung/chụp ảnh). Cô ấy đã chụp một bức ảnh selfie tự sướng." },
            { q: "She works as ______ doctor in a small town.", options: ["a", "an", "the", "Ø"], correct: 0, ext: "Ngữ pháp: Mạo từ **a** dùng trước danh từ đếm được số ít chỉ nghề nghiệp, bắt đầu bằng phụ âm (doctor)." },
            { q: "Tet is a festival ______ occurs in late January or early February.", options: ["whom", "when", "where", "which"], correct: 3, ext: "Đại từ quan hệ: Thay thế cho sự vật 'a festival' làm chủ ngữ cho động từ 'occurs', ta dùng **which** (hoặc that)." },
            { q: "My family gathered ______ New Year's Day.", options: ["in", "on", "at", "to"], correct: 1, ext: "Giới từ: Giới từ **on** đi trước các ngày lễ cụ thể có từ 'Day' (on New Year's Day)." },
            { q: "You can use _____ to buy tickets and book accommodation on your own.", options: ["online programmes", "tour guides", "travel agencies", "travel apps"], correct: 3, ext: "Từ vựng: **travel apps** (ứng dụng du lịch). Bạn có thể dùng ứng dụng để tự mua vé và đặt phòng nghỉ." },
            { q: "There isn't ______ milk in the fridge.", options: ["much", "many", "some", "few"], correct: 0, ext: "Ngữ pháp: 'milk' (sữa) là danh từ không đếm được. Trong câu phủ định ta dùng lượng từ **much** (không có nhiều sữa)." },
            { q: "It's raining. ______, Mr. Nam has to go to work.", options: ["Although", "So", "Therefore", "However"], correct: 3, ext: "Liên từ: Đứng đầu câu sau dấu chấm và trước dấu phẩy mang nghĩa tương phản (Tuy nhiên) thì chỉ có **However** hợp lý. Trời mưa. Tuy nhiên, ông Nam vẫn phải đi làm." },
            { q: "She is ______ than her brother.", options: ["tall", "taller", "tallest", "most tall"], correct: 1, ext: "Ngữ pháp: Câu có 'than' nên dùng dạng so sánh hơn của tính từ ngắn 'tall' là **taller**." },
            { q: "The Sun-world Samson water park we went to yesterday was fantastic, and the entrance _____ was proper.", options: ["fee", "charge", "cost", "fare"], correct: 0, ext: "Cụm từ: **entrance fee** (phí vào cửa, vé vào cổng). Fare thường dùng cho vé tàu xe." },
            { q: "This is the boy ______ broke the window.", options: ["which", "who", "whom", "whose"], correct: 1, ext: "Đại từ quan hệ: Thay thế cho danh từ chỉ người 'the boy' làm chủ ngữ cho động từ 'broke' phía sau -> dùng **who**." },
            { q: "If I ______ rich, I ______ around the world.", options: ["will be - travel", "am - will travel", "were - would travel", "would be - traveled"], correct: 2, ext: "Ngữ pháp: Câu điều kiện loại 2 (trái với thực tế hiện tại). If + S + were/V-ed, S + would + V. 'Nếu tôi giàu, tôi sẽ đi du lịch...'." },
            { q: "Ann: \"Can I help you?\" - Ba: \"______\"", options: ["Yes, please", "No, I don't", "I'm sorry", "Thank you"], correct: 0, ext: "Giao tiếp: Đáp lại lời đề nghị giúp đỡ của người khác. Nếu đồng ý, ta trả lời lịch sự là **Yes, please** (Vâng, xin vui lòng giúp tôi)." },
            { q: "Peter and Dane are talking about environmental protection.\n- Peter: \"We should limit the use of plastic bags.\"\n- Dane: \"_____. We can use paper bags instead.\"", options: ["I don't quite agree", "It's not true", "I completely agree", "You're wrong"], correct: 2, ext: "Giao tiếp: Dane đồng tình và gợi ý dùng túi giấy thay thế. Do đó đáp án là **I completely agree** (Tôi hoàn toàn đồng ý)." },
            { q: "We ran out of time and had to ______ the meeting.", options: ["call up", "call off", "call in", "call for"], correct: 1, ext: "Phrasal verb: **call off** (hủy bỏ). Chúng tôi hết thời gian nên đành phải hủy cuộc họp." },
            { q: "The girl wishes she ______ in Hue for the festival next week.", options: ["had stayed", "was staying", "stay", "could stay"], correct: 3, ext: "Ngữ pháp: Câu ước cho tương lai (dấu hiệu: next week). Cấu trúc: S + wish + S + could/would + V-bare. Cô gái ước mình có thể ở lại Huế." },
            { q: "The company ______ a new marketing campaign to increase sales.", options: ["launched", "created", "built", "formed"], correct: 0, ext: "Từ vựng: Cụm từ cố định **launch a campaign** (khởi động/tung ra một chiến dịch). Công ty tung ra chiến dịch tiếp thị mới để tăng doanh số." },
            { q: "If Nga trains harder, she _____ run faster than you and win the race next week.", options: ["could", "must", "can", "would"], correct: 2, ext: "Ngữ pháp: Câu điều kiện loại 1 diễn tả một khả năng ở tương lai. Dùng **can** (có thể) thay cho will để chỉ năng lực thể chất." },
            { q: "All people who were without homes in the flood were provided with ______ accommodation.", options: ["short", "present", "instant", "temporary"], correct: 3, ext: "Từ vựng: **temporary accommodation** (chỗ ở tạm thời). Người mất nhà trong lũ được cung cấp chỗ ở tạm thời." },
            { q: "You don't like watching this film, ______?", options: ["don't you", "are you", "do you", "did you"], correct: 2, ext: "Ngữ pháp: Câu hỏi đuôi. Mệnh đề chính là phủ định ở hiện tại đơn (don't like), nên phần đuôi là khẳng định tương ứng: **do you**." },
            { q: "They went to ______ United States last year for a vacation.", options: ["a", "an", "the", "Ø"], correct: 2, ext: "Ngữ pháp: Mạo từ **the** bắt buộc phải đứng trước tên các quốc gia có dạng số nhiều hoặc liên bang (the United States, the UK, the Philippines)." },
            { q: "Hoi An is famous _____ its old houses and beautiful lanterns.", options: ["for", "about", "to", "with"], correct: 0, ext: "Giới từ: Cụm tính từ **be famous for** (nổi tiếng về điều gì)." },
            { q: "She usually wakes up early ______ the morning.", options: ["in", "on", "at", "to"], correct: 0, ext: "Giới từ: Giới từ **in** luôn đi với các buổi lớn trong ngày (in the morning, in the afternoon, in the evening)." },
            { q: "When he lived in the city, he ______ to the theater twice a week.", options: ["uses to go", "has gone", "used to go", "was going"], correct: 2, ext: "Ngữ pháp: Cấu trúc **used to + V** diễn tả một thói quen trong quá khứ nay không còn nữa. Khi còn sống ở thành phố, anh ấy từng đi nhà hát 2 lần/tuần." },
            { q: "There are only ______ students in the classroom this afternoon.", options: ["much", "many", "little", "few"], correct: 3, ext: "Lượng từ: 'students' là danh từ đếm được. Cụm từ 'only a few' (chỉ một vài) là phổ biến nhất. Đề bài không có 'a few', ta dùng **few** đi với 'only'." },
            { q: "Tokyo is one of _____ most expensive cities in the world.", options: ["a", "the", "an", "Ø (no article)"], correct: 1, ext: "Ngữ pháp: Mạo từ trước câu so sánh nhất luôn dùng **the** (the most expensive)." },
            { q: "The Viet (or Kinh) have the ______ number of people, accounting for about 86% of the population.", options: ["large", "larger", "largest.", "large as"], correct: 2, ext: "Ngữ pháp: So sánh nhất **the largest number** (số lượng lớn nhất). Người Việt có số dân đông nhất, chiếm 86%." },
            { q: "My house ______ in 1999.", options: ["is built", "was building", "was built", "has been built"], correct: 2, ext: "Ngữ pháp: Câu bị động ở thì quá khứ đơn (có mốc thời gian in 1999). Ngôi nhà được xây nên dùng **was built**." },
            { q: "People cough______ they breathe in the fume from cars.", options: ["because", "because of", "cause", "so"], correct: 0, ext: "Liên từ: Đứng trước một mệnh đề (S+V) và chỉ nguyên nhân nên ta dùng **because** (bởi vì). Mọi người ho vì họ hít phải khói xe." },
            { q: "Tony and Mai are discussing their weekend trip.\n- Tony : \"How about going to the Bat Trang pottery village this Sunday?\"\n- Mai : \"_____\"", options: ["That's a good idea!", "You're welcome.", "I'm fine, thanks.", "Congratulations!"], correct: 0, ext: "Giao tiếp: Phản hồi một lời rủ rê, đề xuất (How about + V-ing). **That's a good idea!** (Ý kiến hay đấy!)." },
            { q: "She is the girl ______ sings beautifully.", options: ["which", "who", "what", "whose"], correct: 1, ext: "Đại từ quan hệ: Thay thế cho danh từ chỉ người 'the girl' làm chủ ngữ cho động từ 'sings' -> dùng **who**." },
            { q: "The entrance examination will be held ______ June 22nd 2012.", options: ["in", "on", "at", "to"], correct: 1, ext: "Ngữ pháp: Giới từ thời gian. Khi có ngày cụ thể (June 22nd) ta phải dùng giới từ **on**." },
            { q: "Sally: \"What about collecting used paper every day?\" ~ Jenny: \"______\"", options: ["Yes, you must.", "Well done.", "That's a good idea.", "Thanks, it's nice of you."], correct: 2, ext: "Giao tiếp: Phản hồi lại một lời rủ rê, đề nghị (What about + V-ing). Tán thành ý kiến đó bằng câu **That's a good idea** (Đó là một ý kiến hay)." },
            { q: "The exercise is quite difficult, so _____ in our class needs further guidance from the teacher.", options: ["anything", "everything", "no one", "everyone"], correct: 3, ext: "Đại từ bất định: Bài tập khá khó, nên **everyone** (mọi người) trong lớp đều cần giáo viên hướng dẫn thêm." },
            { q: "She decided to ______ her old clothes to charity last week.", options: ["give away", "take out", "put off", "bring back"], correct: 0, ext: "Phrasal verb: **give away** (cho đi, quyên góp). Cô ấy quyết định quyên góp quần áo cũ cho hội từ thiện." },
            { q: "Hoa: \"I suggest going camping next Sunday.\" - Lan: \"______\"", options: ["That's a fine day", "That's a good idea", "That's a reason", "That's a good trip"], correct: 1, ext: "Giao tiếp: Đáp lại lời gợi ý (I suggest...), ta dùng **That's a good idea** (Đó là một ý hay)." },
            { q: "The forest fire______ for eight hours and some animals were badly injured or killed.", options: ["collapsed", "struck", "erupted", "raged"], correct: 3, ext: "Từ vựng: Động từ **rage** (cháy dữ dội, hoành hành). Đám cháy rừng bùng lên dữ dội trong 8 giờ." },
            { q: "When teenagers face school pressure, they often wonder _____ to talk to for help and advice.", options: ["what", "who", "which", "where"], correct: 1, ext: "Từ để hỏi: Bọn trẻ băn khoăn không biết nên nói chuyện với **who** (ai) để xin lời khuyên." },
            { q: "Her sense of ______ overwhelmed her when she realized she had lost the precious heirloom her grandmother had given her.", options: ["relief", "regret", "anticipation", "elation"], correct: 1, ext: "Từ vựng: **regret** (sự hối tiếc). Cô ấy ngập tràn hối tiếc khi nhận ra đã làm mất món kỷ vật quý giá." },
            { q: "You will not succeed ______ working hard.", options: ["unless", "without", "if", "although"], correct: 1, ext: "Giới từ: Đằng sau chỗ trống là V-ing (working hard), nên không thể dùng mệnh đề (unless, if, although). Dùng **without** (nếu không có sự chăm chỉ)." },
            { q: "He wants to be ______ astronaut when he grows up.", options: ["a", "an", "the", "Ø"], correct: 1, ext: "Ngữ pháp: Mạo từ **an** đi trước danh từ chỉ nghề nghiệp bắt đầu bằng nguyên âm (astronaut - phi hành gia)." },
            { q: "Before choosing a career, you should think about your personal _____ to find the right job.", options: ["appearances", "boundaries", "accessories", "qualities"], correct: 3, ext: "Từ vựng: **personal qualities** (phẩm chất cá nhân). Bạn nên cân nhắc phẩm chất của mình để chọn đúng nghề." },
            { q: "He spends a lot of time ______ his phone browsing the internet.", options: ["in", "on", "at", "to"], correct: 1, ext: "Giới từ: Dùng thì giờ trên điện thoại, trên internet ta dùng giới từ **on** (on the phone, on the internet)." },
            { q: "It was raining very ______ so I took my umbrella.", options: ["wet", "badly", "hard", "firmly"], correct: 2, ext: "Từ vựng: Mưa to, mưa nặng hạt dùng trạng từ **hard** (raining hard) hoặc heavily." },
            { q: "Thong is the ______ in my class.", options: ["clever", "cleverer", "cleverest", "clever than"], correct: 2, ext: "Ngữ pháp: So sánh nhất. Tính từ 'clever' dù có 2 âm tiết nhưng kết thúc bằng -er nên được xem là tính từ ngắn -> **cleverest**." },
            { q: "The local council decided to _____ the proposal for a new skyscraper to preserve the historical beauty of the city.", options: ["get over", "fill in", "turn down", "pull down"], correct: 2, ext: "Phrasal verb: Hội đồng quyết định **turn down** (bác bỏ, từ chối) lời đề xuất xây tòa nhà chọc trời để bảo tồn cảnh quan." },
            { q: "David ate a lot of food ______ he wasn't hungry.", options: ["despite", "although", "because of", "because"], correct: 1, ext: "Liên từ: Liên kết mệnh đề mang nghĩa nhượng bộ, trái ngược (David ăn rất nhiều DÙ anh ấy không đói) -> **although**." },
            { q: "I ______ do that if I were you.", options: ["won't", "shan't", "wouldn't", "don't"], correct: 2, ext: "Ngữ pháp: Câu điều kiện loại 2 (If I were you). Vế chính dùng would/could + V. Dạng phủ định là **wouldn't**." },
            { q: "The book ______ I borrowed from you was very interesting.", options: ["which", "who", "whom", "whose"], correct: 0, ext: "Đại từ quan hệ: Thay thế cho danh từ chỉ vật 'The book' làm tân ngữ cho vế sau -> dùng **which**." },
            { q: "The school has organized several campaigns to _____ awareness of environmental protection among students.", options: ["raise", "rise", "lift", "height"], correct: 0, ext: "Cụm từ: **raise awareness** (nâng cao nhận thức). Phân biệt với rise (tự tăng lên, không có tân ngữ đi kèm)." },
            { q: "- Mike: \"Would you like to have dinner with me?\". Jane: \"______\"", options: ["Yes, I'd love to", "Yes, so do I", "I'm very happy", "Yes, it is"], correct: 0, ext: "Giao tiếp: Lời đáp đồng ý cho câu mời mọc lịch sự (Would you like...) luôn là **Yes, I'd love to** (Vâng, tôi rất thích)." },
            { q: "You may borrow as many books as you like provided you show them to ______ is at the desk.", options: ["who", "whom", "whoever", "which"], correct: 2, ext: "Đại từ quan hệ: **whoever** (bất cứ ai). Cứ đưa thẻ cho 'bất cứ ai đang ngồi ở bàn đăng ký'." },
            { q: "Before you leave for the trip, make sure to ______ all the necessary documents and tickets.", options: ["bring up", "check out", "look over", "turn in"], correct: 2, ext: "Phrasal verb: **look over** (kiểm tra lại, xem lướt qua). Hãy đảm bảo kiểm tra lại tất cả giấy tờ." },
            { q: "With the entrance exam coming up next month, Nam has been _____ every night to ensure he gets into his dream school.", options: ["under the weather", "burning the midnight oil", "pulling someone's leg", "barking up the wrong tree"], correct: 1, ext: "Thành ngữ (Idiom): **burn the midnight oil** (thức khuya học tập/làm việc miệt mài). Nam đang thức khuya học bài để đậu trường mơ ước." },
            { q: "I'm going for a walk in the park. Would you like to ______ me company?", options: ["follow", "stay", "ward", "keep"], correct: 3, ext: "Cụm từ cố định: **keep someone company** (đi cùng ai đó cho họ đỡ buồn/có bầu có bạn)." },
            { q: "I wish you ______ stop interrupting me whenever I speak.", options: ["did", "would", "might", "will"], correct: 1, ext: "Ngữ pháp: Câu điều ước phàn nàn về hành động của người khác. Dùng **wish + S + would + V-bare**." },
            { q: "I am very interested in sarong - a traditional______ of Khmer people.", options: ["custom", "clothing", "clothes", "costume"], correct: 3, ext: "Từ vựng: Cụm từ quen thuộc **traditional costume** (trang phục truyền thống). Tôi rất thích xà rông - trang phục truyền thống của người Khmer." },
            { q: "She is tall and has _____ blue eyes.", options: ["a", "an", "the", "Ø"], correct: 3, ext: "Ngữ pháp: 'eyes' là danh từ đếm được số nhiều, và ở đây đang tả chung chung nên ta không dùng mạo từ **(Ø)**." },
            { q: "My brother lives in ______ small apartment in the city.", options: ["a", "an", "the", "Ø"], correct: 0, ext: "Ngữ pháp: Cụm danh từ 'small apartment' đếm được số ít, bắt đầu bằng phụ âm nên dùng mạo từ **a**." },
            { q: "I wish I ______ more about the logistics of the expedition.", options: ["would know", "knew", "know", "can know"], correct: 1, ext: "Ngữ pháp: Câu ước ở hiện tại (diễn tả sự tiếc nuối hiện tại). Động từ lùi về quá khứ đơn: **knew**." },
            { q: "He lives ______ New York City.", options: ["in", "on", "at", "to"], correct: 0, ext: "Giới từ: Giới từ **in** được dùng trước tên các thành phố, quốc gia, châu lục." },
            { q: "She made _____ mistakes on her math test last week.", options: ["much", "a lot", "a little", "a few"], correct: 3, ext: "Ngữ pháp: Lượng từ. 'mistakes' là danh từ đếm được số nhiều. Trong các đáp án, chỉ có **a few** (một vài) đi được với danh từ đếm được." },
            { q: "How ______ cups of tea do you drink every day?", options: ["much", "many", "little", "few"], correct: 1, ext: "Lượng từ: Từ để hỏi số lượng **How many** đi với danh từ đếm được số nhiều (cups). Bạn uống bao nhiêu tách trà mỗi ngày?" },
            { q: "The little girl ______ when she fell.", options: ["hurt himself", "hurt herself", "has hurt", "hurt"], correct: 1, ext: "Đại từ phản thân: Chủ ngữ là 'The little girl' (cô bé - giới tính nữ) nên dùng **hurt herself** (tự làm đau chính mình)." },
            { q: "This movie is not ______ as the previous one we watched.", options: ["more exciting", "as exciting", "the most exciting", "exciting"], correct: 1, ext: "Ngữ pháp: Cấu trúc so sánh bằng ở thể phủ định **not as + adj + as** (không thú vị bằng). Bộ phim này không thú vị bằng bộ trước." },
            { q: "My smartphone is _____ than the old one I had before.", options: ["good", "better", "the best", "as good"], correct: 1, ext: "Ngữ pháp: Câu so sánh hơn (than). Tính từ bất quy tắc 'good' đổi thành **better**." },
            { q: "I wanted to go for a walk, ______ it started raining.", options: ["and", "but", "so", "because"], correct: 1, ext: "Liên từ: Liên từ **but** (nhưng) diễn tả sự trái ngược. Tôi muốn đi dạo, NHƯNG trời lại bắt đầu mưa." },
            { q: "Listen to what I am saying, ______?", options: ["don't you", "do you", "did you", "will you"], correct: 3, ext: "Ngữ pháp: Câu hỏi đuôi cho câu mệnh lệnh (bắt đầu bằng động từ). Đuôi luôn là **will you**." },
            { q: "I have a friend ______ brother is a famous musician.", options: ["which", "who", "whom", "whose"], correct: 3, ext: "Đại từ quan hệ: Chỉ sự sở hữu. Tôi có một người bạn, người mà anh trai CỦA người bạn đó (whose brother) là nhạc sĩ nổi tiếng." },
            { q: "I didn't go to the party _____ I was feeling sick.", options: ["so", "because of", "because", "even though"], correct: 2, ext: "Liên từ: Đằng sau là một mệnh đề chỉ nguyên nhân (S + V) nên dùng **because** (bởi vì)." },
            { q: "-Nam: \"Would you like some more tea?\" ~ John: \"______\"", options: ["Yes, give me some", "Yes, you would", "No, I won't", "No, please"], correct: 3, ext: "Giao tiếp: Lời từ chối lịch sự cho một lời mời ăn uống, thường là 'No, thanks' hoặc **No, please**." },
            { q: "______ this medicine, and you'll be well again.", options: ["Have", "Drink", "Eat", "Take"], correct: 3, ext: "Từ vựng: Uống thuốc trong tiếng Anh không dùng 'drink' hay 'eat' mà dùng động từ **Take** (Take medicine)." },
            { q: "You can ______ the new words in the dictionary.", options: ["look for", "look after", "look up", "look at"], correct: 2, ext: "Phrasal verb: **look up** (tra cứu). Bạn có thể tra những từ mới trong từ điển." },
            { q: "The book _____ you lent me was not only fascinating but also informative.", options: ["which", "who", "whom", "whose"], correct: 0, ext: "Đại từ quan hệ: Thay thế cho danh từ chỉ vật 'The book' làm tân ngữ, ta dùng **which**." },
            { q: "We took ______ of the fine weather and spent the day on the beach.", options: ["chance", "advantage", "occasion", "effect"], correct: 1, ext: "Cụm từ cố định: **take advantage of** (tận dụng). Tận dụng thời tiết đẹp để dành cả ngày trên bãi biển." },
            { q: "Yoko feels ______ again after her illness but she still cannot work ______.", options: ["strong/ hardly", "strongly/ hard", "strongly/ hardly", "strong/ hard"], correct: 3, ext: "Ngữ pháp: Sau động từ nối 'feel' cần tính từ (strong). Sau động từ thường 'work' cần trạng từ (hard). Từ 'hardly' có nghĩa là 'hiếm khi' (sai nghĩa). Đáp án: **strong/ hard**." },
            { q: "\"Would you mind closing the window, please?\" - \"_____\"", options: ["Of course. Are you cold?", "No, not at all. I will close it now.", "Yes, I do. You can close it.", "Yes of course you can do it."], correct: 1, ext: "Giao tiếp: Đáp lại lời yêu cầu 'Would you mind...' (Bạn có phiền...). Để đồng ý giúp, ta trả lời 'Không phiền chút nào': **No, not at all**." },
            { q: "We used to ______ past the market on the way to school.", options: ["walk", "walked", "walking", "have walked"], correct: 0, ext: "Ngữ pháp: Cấu trúc **used to + V-nguyên thể** (Đã từng làm gì trong quá khứ)." },
            { q: "This song _____ memories of our field trip to the beach last semester.", options: ["hands down", "watches out", "brings back", "gets around"], correct: 2, ext: "Phrasal verb: **bring back memories** (gợi nhớ lại kỷ niệm). Bài hát này gợi lại ký ức về chuyến đi dã ngoại." },
            { q: "Remember to turn ______ the light when leaving the office.", options: ["off", "on", "down", "in"], correct: 0, ext: "Phrasal verb: Rời khỏi văn phòng thì hãy nhớ tắt đèn: **turn off**." },
            { q: "The policemen _____ him to go with them to the police station.", options: ["let", "caused", "made", "forced"], correct: 3, ext: "Ngữ pháp: Đằng sau là 'to go' (to V). Cấu trúc **force sb to V** (ép buộc ai đó làm gì). ('Let' và 'make' dùng V-bare)." },
            { q: "Ho Chi Minh City is the ______ one in the country.", options: ["larger", "large", "largest", "largely"], correct: 2, ext: "Ngữ pháp: Câu so sánh nhất có mạo từ 'the'. Dùng **largest** (Thành phố lớn nhất trong nước)." },
            { q: "Mrs Smith _____ her children the task of cleaning out the attic.", options: ["set", "took", "got", "assigned"], correct: 3, ext: "Từ vựng: **assign a task** (giao nhiệm vụ). Bà Smith giao cho các con nhiệm vụ dọn dẹp gác xép." },
            { q: "Lan is very tired. ______, she has to finish her assignment before going to bed.", options: ["Although", "So", "Therefore", "However"], correct: 3, ext: "Liên từ: Nằm giữa dấu phẩy và dấu chấm, thể hiện sự đối lập. Lan mệt. Tuy nhiên (**However**), cô ấy phải hoàn thành bài tập." },
            { q: "The pagoda is in a beautiful _____, close to the sea.", options: ["setting", "sight", "scenery", "view"], correct: 0, ext: "Từ vựng: **setting** (khung cảnh, bối cảnh xung quanh). Ngôi chùa nằm trong một khung cảnh tuyệt đẹp gần biển." },
            { q: "I suggest ______ some money for poor children.", options: ["raise", "to raise", "raised", "raising"], correct: 3, ext: "Ngữ pháp: Sau động từ Suggest là V-ing. Cấu trúc **Suggest + V-ing** (Gợi ý làm gì). Dùng **raising**." },
            { q: "My brother is _____ as my father, but he's still only sixteen.", options: ["taller than", "the tallest", "taller", "as tall"], correct: 3, ext: "Ngữ pháp: Câu so sánh ngang bằng: **as + adj + as**. Anh trai tôi cao bằng (as tall as) bố tôi." },
            { q: "Have you ever ______ a letter to the local authorities to complain about the public transport in your town?", options: ["wrote", "writing", "written", "write"], correct: 2, ext: "Ngữ pháp: Thì hiện tại hoàn thành. Cấu trúc: Have/has + S + PII. Phân từ 2 của write là **written**." },
            { q: "The meeting will begin _____ 9 a.m. in the conference room.", options: ["in", "on", "at", "of"], correct: 2, ext: "Ngữ pháp: Giới từ thời gian. Đứng trước giờ giấc cụ thể (9 a.m.) ta dùng giới từ **at**." },
            { q: "When are you ______ vacation with your family, Lan?", options: ["on", "by", "with", "to"], correct: 0, ext: "Cụm từ cố định: **be on vacation** (đang đi nghỉ mát). Khi nào bạn đi nghỉ cùng gia đình?" },
            { q: "Lan is meeting her friend Mai after class.\nLan: Thanks for helping me with my English homework yesterday.\nMai: \"_____\"", options: ["You're welcome!", "Don't worry.", "I agree with you.", "It sounds good!"], correct: 0, ext: "Giao tiếp: Đáp lại lời cảm ơn (Thanks for...). Lịch sự nhất là dùng **You're welcome!** (Không có gì đâu!)." },
            { q: "If you ______ late, you wouldn't finish your work.", options: ["come", "coming", "to come", "came"], correct: 3, ext: "Ngữ pháp: Câu điều kiện loại 2 (Vế sau có wouldn't finish). Vế If phải chia thì Quá khứ đơn: **came**." },
            { q: "She can't decide _____ she should go after finishing high school this year.", options: ["which", "what", "where", "how"], correct: 2, ext: "Từ để hỏi: Không thể quyết định việc 'nên đi đâu' (học trường nào/làm gì). Phù hợp nhất là **where** (đi đâu)." },
            { q: "Huong wishes she ______ free time to visit her close friend in hospital.", options: ["to have", "had", "have", "having"], correct: 1, ext: "Ngữ pháp: Câu ước hiện tại (trái thực tế). Động từ lùi 1 thì về quá khứ đơn: **had**." },
            { q: "The girl _____ bike was stolen yesterday looks very sad this morning.", options: ["which", "whose", "that", "whom"], correct: 1, ext: "Đại từ quan hệ chỉ sự sở hữu: **whose + Noun** (Chiếc xe đạp CỦA cô gái). Cô gái người mà có chiếc xe bị trộm trông rất buồn." },
            { q: "I think I've lost my new hat. I've ______ it everywhere but I can't find it.", options: ["looked out", "looked in", "looked on", "looked for"], correct: 3, ext: "Phrasal verb: **look for** (tìm kiếm). Tôi đã tìm nó khắp nơi nhưng không thấy." },
            { q: "She was late _____ the traffic was terrible on her way to school.", options: ["although", "because", "despite", "because of"], correct: 1, ext: "Liên từ: Vế sau là mệnh đề chỉ nguyên nhân (S + V) nên ta dùng **because** (bởi vì)." },
            { q: "I can't understand the French visitors. I wish I ______ French.", options: ["knew", "will know", "know", "have known"], correct: 0, ext: "Ngữ pháp: Câu ước hiện tại (thực tế là tôi không hiểu tiếng Pháp). Ước trái với hiện tại dùng thì quá khứ đơn: **knew**." },
            { q: "This hotel offers modern _____ such as free Wi-Fi, a gym, and a swimming pool.", options: ["transportation", "equipment", "furniture", "amenities"], correct: 3, ext: "Từ vựng: **amenities** (tiện nghi khách sạn). Khách sạn cung cấp các tiện nghi hiện đại như Wi-Fi, phòng gym." },
            { q: "The church ______ about 100 years ago.", options: ["is built", "was built", "will be built", "has been built"], correct: 1, ext: "Ngữ pháp: Bị động ở thì quá khứ đơn (dấu hiệu: 100 years ago). Nhà thờ 'được xây dựng' -> **was built**." },
            { q: "_____ loud noises at night can disturb both people and animals nearby.", options: ["an", "a", "the", "Ø (no article)"], correct: 3, ext: "Ngữ pháp: Mạo từ. 'noises' là danh từ đếm được số nhiều, chỉ sự việc nói chung (tiếng ồn lớn ban đêm), nên không dùng mạo từ **(Ø)**." },
            { q: "People in Israel are going to celebrate their festival ______ is called Passover.", options: ["whose", "who", "which", "where"], correct: 2, ext: "Đại từ quan hệ: Thay thế cho sự vật 'their festival', đóng vai trò chủ ngữ nên ta dùng **which**." },
            { q: "You should _____ a rest after working on your project for hours.", options: ["do", "take", "set", "go"], correct: 1, ext: "Cụm từ cố định: **take a rest** (nghỉ ngơi)." },
            { q: "______ I was really tired , I couldn't sleep.", options: ["Even though", "So", "Therefore", "Because of"], correct: 0, ext: "Liên từ: Đi liền với mệnh đề và mang ý nghĩa nhượng bộ (Mặc dù rất mệt, tôi không thể ngủ). Dùng **Even though**." },
            { q: "My father will _____ my brother from school after finishing his office work.", options: ["pick up", "get on", "pass down", "put on"], correct: 0, ext: "Phrasal verb: **pick up** (đón ai đó). Bố tôi sẽ đi đón em trai tôi sau giờ làm." },
            { q: "She asked me if I ______ a laptop computer the following day.", options: ["buy", "will buy", "bought", "would buy"], correct: 3, ext: "Ngữ pháp: Câu tường thuật (Reported Speech). Dấu hiệu 'the following day' (ngày hôm sau) -> Gốc là thì tương lai (will buy), lùi thì thành **would buy**." },
            { q: "The downtown area is still crowded with people and traffic _____ night.", options: ["in", "on", "at", "of"], correct: 2, ext: "Ngữ pháp: Giới từ. 'Vào ban đêm' luôn đi với cụm cố định **at night**." },
            { q: "I ______ telephone her if I knew her number.", options: ["would", "have to", "will", "shall"], correct: 0, ext: "Ngữ pháp: Câu điều kiện loại 2 (vế If chia quá khứ 'knew'). Vế chính phải dùng **would** + V. 'Tôi sẽ gọi cô ấy nếu tôi biết số'." },
            { q: "Rainforests are important _____ they help control the Earth's climate.", options: ["although", "because", "despite", "because of"], correct: 1, ext: "Liên từ: Chỉ nguyên nhân và theo sau là mệnh đề. Rừng mưa rất quan trọng **vì** chúng giúp kiểm soát khí hậu." },
            { q: "Honda motorbikes ______ in Viet Nam.", options: ["produce", "will produce", "are produced", "would be produced"], correct: 2, ext: "Ngữ pháp: Thể bị động ở thì hiện tại đơn (chỉ một sự thật). Xe máy Honda 'được sản xuất' tại VN -> **are produced**." },
            { q: "The embassy helped the tourist _____ lost their documents in a foreign country.", options: ["which", "whose", "whom", "who"], correct: 3, ext: "Đại từ quan hệ: Thay thế cho danh từ chỉ người 'the tourist', làm chủ ngữ cho động từ 'lost', ta dùng **who**." },
            { q: "We have learnt English ______ 2001.", options: ["for", "since", "in", "during"], correct: 1, ext: "Ngữ pháp: Hiện tại hoàn thành + mốc thời gian. Ta dùng giới từ **since** (từ năm 2001)." },
            { q: "Freddy is talking to his teacher in front of the class.\n- Freddy: I am sorry for being late. There was a serious jam.\n- Teacher: \"_____. Just be on time next time.\"", options: ["It's alright.", "Me, too.", "Of course!", "Thank you."], correct: 0, ext: "Giao tiếp: Đáp lại lời xin lỗi. Giáo viên nói **It's alright** (Không sao đâu, lần sau nhớ đi đúng giờ)." },
            { q: "_____ sure you lock the door before leaving the classroom today.", options: ["Take", "Make", "Get", "Put"], correct: 1, ext: "Cụm từ cố định: **Make sure** (Hãy đảm bảo/chắc chắn rằng). Hãy nhớ khóa cửa trước khi về." },
            { q: "Milk is one of _____ drinks for growing children.", options: ["as nourishing as", "nourishing than", "more nourishing", "the most nourishing"], correct: 3, ext: "Ngữ pháp: Cấu trúc 'One of + the + so sánh nhất'. Sữa là một trong những thức uống **bổ dưỡng nhất**." },
            { q: "My uncle works as _____ mechanic in a car repair shop downtown.", options: ["an", "a", "the", "Ø (no article)"], correct: 1, ext: "Ngữ pháp: Mạo từ chỉ nghề nghiệp. Mechanic (thợ máy) bắt đầu bằng phụ âm nên dùng mạo từ **a**." },
            { q: "She visited a(n) _____ agency to look for part-time job opportunities.", options: ["condition", "standard", "employment", "tradition"], correct: 2, ext: "Từ vựng: Cụm từ **employment agency** (trung tâm giới thiệu việc làm). Cô ấy tới trung tâm để tìm việc làm thêm." },
            { q: "The room _______ every morning.", options: ["is cleaned", "cleaned", "cleans", "is cleaning"], correct: 0, ext: "Ngữ pháp: Bị động của thì hiện tại đơn (dấu hiệu: every morning). Căn phòng 'được dọn' -> **is cleaned**." },
            { q: "We guarantee that you _______ with the performance of our new washing machine.", options: ["won't disappoint", "won't be disappointed", "will disappoint", "won't be disappointing"], correct: 1, ext: "Ngữ pháp: Bị động. Cảm xúc con người bị tác động thì dùng tính từ đuôi -ed. Bạn sẽ không bị làm cho thất vọng -> **won't be disappointed**." },
            { q: "_______ technology has advanced rapidly, people still prefer reading books in print.", options: ["Although", "In spite of", "However", "Despite"], correct: 0, ext: "Liên từ: Đứng trước một mệnh đề và mang nghĩa nhượng bộ (Mặc dù) -> Dùng **Although**." },
            { q: "Even though we arrived late, we didn't miss the first part of the speech.", options: ["Despite", "Even though", "In spite of", "However"], correct: 1, ext: "Liên từ: Thể hiện ý nghĩa nhượng bộ 'Mặc dù', và đi kèm một mệnh đề (S+V) -> **Even though**." },
            { q: "_______ her teacher said that she had to study more, she took the SAT (Scholastic Aptitude Test).", options: ["Despite", "Even though", "Therefore", "So that"], correct: 1, ext: "Liên từ: Đi với mệnh đề và mang ý nhượng bộ (Mặc dù cô giáo bảo phải học thêm, cô ấy vẫn quyết đi thi) -> **Even though**." },
            { q: "_______ hard she worked, Louise never managed to finish her homework on time.", options: ["Moreover", "However", "Although", "Despite"], correct: 2, ext: "Ngữ pháp: Cấu trúc đảo ngữ 'However + adv/adj + S + V' mang nghĩa 'Dù cho'. Dù cô ấy làm việc chăm chỉ đến đâu..." },
            { q: "He went ahead _______ all warnings about the danger of his mission.", options: ["due to", "in spite of", "instead of", "because of"], correct: 1, ext: "Ngữ pháp: Sau khoảng trống là cụm danh từ 'all warnings'. Để mang nghĩa 'bất chấp/mặc dù', ta dùng **in spite of**." },
            { q: "If you want to get a good night's sleep, you _______ lower your screen time on smartphones.", options: ["will", "won't", "shouldn't", "should"], correct: 3, ext: "Động từ khuyết thiếu: Đưa ra lời khuyên (bạn nên giảm thời gian nhìn màn hình) -> dùng **should**." },
            { q: "You _______ smoke here; it's forbidden.", options: ["mustn't", "don't have to", "shouldn't", "can't"], correct: 0, ext: "Động từ khuyết thiếu: Chỉ sự cấm đoán (forbidden). Bạn không được phép hút thuốc ở đây -> **mustn't**." },
            { q: "My father got _______ a hard job that he had to find another one after working for a few months.", options: ["very", "such", "too", "so"], correct: 1, ext: "Ngữ pháp: Cấu trúc **such + (a/an) + adj + noun + that...** (Đến nỗi mà). Bố tôi nhận một công việc vất vả đến nỗi mà..." },
            { q: "He is one of the most _______ people I have ever met. He never says anything interesting.", options: ["stressful", "preferable", "amazing", "boring"], correct: 3, ext: "Tính từ đuôi -ing: Miêu tả bản chất của một sự vật/con người gây ra cảm giác. Anh ta là một người nhàm chán -> **boring**." },
            { q: "How _______ do you have, Mrs. Parker?", options: ["many luggage", "many luggages", "much luggage", "much luggages"], correct: 2, ext: "Ngữ pháp: Danh từ 'luggage' (hành lý) là không đếm được. Do đó không thêm 's' và đi với lượng từ **much**." },
            { q: "We should use paper and other materials as _______ as we can.", options: ["economy", "economic", "economised", "economically"], correct: 3, ext: "Từ loại: Bổ nghĩa cho động từ 'use' (sử dụng) cần một trạng từ. **economically** (sử dụng một cách tiết kiệm)." },
            { q: "The Charity Foundation provides financial and _______ help for disabled children.", options: ["practice", "practised", "practical", "practising"], correct: 2, ext: "Từ loại: Nối với tính từ 'financial' bằng từ 'and' nên chỗ trống cũng phải là tính từ. **practical** (thiết thực). Sự giúp đỡ tài chính và thiết thực." },
            { q: "I'm sorry, but we do not have _______ knowledge about the new transit system of the city.", options: ["much", "many", "few", "little"], correct: 0, ext: "Ngữ pháp: 'knowledge' (kiến thức) là danh từ không đếm được. Trong câu phủ định thường dùng **much** (không có nhiều kiến thức)." },
            { q: "A lot of attention has been paid to the _______ of Duong Lam Ancient Village in the past decade.", options: ["conservation", "accomplishment", "assignment", "observation"], correct: 0, ext: "Từ vựng: **conservation** (sự bảo tồn). Nhiều sự chú ý đã được hướng đến việc bảo tồn Làng cổ Đường Lâm." },
            { q: "Drinking _______ of water while working out is important for staying hydrated.", options: ["a few", "a lot", "few", "no"], correct: 1, ext: "Ngữ pháp: Chỉ số lượng nhiều dùng cho danh từ không đếm được (water), và có giới từ 'of' đằng sau -> **a lot (of)**." },
            { q: "Students have a(n) _______ between learning French or German as a second foreign language.", options: ["choice", "opportunity", "difference", "variety"], correct: 0, ext: "Từ vựng: **have a choice between A and B** (có sự lựa chọn giữa A và B)." },
            { q: "Some parts of the temple are still _______ very well by local people.", options: ["promoted", "preserved", "celebrated", "observed"], correct: 1, ext: "Từ vựng: **preserve** (bảo tồn, giữ gìn). Một số phần của ngôi đền vẫn được người dân giữ gìn rất tốt." },
            { q: "Bai Dinh Pagoda includes many _______ built over a long period.", options: ["ingredients", "measures", "patterns", "structures"], correct: 3, ext: "Từ vựng: **structures** (các công trình kiến trúc). Chùa Bái Đính bao gồm nhiều công trình được xây dựng qua thời gian dài." },
            { q: "A _______ is a large strong building built by kings in the past.", options: ["castle", "temple", "pagoda", "church"], correct: 0, ext: "Từ vựng: **castle** (lâu đài). Lâu đài là một tòa nhà lớn, kiên cố do các vị vua xây dựng trong quá khứ." },
            { q: "Mount Everest is _______ on the border between China and Nepal.", options: ["founded", "placed", "positioned", "located"], correct: 3, ext: "Từ vựng: **be located** (tọa lạc tại, nằm ở vị trí). Đỉnh Everest nằm ở biên giới Trung Quốc và Nepal." },
            { q: "Angkor Wat in Cambodia is a World _______ Site.", options: ["Camping", "Construction", "Heritage", "Building"], correct: 2, ext: "Cụm từ cố định: **World Heritage Site** (Di sản thế giới)." },
            { q: "The landscape there is amazing, but boat is the only way to _______ it.", options: ["get access to", "enter", "admit", "open"], correct: 0, ext: "Từ vựng: **get access to** (tiếp cận, đi vào). Phong cảnh tuyệt vời, nhưng thuyền là cách duy nhất để đi vào đó." },
            { q: "The Taj Mahal is a _______ of love built by an emperor.", options: ["symbol", "sign", "mark", "token"], correct: 0, ext: "Từ vựng: **symbol of love** (biểu tượng của tình yêu)." },
            { q: "Ha Long Bay was _______ as a World Heritage Site by UNESCO.", options: ["named", "called", "recognized", "known"], correct: 2, ext: "Từ vựng: **recognized** (được công nhận). Vịnh Hạ Long được UNESCO công nhận là di sản thế giới." },
            { q: "The old town is a _______ mixture of different architectural styles.", options: ["unique", "single", "only", "alone"], correct: 0, ext: "Từ vựng: **unique** (độc đáo, có một không hai). Phố cổ là một sự pha trộn độc đáo của các phong cách kiến trúc." },
            { q: "Can you help me translate this phrasal verb _______ Vietnamese?", options: ["over", "in", "into", "up"], correct: 2, ext: "Giới từ: **translate something into...** (dịch cái gì đó sang ngôn ngữ nào)." },
            { q: "She _______ up the language from other workers while working.", options: ["copied", "picked", "looked", "went"], correct: 1, ext: "Phrasal verb: **pick up** (học lỏm, tiếp thu tự nhiên mà không qua đào tạo). Cô ấy tự học được ngôn ngữ từ các công nhân khác." },
            { q: "Before an exam, I usually _______ over the grammatical points.", options: ["look", "pick", "go", "copy"], correct: 2, ext: "Phrasal verb: **go over** (ôn tập lại, xem xét lại). Trước kỳ thi, tôi thường ôn lại điểm ngữ pháp." },
            { q: "My grandparents don't believe in a(n) _______ relationship.", options: ["extended", "democratic", "personal", "interesting"], correct: 1, ext: "Từ vựng: **democratic relationship** (quan hệ dân chủ, bình đẳng). Ông bà tôi không tin vào việc bình đẳng (cha mẹ - con cái) trong gia đình." },
            { q: "In my grandfather's _______, people travelled mostly by bike.", options: ["age", "generation", "past", "year"], correct: 1, ext: "Từ vựng: **generation** (thế hệ). Ở thế hệ của ông tôi, mọi người chủ yếu đi bằng xe đạp." },
            { q: "Older people prefer newspapers while younger people get news from the Internet. That's a _______.", options: ["conflict", "attitude", "mass communication", "generation gap"], correct: 3, ext: "Cụm danh từ: **generation gap** (khoảng cách thế hệ, sự khác biệt về tư tưởng giữa các thế hệ)." },
            { q: "When I started learning English, I had to _______ up words in a dictionary.", options: ["look", "pick", "go", "copy"], correct: 0, ext: "Phrasal verb: **look up** (tra cứu). Tra từ trong từ điển." },
