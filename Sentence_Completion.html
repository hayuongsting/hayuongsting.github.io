            { q: "Our beliefs have been _______ orally for thousands of years.", options: ["shown around", "cheered up", "passed down", "taken off"], correct: 2, ext: "Phrasal verb: **pass down** (truyền lại cho thế hệ sau). Tín ngưỡng của chúng tôi được truyền miệng qua hàng ngàn năm." },
            { q: "He _______ up his mind to become a doctor.", options: ["took", "made", "gave", "set"], correct: 1, ext: "Thành ngữ: **make up one's mind** (đưa ra quyết định). Anh ấy quyết định trở thành bác sĩ." },
            { q: "Don't _______ up hope; things will get better.", options: ["give", "lose", "put", "take"], correct: 0, ext: "Phrasal verb: **give up** (từ bỏ). Đừng từ bỏ hy vọng." },
            { q: "I _______ into an old friend at the supermarket yesterday.", options: ["ran", "went", "met", "came"], correct: 0, ext: "Phrasal verb: **run into** (tình cờ gặp ai đó)." },
            { q: "Her son has died in an accident. It will take her a long time to _______ this shock.", options: ["come down", "turn into", "get over", "get in"], correct: 2, ext: "Phrasal verb: **get over** (vượt qua một nỗi buồn, cú sốc, hoặc bệnh tật)." },
            { q: "Families used to live in one-room houses and had little _______.", options: ["time", "understanding", "privacy", "opportunity"], correct: 2, ext: "Từ vựng: **privacy** (sự riêng tư). Sống trong những ngôi nhà chỉ có 1 phòng thì có rất ít sự riêng tư." },
            { q: "Mother Earth _______ us with air to breathe and food to eat.", options: ["keeps", "protects", "provides", "produces"], correct: 2, ext: "Cấu trúc: **provide sb with sth** (cung cấp cho ai cái gì). Mẹ thiên nhiên cung cấp cho chúng ta không khí và thức ăn." },
            { q: "One way to _______ awareness is to follow the 3Rs.", options: ["rise", "preserve", "protect", "raise"], correct: 3, ext: "Cụm từ: **raise awareness** (nâng cao nhận thức). (Rise là nội động từ, tự tăng lên, không có tân ngữ)." },
            { q: "Pesticides can affect the whole _______ by entering plants first.", options: ["flora and fauna", "food chain", "habitat", "food tour"], correct: 1, ext: "Từ vựng: **food chain** (chuỗi thức ăn). Thuốc trừ sâu đi vào thực vật và sẽ ảnh hưởng toàn bộ chuỗi thức ăn." },
            { q: "To keep the ecologies on Earth in _______, protect natural resources.", options: ["reserve", "balance", "good", "protection"], correct: 1, ext: "Cụm từ: **in balance** (ở trạng thái cân bằng). Giữ cho hệ sinh thái được cân bằng." },
            { q: "Climate change is a _______ threat to our planet.", options: ["global", "world", "local", "regional"], correct: 0, ext: "Từ vựng: **global threat** (mối đe dọa toàn cầu). Biến đổi khí hậu đe dọa toàn bộ hành tinh." },
            { q: "We should use _______ energy sources like wind and solar.", options: ["reusable", "renewable", "recyclable", "returnable"], correct: 1, ext: "Từ vựng: Cụm từ chuyên ngành **renewable energy** (năng lượng tái tạo) như gió và mặt trời." },
            { q: "Many ethnic minority groups find it hard to _______ their own languages.", options: ["protect", "maintain", "guard", "defend"], correct: 1, ext: "Từ vựng: **maintain a language** (duy trì ngôn ngữ). Nhiều dân tộc thiểu số gặp khó khăn trong việc duy trì tiếng mẹ đẻ." },
            { q: "Once _______ environmental damage is done, it takes many years for the system to recover.", options: ["the", "a", "an", "Ø"], correct: 3, ext: "Ngữ pháp: 'environmental damage' đang được nói đến chung chung, không đếm được nên ta không dùng mạo từ **(Ø)**." },
            { q: "They didn't sell the family-owned workshop; they _______ it to the next generation.", options: ["passed it on", "kept it up", "carried it out", "moved it up"], correct: 0, ext: "Phrasal verb: **pass on to** (truyền lại, để lại cho thế hệ sau)." },
            { q: "It's difficult to _______ what our lives would be like without the Internet.", options: ["expect", "imagine", "remember", "see"], correct: 1, ext: "Từ vựng: **imagine** (tưởng tượng). Thật khó để tưởng tượng cuộc sống sẽ ra sao nếu không có Internet." },
            { q: "Tell me _______ to press the button.", options: ["what", "when", "who", "where"], correct: 1, ext: "Từ để hỏi đi với động từ: **When to press** (Hãy nói cho tôi biết 'khi nào' thì phải nhấn nút)." },
            { q: "I enjoy watching local _______ shows when on holiday.", options: ["culture", "cultured", "cultural", "culturally"], correct: 2, ext: "Từ loại: Đứng trước danh từ 'shows' cần một tính từ bổ nghĩa. **cultural** (thuộc về văn hóa)." },
            { q: "She is very _______; she always helps everyone.", options: ["kind", "rude", "selfish", "lazy"], correct: 0, ext: "Từ vựng: Cô ấy luôn giúp đỡ mọi người, suy ra cô ấy là người **kind** (tốt bụng)." },
            { q: "He is _______ for his new job starting next week.", options: ["excited", "exciting", "excite", "excitement"], correct: 0, ext: "Tính từ đuôi -ed: Chỉ cảm xúc con người bị tác động (cảm thấy hào hứng). Dùng **excited**." },
            { q: "The water in this river is heavily _______.", options: ["pollute", "pollution", "polluted", "pollutant"], correct: 2, ext: "Từ loại: Đứng sau trạng từ 'heavily' cần một tính từ. **polluted** (bị ô nhiễm nặng)." },
            { q: "This is the most _______ book I have ever read.", options: ["interest", "interesting", "interested", "interestingly"], correct: 1, ext: "Tính từ đuôi -ing: Miêu tả tính chất của một vật (quyển sách thú vị). Dùng **interesting**." },
            { q: "The film was so _______ that I fell asleep.", options: ["bored", "boring", "bore", "boredom"], correct: 1, ext: "Tính từ đuôi -ing: Tính chất của bộ phim gây ra sự chán nản. Dùng **boring**." },
            { q: "He _______ a lot of money on clothes.", options: ["spends", "takes", "costs", "pays"], correct: 0, ext: "Cấu trúc: **spend money/time on something** (dành tiền/thời gian vào việc gì)." },
            { q: "It's a _______ to meet you.", options: ["please", "pleased", "pleasing", "pleasure"], correct: 3, ext: "Từ loại: Đứng sau mạo từ 'a' cần một danh từ. **pleasure** (Rất hân hạnh được gặp bạn)." },
            { q: "The sun _______ in the East.", options: ["rise", "rises", "rose", "rising"], correct: 1, ext: "Ngữ pháp: Một chân lý, sự thật hiển nhiên (Mặt trời mọc hướng Đông) dùng thì Hiện tại đơn: **rises**." },
            { q: "He _______ to work every day.", options: ["walk", "walks", "walking", "walked"], correct: 1, ext: "Ngữ pháp: Thói quen ở hiện tại (every day), chủ ngữ ngôi 3 số ít 'He' -> thêm 's': **walks**." },
            { q: "They have to _______ the rules of the school.", options: ["follow", "keep", "obey", "do"], correct: 2, ext: "Từ vựng: **obey the rules** (tuân thủ luật lệ, nội quy). (Follow the rules cũng chấp nhận được nhưng obey mạnh mẽ và trang trọng hơn trong bối cảnh học đường)." },
            { q: "Tacos, a kind of Mexican _______, are delicious with seasoned meat and toppings.", options: ["handicraft", "fast food", "traditional dancing", "speciality food"], correct: 3, ext: "Từ vựng: Taco là một loại **speciality food** (món ăn đặc sản truyền thống) của Mexico." },
            { q: "You can buy dairy _______ in this open-air market.", options: ["producers", "production", "products", "productivity"], correct: 2, ext: "Từ vựng: **dairy products** (các sản phẩm làm từ sữa như bơ, phô mai...)." },
            { q: "My sister's hobby is _______ old postcards.", options: ["composing", "including", "taking", "collecting"], correct: 3, ext: "Từ vựng: **collecting** (sưu tầm). Sở thích là sưu tầm bưu thiếp cũ." },
            { q: "David must be out of the _______ of arriving late for meetings.", options: ["habit", "custom", "tradition", "fashion"], correct: 0, ext: "Cụm từ: **out of the habit** (bỏ được thói quen). David chắc hẳn đã bỏ được thói quen đi họp trễ." },
            { q: "The tickets for the performance are _______ from the box office.", options: ["available", "acceptable", "found", "offered"], correct: 0, ext: "Từ vựng: **available** (có sẵn, có thể mua/lấy được). Vé có sẵn tại quầy vé." },
            { q: "A museum should aim to _______ as well as educate.", options: ["enjoy", "entertain", "benefit", "please"], correct: 1, ext: "Từ vựng: Đi song song với 'educate' (giáo dục) là **entertain** (giải trí). Bảo tàng nên mang tính giải trí lẫn giáo dục." },
            { q: "They are considering _______ the house before the prices go up.", options: ["buy", "to buy", "bought", "buying"], correct: 3, ext: "Ngữ pháp: **Consider + V-ing** (Cân nhắc việc làm gì). Họ cân nhắc việc mua nhà." },
            { q: "To be healthy, try to _______ the amount of fat in your diet.", options: ["rise", "reduce", "reject", "refuse"], correct: 1, ext: "Từ vựng: **reduce** (giảm bớt). Hãy giảm bớt lượng chất béo để khỏe mạnh." },
            { q: "They say it will be _______ to drive a car through the city in the rush hour because of the traffic jams.", options: ["possible", "impossible", "possibly", "impossibility"], correct: 1, ext: "Từ vựng: Đường tắc nghẽn giờ cao điểm nên việc lái xe qua thành phố là điều 'không thể'. **impossible**." },
            { q: "When he arrived at the hotel, _______.", options: ["he asked for a room", "a room is waiting for him", "he will have a room to stay", "he was going to ask a room"], correct: 0, ext: "Ngữ pháp: Kể lại chuỗi hành động xảy ra nối tiếp trong quá khứ. Cùng dùng Quá khứ đơn: Khi anh ấy đến, anh ấy đã yêu cầu 1 phòng (**he asked...**)." },
            { q: "How close parents are to their children _______ a strong influence on the character of the children.", options: ["gets", "has", "emphasizes", "affects"], correct: 1, ext: "Cụm từ: **have an influence on** (có ảnh hưởng tới ai/cái gì). Mức độ gần gũi của cha mẹ có ảnh hưởng lớn tới tính cách con trẻ." },
            { q: "My brother received an iPhone as a _______ on his birthday.", options: ["present", "money", "reward", "bonus"], correct: 0, ext: "Từ vựng: **present = gift** (món quà). Anh trai nhận iPhone như một món quà sinh nhật." },
            { q: "If the sun shines, we'll go on _______ outing to the suburb.", options: ["the", "a", "an", "Ø"], correct: 2, ext: "Ngữ pháp: Mạo từ. 'outing' là danh từ đếm được số ít, bắt đầu bằng nguyên âm 'o', dùng mạo từ **an**." },
            { q: "It is honest of him to return _______.", options: ["a wallet back to its original owner", "to its original owner the wallet", "the wallet to its originally owner", "the wallet to its original owner"], correct: 3, ext: "Ngữ pháp: Trật tự từ. **Return something to somebody** (Trả lại cái gì cho ai đó). Và 'original owner' là cụm danh từ đúng (tính từ + danh từ)." },
            { q: "None of the servants were _______ when Mr. Smith wanted to send a message.", options: ["available", "attainable", "approachable", "applicable"], correct: 0, ext: "Từ vựng: **available** (rảnh rỗi, có mặt để làm việc). Không người hầu nào có mặt ở đó khi ông Smith gọi." },
            { q: "The captain wasn't keen _______ having the new player in the team.", options: ["about", "over", "on", "for"], correct: 2, ext: "Giới từ: Cụm tính từ **be keen on** (yêu thích, hứng thú với điều gì)." },
            { q: "It is our father's birthday and we are going out for a meal to _______.", options: ["organize", "arrange", "observe", "celebrate"], correct: 3, ext: "Từ vựng: **celebrate** (ăn mừng, kỷ niệm). Đi ăn một bữa để ăn mừng sinh nhật bố." },
            { q: "Our school organized a list of fun activities for the summer camp, including sports, games, and _______.", options: ["museums", "reading", "competitions", "schedules"], correct: 2, ext: "Từ vựng: Các hoạt động vui chơi cắm trại bao gồm thể thao, trò chơi và các cuộc thi **(competitions)**." },
            { q: "Sara was _______ when she received the award for the best student.", options: ["excited", "surprising", "worthy", "afraid"], correct: 0, ext: "Từ vựng: Nhận giải thưởng học sinh giỏi nên Sara rất vui sướng, phấn khích (**excited**)." },
            { q: "My grandmother didn't work outside her home _______ she was young. She only did her jobs in the house.", options: ["when", "for the time", "as soon as", "whenever"], correct: 0, ext: "Liên từ: Dùng **when** (khi) để dẫn vào một mệnh đề chỉ thời điểm trong quá khứ (Khi bà còn trẻ)." },
            { q: "He was told he could join the Volunteer Group when he _______ old enough.", options: ["would be", "should be", "was", "were"], correct: 2, ext: "Ngữ pháp: Mệnh đề chỉ thời gian trong câu tường thuật ở quá khứ (khi cậu ấy đủ tuổi) -> Dùng quá khứ đơn **was**." },
            { q: "The fire is going to go out. Can you go and get _______ wood?", options: ["any", "some", "a", "much"], correct: 1, ext: "Ngữ pháp: Mặc dù là câu hỏi, nhưng đây mang tính chất yêu cầu/đề nghị (Can you...) nên ta dùng **some** thay vì any." },
            { q: "When a volcano has been long _______ and its vent seems to be closed, it is said to be extinct.", options: ["acting", "active", "action", "inactive"], correct: 3, ext: "Từ vựng: Một ngọn núi lửa đã ngưng hoạt động (**inactive**) lâu dài thì được xem là đã tắt/chết." },
            { q: "John: I can show you how to design your poster about public amenities if you want.\nHelen: _______", options: ["Yes, it's fine.", "No problems.", "You're welcome.", "Oh, that's nice of you."], correct: 3, ext: "Giao tiếp: Đáp lại lời đề nghị giúp đỡ nhiệt tình. **Oh, that's nice of you** (Ồ, bạn thật tốt bụng)." },
            { q: "Tom: Okay, so to start the presentation, you'll need to introduce your topic and state your thesis. Got it?\nJane: _______", options: ["It's nice of you to say so.", "No worries.", "OK. I got what you mean.", "Sorry for the inconvenience."], correct: 2, ext: "Giao tiếp: Đáp lại câu hỏi 'Got it?' (Hiểu chưa?). Jane xác nhận đã hiểu: **OK. I got what you mean** (OK, tôi hiểu ý bạn)." },
            { q: "Anna: Is it necessary for us to have an English test next week?\nTeacher: _______", options: ["I'm sorry, it is. Remember to revise Unit 4.", "Sure, let's study literature instead of English.", "You don't need to learn the grammar of this unit.", "No, thank you. They can do it by themselves."], correct: 0, ext: "Giao tiếp: Học sinh hỏi bài kiểm tra có bắt buộc không. Giáo viên xác nhận lịch sự việc không mong muốn: **I'm sorry, it is** (Xin lỗi em, là bắt buộc đó)." },
            { q: "- \"What shall we do this weekend?\" - \"._______ \"", options: ["No problem", "Let's go outing to the zoo", "Oh, that's good", "I'll go out for dinner"], correct: 1, ext: "Giao tiếp: Gợi ý hoạt động cuối tuần. Dùng cấu trúc **Let's + V** (Hãy đi chơi sở thú nhé)." },
            { q: "- \"Congratulations on your winning!\" – \"_______\"", options: ["You are a good friend", "You are welcome", "Thank you", "I'm very happy"], correct: 2, ext: "Giao tiếp: Đáp lại lời chúc mừng (Congratulations!). Rất đơn giản, hãy nói **Thank you** (Cảm ơn bạn)." },
            { q: "- \"Do you mind carrying this box upstairs?\" – \"_______\"", options: ["Not at all.", "No way.", "Why not?", "I do."], correct: 0, ext: "Giao tiếp: Đáp lại câu hỏi 'Bạn có phiền...'. Để đồng ý giúp, ta trả lời 'Không phiền chút nào': **Not at all**." },
            { q: "- Shop keeper: \"_______ do you want?\" - Customer: \"Medium\".", options: ["What colour", "How much", "Which size", "Whose shoes"], correct: 2, ext: "Giao tiếp: Khách hàng trả lời là 'Medium' (Cỡ vừa, cỡ M). Vậy người bán hàng đã hỏi cỡ nào (**Which size**)." },
            { q: "- \"Would you like me to give you a hand?\" – \"_______\"", options: ["Yes, the work is very hard.", "No. I wouldn't like it.", "Certainly. You're a good man.", "Thank you. That's very kind of you."], correct: 3, ext: "Giao tiếp: Lại là đáp lại lời đề nghị giúp đỡ. Câu lịch sự nhất là **Thank you. That's very kind of you** (Cảm ơn, bạn thật tốt)." },
            { q: "- Foreigner: \"Can you show me the way to the nearest Internet café?\" - Mai: \"_______\".", options: ["Yes, it's quite near here", "Turn left and then turn right", "Three kilometres from here", "It's very far"], correct: 1, ext: "Giao tiếp: Chỉ đường cho khách du lịch. **Turn left and then turn right** (Rẽ trái rồi rẽ phải)." },
            { q: "Anna: \"I'm going to visit the zoo this weekend!\" - John: \"_______\"", options: ["Thanks for your advice.", "No worries.", "Sounds fun! Have a great time!", "How boring!"], correct: 2, ext: "Giao tiếp: Khi ai đó hào hứng kể về kế hoạch đi chơi, hãy chúc họ đi vui vẻ: **Sounds fun! Have a great time!**." },
            { q: "Tom: \"Thank you very much for your lovely gift! I really like it.\" - Maria: \"_______\"", options: ["I'm pleased", "Oh, it's OK", "You're welcome", "It's not good"], correct: 2, ext: "Giao tiếp: Khi ai đó cảm ơn mình vì món quà, câu đáp kinh điển nhất là **You're welcome** (Không có chi)." },
            { q: "- \"I think our lives are becoming more dependent on computers and smartphones.\" – \"_______\"", options: ["You go too far, it is a lot of fun.", "I can't imagine life without them.", "I agree with you, they affect us much.", "I suggest reading electronic books."], correct: 2, ext: "Giao tiếp: Tán thành một quan điểm (Tôi nghĩ cuộc sống ngày càng phụ thuộc thiết bị thông minh). Phản hồi: **I agree with you...** (Tôi đồng ý với bạn)." },
            { q: "Our grandmother's illness was ________ than we thought at first.", options: ["serious", "the most serious", "more serious", "the more serious"], correct: 2, ext: "Ngữ pháp: Cấu trúc so sánh hơn với tính từ dài (serious) -> **more serious than**." },
            { q: "The teacher explained so much stuff in just one lesson that most of the students could ________ only half of it.", options: ["let in", "get in", "take in", "break in"], correct: 2, ext: "Phrasal verb: **take in** (hiểu, tiếp thu kiến thức). Học sinh chỉ có thể tiếp thu một nửa." },
            { q: "This book is not really ________. It is a waste of money buying it.", options: ["inform", "informative", "informatively", "information"], correct: 1, ext: "Từ loại: Sau to be 'is' và trạng từ 'really' cần một tính từ. **informative** (cung cấp nhiều thông tin hữu ích)." },
            { q: "- Tom: \"I'm afraid I can't finish the task by today.\"\n- Linda: \"________. Let me know if you need an extra hand.\"", options: ["Don't push yourself too hard", "Take your time; there's no strict deadline", "I can't agree with you more about that", "Don't make a mountain out of a molehill"], correct: 0, ext: "Giao tiếp: Linda khuyên Tom không nên cố quá sức (**Don't push yourself too hard**) và đề nghị giúp đỡ." },
            { q: "The acupoints are stimulated ________ the healing capability of the body itself.", options: ["enhance", "to enhance", "enhancing", "to enhancing"], correct: 1, ext: "Ngữ pháp: Động từ nguyên thể có 'to' chỉ mục đích. Các huyệt được kích thích **để tăng cường** (to enhance) khả năng tự chữa lành." },
            { q: "Nylon is ________ man-made fibre, the use of which has helped ________ more people to have cheaper and more colourful clothes to wear.", options: ["a - the", "a - Ø", "an - the", "the - a"], correct: 1, ext: "Ngữ pháp: 'man-made fibre' số ít đếm được, dùng 'a'. 'more people' danh từ số nhiều nói chung, không dùng mạo từ (**Ø**)." },
            { q: "________, they will have done their homework.", options: ["When you finish cooking", "By the time you finish cooking", "Finishing cooking", "As you finished cooking"], correct: 1, ext: "Ngữ pháp: Cấu trúc sự phối hợp thì với **By the time + Hiện tại đơn, Tương lai hoàn thành** (Vào lúc bạn nấu xong, họ sẽ làm xong bài tập)." },
            { q: "If you ________ any further delays, we ________ be able to guarantee that the project ________ on schedule.", options: ["experience - won't - will stay", "will experience - will - stays", "experience - wouldn't - stayed", "experienced - won't - stays"], correct: 0, ext: "Ngữ pháp: Câu điều kiện loại 1 diễn tả sự việc có thể xảy ra ở hiện tại hoặc tương lai. Vế If dùng Hiện tại đơn, vế chính dùng Tương lai đơn." },
            { q: "Every year, heavy rains affect the central-eastern provinces of Vietnam and cause ________.", options: ["floods", "droughts", "earthquakes", "eruptions"], correct: 0, ext: "Từ vựng: **floods** (lũ lụt). Mưa lớn gây ra lũ lụt." },
            { q: "I saw a beautiful bird while I ________ in the park this morning.", options: ["walked", "have walked", "had walked", "was walking"], correct: 3, ext: "Ngữ pháp: Hành động đang diễn ra trong quá khứ (was walking) thì hành động khác xen vào (saw)." },
            { q: "During Tet holiday, many Vietnamese families visit pagodas ________ than on other occasions.", options: ["more frequent", "more frequently", "frequenter", "as frequently"], correct: 1, ext: "Ngữ pháp: Động từ thường 'visit' đi với trạng từ, so sánh hơn của trạng từ dài là **more frequently**." },
            { q: "I wish I ________ you but I'm too busy at the moment.", options: ["have helped", "could help", "can help", "would help"], correct: 1, ext: "Ngữ pháp: Câu ước trái với hiện tại ('at the moment'), động từ lùi về quá khứ ('can' thành **could**)." },
            { q: "A: Can I borrow your book on the Galapagos Islands?\nB: \"________\"", options: ["Certainly. You can't.", "Yes. Why don't you?", "Never. I forget.", "Sure. Here you are."], correct: 3, ext: "Giao tiếp: Đồng ý cho mượn đồ. **Sure. Here you are** (Chắc chắn rồi. Của bạn đây)." },
            { q: "Planet Earth, ________ is the third planet from the Sun, is known for its diverse ecosystems and abundant natural resources.", options: ["what", "who", "whose", "which"], correct: 3, ext: "Đại từ quan hệ: Thay thế cho danh từ chỉ vật 'Planet Earth' trong mệnh đề quan hệ không xác định (có dấu phẩy) -> **which**." },
            { q: "Many of the gases which are produced by factories are ________ to our health.", options: ["harmful", "destructive", "disastrous", "unreliable"], correct: 0, ext: "Từ vựng: **be harmful to** (có hại cho). Nhiều khí thải nhà máy có hại cho sức khỏe." },
            { q: "Tessa has so ________ homework that she can't go out with us.", options: ["many", "plenty", "little", "much"], correct: 3, ext: "Ngữ pháp: 'homework' là danh từ không đếm được, dùng **much** trong cấu trúc 'so much ... that' (quá nhiều... đến nỗi mà)." },
            { q: "There's a lack ________ information about the new policy.", options: ["in", "on", "at", "of"], correct: 3, ext: "Giới từ: **a lack of** (sự thiếu hụt cái gì)." },
            { q: "\"He showed me the park yesterday,\" the girls said.\n- The girls said that he ________ her the park the day before.", options: ["had shown", "show", "were showing", "showed"], correct: 0, ext: "Ngữ pháp: Câu tường thuật (Reported Speech). Thì quá khứ đơn 'showed' lùi một thì thành quá khứ hoàn thành **had shown**." },
            { q: "The grass on Wimbledon Center courses ________ carefully on a regular basis.", options: ["maintains", "maintained", "are maintained", "is maintained"], correct: 3, ext: "Ngữ pháp: Câu bị động thì hiện tại đơn (on a regular basis). 'Grass' (cỏ) là danh từ không đếm được -> **is maintained**." },
            { q: "The ________ of penicillin changed modern medicine.", options: ["discovery", "admiration", "competition", "injection"], correct: 0, ext: "Từ vựng: **discovery** (sự khám phá/phát hiện). Việc phát hiện ra penicillin đã thay đổi nền y học." },
            { q: "A ________ history is a history that is under the surface that people might not think about.", options: ["ridden", "hidden", "driven", "broken"], correct: 1, ext: "Từ vựng: **hidden history** (lịch sử ẩn giấu/bị chôn vùi)." },
            { q: "They plan to ________ the old theatre to restore its original beauty.", options: ["bury", "renovate", "accommodate", "excavate"], correct: 1, ext: "Từ vựng: **renovate** (cải tạo, trùng tu). Họ lên kế hoạch trùng tu nhà hát cũ." },
            { q: "________ never goes away if you don't have proper treatments.", options: ["Fear", "Disorder", "Anxiety", "Phobia"], correct: 3, ext: "Từ vựng: **Phobia** (chứng ám ảnh sợ hãi) sẽ không bao giờ biến mất nếu không điều trị đúng cách." },
            { q: "________ plan to excavate the ancient ruins next month.", options: ["Psychologists", "Archaeologists", "Astronomers", "Economists"], correct: 1, ext: "Từ vựng: **Archaeologists** (Các nhà khảo cổ học) lên kế hoạch khai quật tàn tích cổ." },
            { q: "\"I am sure it won't rain,\" she told me.", options: ["She said that she was sure it won't rain.", "She says that she was sure it won't rain.", "She said that she was sure it wouldn't rain.", "She said that she is sure it wouldn't rain."], correct: 2, ext: "Ngữ pháp: Câu tường thuật. Lùi thì 'am' -> 'was', 'won't' -> 'wouldn't'. -> **She said that she was sure it wouldn't rain**." },
            { q: "Jim: \"Has your truck been fixed, or is it still being worked on?\"\nJenny: \"________\"", options: ["It was repaired today.", "Please use the truck instead.", "Her truck had been fixed that night.", "It will be booked up."], correct: 0, ext: "Giao tiếp: Jim hỏi xe tải đã sửa xong chưa. Jenny trả lời: **It was repaired today** (Nó đã được sửa xong hôm nay)." },
            { q: "This is the first time I ________ such a good movie.", options: ["am seeing", "was seeing", "have seen", "saw"], correct: 2, ext: "Ngữ pháp: Cấu trúc 'This is the first time + S + HTHT' -> **have seen**." },
            { q: "They haven't decided where ________ for their holiday yet.", options: ["going", "to go", "to going", "go"], correct: 1, ext: "Ngữ pháp: Từ để hỏi (where/what/how...) + **to V** (chưa quyết định sẽ đi đâu)." },
            { q: "Mathematics is ________ subject that requires a lot of practice.", options: ["a", "the", "an", "Ø (no article)"], correct: 0, ext: "Ngữ pháp: Mạo từ **a** đứng trước cụm danh từ đếm được số ít (một môn học)." },
            { q: "While we ________ dinner, someone knocked at the door.", options: ["had", "were having", "are having", "have"], correct: 1, ext: "Ngữ pháp: Hành động đang xảy ra (were having) thì có hành động khác xen vào (knocked)." },
            { q: "That television program is not only ________ but also entertaining.", options: ["convenient", "informative", "necessary", "economical"], correct: 1, ext: "Từ vựng: Cấu trúc 'not only... but also' (không những... mà còn) nối 2 từ cùng tính chất. Chương trình truyền hình không những **informative** (cung cấp nhiều thông tin) mà còn giải trí." },
            { q: "Despite having a good job, she is not satisfied with her salary and wishes she ________ more money.", options: ["earns", "earned", "will earn", "is earning"], correct: 1, ext: "Ngữ pháp: Câu điều ước ở hiện tại (trái thực tế). Động từ lùi về quá khứ đơn -> **earned**." },
            { q: "Jack is not at home. He ________ go somewhere with Mary. I'm not sure.", options: ["should", "will", "must", "might"], correct: 3, ext: "Động từ khuyết thiếu: Có cụm 'I'm not sure' (Tôi không chắc) chỉ sự phỏng đoán không chắc chắn -> dùng **might**." },
            { q: "She suggested ________ a project about preserving natural environment.", options: ["doing", "to do", "should do", "do"], correct: 0, ext: "Ngữ pháp: Cấu trúc **suggest + V-ing** (đề xuất làm việc gì)." },
            { q: "Wearing uniform encourages students to be proud ________ being students of their school.", options: ["to", "with", "for", "of"], correct: 3, ext: "Giới từ: Cụm tính từ **be proud of** (tự hào về điều gì)." },
            { q: "If it ________ tomorrow, we will cancel the picnic.", options: ["rains", "rained", "will rain", "is raining"], correct: 0, ext: "Ngữ pháp: Câu điều kiện loại 1 (diễn tả sự việc có thể xảy ra). Mệnh đề If chia thì hiện tại đơn -> **rains**." },
            { q: "The new appliance both works ________ and saves energy.", options: ["effect", "effective", "effectively", "effectiveness"], correct: 2, ext: "Từ loại: Bổ nghĩa cho động từ 'works' cần một trạng từ -> **effectively** (hoạt động một cách hiệu quả)." },
            { q: "When visiting a new place, you should take ________ pictures to keep memories of your trip.", options: ["some", "none", "every", "lots"], correct: 0, ext: "Lượng từ: Khuyên nên chụp 'một vài' bức ảnh -> **some pictures**. (Không dùng 'lots' vì thiếu 'of')." },
            { q: "Don't forget to ________ your jacket before you go out; it's very cold outside.", options: ["put off", "put on", "turn on", "switch off"], correct: 1, ext: "Phrasal verb: Trời lạnh nên đừng quên **put on** (mặc vào) áo khoác." },
            { q: "Emily shares that she failed the drama club interview, and Phuong responds.\n- Emily: \"I didn't perform well at our school's drama club interview.\"\n- Phuong: \"________\"", options: ["You should try something more challenging.", "Don't give up! You'll have another chance.", "I think I should join something else.", "That club is too hard for them to try."], correct: 1, ext: "Giao tiếp: Lời động viên khi bạn làm bài không tốt. **Don't give up! You'll have another chance** (Đừng bỏ cuộc! Bạn sẽ có cơ hội khác)." },
            { q: "We should educate the public about wildlife, ________?", options: ["shouldn't we", "should we", "don't we", "do we"], correct: 0, ext: "Ngữ pháp: Câu hỏi đuôi. Mệnh đề chính khẳng định 'We should' -> Đuôi phủ định **shouldn't we**." },
            { q: "If people shared household chores, the family life ________ happier.", options: ["had been", "would have been", "will be", "would be"], correct: 3, ext: "Ngữ pháp: Câu điều kiện loại 2. Mệnh đề If ở quá khứ đơn (shared) -> Mệnh đề chính dùng **would + V**." },
            { q: "At 5 o'clock yesterday evening, my elder sister ________ her clothes.", options: ["ironed", "is ironing", "has ironed", "was ironing"], correct: 3, ext: "Ngữ pháp: Có giờ giấc cụ thể trong quá khứ (5 o'clock yesterday evening) -> Dùng thì quá khứ tiếp diễn **was ironing**." },
            { q: "Our lives ________ since the invention of the Internet.", options: ["have been improved", "be improved", "will be improved", "was improving"], correct: 0, ext: "Ngữ pháp: Có 'since' -> dùng thì hiện tại hoàn thành. Cuộc sống 'được cải thiện' mang ý bị động -> **have been improved**." },
            { q: "Nam: \"Why don't we prepare for the entrance test together, Quan?\"\n- Quan: \"________\"", options: ["I'm afraid I can't", "No; thanks", "I don't think so", "That's a good idea"], correct: 3, ext: "Giao tiếp: Đáp lại lời rủ rê (Why don't we...). Đồng ý thì dùng **That's a good idea** (Ý kiến hay đó)." },
            { q: "Television can ________ people with the latest information in an inexpensive and convenient way.", options: ["apply", "interact", "provide", "communicate"], correct: 2, ext: "Từ vựng: Cấu trúc **provide sb with sth** (cung cấp cho ai cái gì). TV cung cấp thông tin mới nhất." },
            { q: "Is your son ________ French and English?", options: ["master", "bilingual", "keen", "fond"], correct: 1, ext: "Từ vựng: Con trai bạn có **bilingual** (song ngữ / nói được hai thứ tiếng) Pháp và Anh không?" },
            { q: "The man ________ son is my classmate is a very famous scientist.", options: ["which", "whom", "that", "whose"], correct: 3, ext: "Đại từ quan hệ: Chỉ sự sở hữu của người đàn ông với con trai ông ấy -> dùng **whose**." },
            { q: "My mother ________ a birthday cake in the kitchen at the moment.", options: ["made", "makes", "is making", "has made"], correct: 2, ext: "Ngữ pháp: Dấu hiệu 'at the moment' (ngay lúc này) -> chia thì hiện tại tiếp diễn **is making**." },
            { q: "Tom eats a lot of fast food ________ he knows it's bad for him.", options: ["despite", "in spite of", "although", "because of"], correct: 2, ext: "Liên từ: Nối 2 mệnh đề (S + V) và mang ý nhượng bộ (Mặc dù anh ấy biết nó có hại) -> dùng **although**." },
            { q: "While reading English books or articles online, you may ________ new vocabulary.", options: ["take off", "turn on", "look after", "come across"], correct: 3, ext: "Phrasal verb: **come across** (tình cờ gặp). Bạn có thể tình cờ gặp từ vựng mới." },
            { q: "Lan enjoys ________ to pop music in her free time.", options: ["listen", "listened", "listening", "to listen"], correct: 2, ext: "Ngữ pháp: Theo sau 'enjoy' là V-ing -> **listening**." },
            { q: "Smart homes ________ use motion sensors can turn on lights as you enter a room.", options: ["who", "whom", "which", "whose"], correct: 2, ext: "Đại từ quan hệ: Thay thế cho sự vật 'Smart homes' làm chủ ngữ -> dùng **which**." },
            { q: "Our children played ________ badminton last Sunday afternoon.", options: ["Ø (no article)", "an", "a", "the"], correct: 0, ext: "Ngữ pháp: Không dùng mạo từ trước tên các môn thể thao (play badminton) -> **Ø**." },
            { q: "Nam usually ________ with his friends in the evening.", options: ["chat", "has chatted", "was chatting", "chats"], correct: 3, ext: "Ngữ pháp: Dấu hiệu 'usually' chỉ thói quen hiện tại. Chủ ngữ 'Nam' số ít -> thêm 's': **chats**." },
            { q: "The Ban Gioc Waterfalls is a popular ________ wonder of Vietnam.", options: ["native", "natural", "nation", "nature"], correct: 1, ext: "Từ loại: Bổ nghĩa cho danh từ 'wonder' cần tính từ **natural** (kỳ quan thiên nhiên)." },
            { q: "They promised to ________ care of the children while I was away on business.", options: ["hold", "take", "do", "make"], correct: 1, ext: "Cụm từ cố định: **take care of** (chăm sóc)." },
            { q: "These students ________ English since they were eight years old.", options: ["have learnt", "will learn", "are learning", "don't learn"], correct: 0, ext: "Ngữ pháp: Dấu hiệu 'since + mốc quá khứ' -> chia thì hiện tại hoàn thành **have learnt**." },
            { q: "My sister ________ a comic book when I came home from school.", options: ["has read", "reads", "is reading", "was reading"], correct: 3, ext: "Ngữ pháp: Hành động đang diễn ra trong quá khứ (was reading) thì hành động khác (came home) xen vào." },
            { q: "Hoi An is famous ________ its ancient architecture.", options: ["to", "for", "up", "with"], correct: 1, ext: "Giới từ: Cụm tính từ **be famous for** (nổi tiếng về điều gì)." },
            { q: "If the weather is nice, I ________ camping with my classmates.", options: ["went", "goes", "would go", "will go"], correct: 3, ext: "Ngữ pháp: Câu điều kiện loại 1 (If + HTĐ, TLĐ) -> dùng **will go**." },
            { q: "My sister decided to _____ a diary to record all her interesting experiences during the trip.", options: ["keep", "stay", "hold", "save"], correct: 0, ext: "Cụm từ cố định: **keep a diary** (viết nhật ký)." },
            { q: "Scientists are worried about _____ because it leads to more extreme weather events.", options: ["nature reserves", "climate change", "food chains", "solar system"], correct: 1, ext: "Từ vựng: **climate change** (biến đổi khí hậu)." },
            { q: "I wish people in the world _____ conflicts and lived in peace.", options: ["haven't had", "don't have", "won't have", "didn't have"], correct: 3, ext: "Ngữ pháp: Câu ước ở hiện tại, động từ lùi về thì quá khứ đơn (**didn't have**)." },
            { q: "They are planning to buy a _____ dining table for their new house in the suburbs.", options: ["large round wooden", "wooden large round", "round large wooden", "large wooden round"], correct: 0, ext: "Ngữ pháp: Trật tự tính từ (OSASCOMP): Size (large) -> Shape (round) -> Material (wooden) -> **large round wooden**." },
            { q: "He _____ their invitation to join the English drama club because he was too busy.", options: ["went on with", "looked after", "turned down", "took on"], correct: 2, ext: "Phrasal verb: **turn down** (từ chối). Anh ấy bận nên đã từ chối lời mời." },
            { q: "The _____ the teacher explains the lesson, the better the students understand the main points.", options: ["clearly", "clearest", "more clearly", "most clearly"], correct: 2, ext: "Ngữ pháp: Cấu trúc so sánh kép 'The + so sánh hơn..., the + so sánh hơn...'. Dùng **more clearly**." },
            { q: "You're _____ third person to ask me that silly question.", options: ["an", "Ø (Zero article)", "the", "a"], correct: 2, ext: "Ngữ pháp: Luôn dùng mạo từ **the** trước số thứ tự (the first, the second, the third...)." },
            { q: "They agreed _____ the community service project to help local people in the mountainous areas.", options: ["join", "joining", "to join", "joined"], correct: 2, ext: "Ngữ pháp: Cấu trúc **agree to V** (đồng ý làm gì đó)." },
            { q: "We sometimes feel lonely and sad; _____, we need parents and friends.", options: ["otherwise", "therefore", "moreover", "nevertheless"], correct: 1, ext: "Liên từ: Đứng giữa hai mệnh đề có quan hệ nguyên nhân - kết quả. Chúng ta thấy cô đơn, **vì vậy** (therefore) chúng ta cần bạn bè và bố mẹ." },
            { q: "I _____ along the crowded street in the city center when I met my old friend yesterday.", options: ["was walking", "am walking", "walk", "have walked"], correct: 0, ext: "Ngữ pháp: Hành động đang xảy ra trong quá khứ (**was walking**) thì hành động khác xen vào (met)." },
            { q: "We were lucky to meet artisan Đặng Văn Bảy, _____ products are on display at Ha Noi Museum and the Presidential Palace.", options: ["where", "which", "who", "whose"], correct: 3, ext: "Đại từ quan hệ: Chỉ sự sở hữu (những sản phẩm CỦA ông ấy) -> dùng **whose**." },
            { q: "Please send the assignment to our teacher via email _____ Thursday afternoon.", options: ["in", "for", "at", "on"], correct: 3, ext: "Giới từ: Đi kèm với các buổi trong một ngày cụ thể (Thursday afternoon) ta dùng giới từ **on**." },
            { q: "If we don't take _____ action now to stop pollution, the damage to our Earth will be permanent.", options: ["decisive", "rewarding", "repetitive", "well-paid"], correct: 0, ext: "Cụm từ: **decisive action** (hành động mang tính quyết đoán/kiên quyết)." },
            { q: "I haven't decided _____ to include in my paragraph about traditional handicrafts for homework.", options: ["where", "who", "what", "when"], correct: 2, ext: "Từ để hỏi: Tôi chưa quyết định sẽ đưa **những thông tin gì** (what) vào bài viết." },
            { q: "If you want to get a high score on the final exam, you _____ revise your lessons carefully every day.", options: ["should", "might", "would", "can"], correct: 0, ext: "Động từ khuyết thiếu: Đưa ra lời khuyên (nếu muốn điểm cao, bạn **nên** ôn bài) -> dùng **should**." },
            { q: "The school regulations clearly state that students are not permitted _____ mobile phones during lessons.", options: ["use", "to use", "using", "used"], correct: 1, ext: "Ngữ pháp: Cấu trúc bị động **be permitted to V** (được phép làm gì)." },
            { q: "The small bookstore is located _____ the corner of the street, right next to the bank.", options: ["in", "on", "at", "under"], correct: 2, ext: "Giới từ: Cụm từ chỉ địa điểm chính xác **at the corner of the street** (tại góc phố)." },
            { q: "The student _____ won the first prize in the competition is from my class.", options: ["which", "who", "whose", "whom"], correct: 1, ext: "Đại từ quan hệ: Thay thế cho danh từ chỉ người 'The student' làm chủ ngữ cho động từ 'won' -> dùng **who**." },
            { q: "The flight was delayed _____ the bad weather at the airport.", options: ["although", "because", "because of", "despite"], correct: 2, ext: "Liên từ: Theo sau chỗ trống là cụm danh từ (the bad weather) chỉ nguyên nhân -> dùng **because of**." },
            { q: "- Susan: \"_____?\"\n- Ally: A balanced diet is crucial. Fruits, veggies, whole grains, and lean proteins are great choices. Avoid junk food, like chips and soda.", options: ["What should we eat to be healthy", "How do you live", "What do you earn for a living", "What are you working"], correct: 0, ext: "Giao tiếp: Câu trả lời đề cập đến chế độ ăn uống và các loại thực phẩm lành mạnh, do đó câu hỏi phù hợp nhất là: **Chúng ta nên ăn gì để khỏe mạnh?**" },
            { q: "He succeeded _____ passing the entrance exam to a prestigious high school.", options: ["in", "on", "at", "for"], correct: 0, ext: "Giới từ: Đi kèm với động từ succeed là giới từ **in** (thành công trong việc gì đó)." },
            { q: "I can speak _____ words of French, but I can't write them.", options: ["a few", "a little", "few", "little"], correct: 0, ext: "Lượng từ: 'words' là danh từ đếm được, mang nghĩa khẳng định (tôi biết nói một vài từ) -> dùng **a few**." },
            { q: "Mike and Alice _____ in New York since they got married twenty years ago.", options: ["lived", "have lived", "were living", "live"], correct: 1, ext: "Ngữ pháp: Dấu hiệu 'since + mốc quá khứ', mệnh đề chính chia thì Hiện tại hoàn thành -> **have lived**." },
            { q: "Your brother doesn't often go online, _____?", options: ["does he", "doesn't he", "did he", "isn't he"], correct: 0, ext: "Ngữ pháp: Câu hỏi đuôi. Mệnh đề chính mang ý phủ định (doesn't) nên phần đuôi phải là khẳng định -> **does he**." },
            { q: "Mrs. Loan is very busy _____ her housework.", options: ["to", "with", "on", "for"], correct: 1, ext: "Giới từ: Cụm tính từ **be busy with something** (bận rộn với cái gì)." },
            { q: "They _____ a film at half past eight last night.", options: ["watched", "was watching", "have watched", "were watching"], correct: 3, ext: "Ngữ pháp: Có giờ giấc cụ thể trong quá khứ (half past eight last night) -> Dùng thì Quá khứ tiếp diễn. Chủ ngữ số nhiều dùng **were watching**." },
            { q: "- Tom: \"Congratulations on winning the match!\"\n- John: \"_____.\"", options: ["You're welcome.", "Never mind.", "That's a good idea.", "Thank you very much."], correct: 3, ext: "Giao tiếp: Đáp lại lời chúc mừng (Congratulations!), câu trả lời lịch sự nhất là **Thank you very much**." },
            { q: "This is the most interesting novel _____ I have ever read.", options: ["who", "which", "when", "that"], correct: 3, ext: "Đại từ quan hệ: Đứng sau cấu trúc so sánh nhất (the most interesting), ta bắt buộc phải dùng đại từ **that**." },
            { q: "Ho Chi Minh City is _____ city in Vietnam.", options: ["the largest", "largest", "larger", "the larger"], correct: 0, ext: "Ngữ pháp: Cấu trúc so sánh nhất bắt buộc phải có mạo từ 'the' -> **the largest**." },
            { q: "Don't open the window, _____?", options: ["do you", "don't you", "shall we", "will you"], correct: 3, ext: "Ngữ pháp: Câu hỏi đuôi. Đối với câu mệnh lệnh (dù khẳng định hay phủ định), phần đuôi luôn là **will you**." },
            { q: "Air pollution is a _____ problem in many modern cities.", options: ["attractive", "boring", "serious", "inconvenient"], correct: 2, ext: "Từ vựng: Ô nhiễm không khí là một vấn đề vô cùng **nghiêm trọng (serious)** tại các thành phố hiện đại." },
            { q: "My grandmother can _____ herself very well.", options: ["look up", "look for", "look after", "look at"], correct: 2, ext: "Phrasal verb: **look after** (chăm sóc). Bà tôi có thể tự chăm sóc bản thân rất tốt." },
            { q: "They are going to _____ cinema to watch a new movie.", options: ["a", "an", "the", "Ø"], correct: 2, ext: "Ngữ pháp: Mạo từ trong cụm từ cố định **go to the cinema** (đi đến rạp chiếu phim)." },
            { q: "The car is parked _____ front of the building.", options: ["in", "on", "at", "to"], correct: 0, ext: "Giới từ: Cụm giới từ chỉ vị trí **in front of** (ở phía trước)." },
            { q: "There aren't _____ chairs in the living room for everyone.", options: ["much", "many", "little", "few"], correct: 1, ext: "Lượng từ: 'chairs' là danh từ đếm được số nhiều, trong câu phủ định ta dùng **many** (không có nhiều ghế)." },
            { q: "Broadly speaking, the new sports centre is _____ than the old one near my house.", options: ["the most convenient", "convenient", "more convenient", "as convenient"], correct: 2, ext: "Ngữ pháp: Câu có 'than' nên dùng dạng so sánh hơn đối với tính từ dài -> **more convenient**." },
            { q: "People should save energy _____ the shortage of the natural resources.", options: ["because", "because of", "in spite of", "despite"], correct: 1, ext: "Liên từ: Đằng sau chỗ trống là cụm danh từ chỉ nguyên nhân (the shortage...) -> dùng **because of** (bởi vì)." },
            { q: "The teacher _____ taught us about history is retiring this year.", options: ["which", "who", "why", "whose"], correct: 1, ext: "Đại từ quan hệ: Thay thế cho danh từ chỉ người 'The teacher' làm chủ ngữ cho vế sau -> dùng **who**." },
            { q: "Mary: \"You look nice today. I like your new dress\"\nDaisy: \"_____\"", options: ["I feel interesting to hear that", "Oh, well done", "It's nice of you to say so", "My pleasure"], correct: 2, ext: "Giao tiếp: Đáp lại lời khen ngợi ngoại hình, ta dùng **It's nice of you to say so** (Bạn thật tốt khi nói vậy)." },
            { q: "I _____ very well with my sister now, we never have any arguments.", options: ["carry on", "go on", "get on", "put on"], correct: 2, ext: "Phrasal verb: **get on (well) with somebody** (có mối quan hệ tốt đẹp, hòa thuận với ai)." },
            { q: "We had _____ trip to Thailand last week.", options: ["a four – days", "a four - day", "four – day", "four days"], correct: 1, ext: "Ngữ pháp: Cụm danh từ ghép làm tính từ. Dùng Số đếm + Danh từ số ít (không s). Do 'trip' đếm được số ít nên cần mạo từ 'a' -> **a four-day trip**." },
            { q: "I have a _____ on a classmate who is very near and dear to me.", options: ["crush", "desire", "flame", "passion"], correct: 0, ext: "Idiom (Thành ngữ): **have a crush on somebody** (cảm nắng, phải lòng ai đó)." },
            { q: "_____ air is polluted in many cities around the world.", options: ["a", "an", "the", "Ø"], correct: 3, ext: "Ngữ pháp: Mạo từ. 'air' (không khí) là danh từ không đếm được, dùng để chỉ chung chung nên không dùng mạo từ -> **Ø**." },
            { q: "She enjoys jogging _____ the morning before work.", options: ["in", "on", "at", "to"], correct: 0, ext: "Giới từ thời gian: Đối với các buổi lớn trong một ngày, ta dùng giới từ **in** (in the morning, in the afternoon)." },
            { q: "There is _____ juice left in the glass; please finish it.", options: ["any", "many", "little", "a few"], correct: 2, ext: "Lượng từ: 'juice' (nước trái cây) là danh từ không đếm được. Câu mang ý nghĩa 'còn một ít, uống nốt đi' thường dùng a little, tuy nhiên trong các đáp án được cho chỉ có **little** là hợp lý nhất về mặt ngữ pháp so với các từ còn lại." },
            { q: "The weather today is _____ than it was last week.", options: ["warm", "warmer", "the warmest", "as warm"], correct: 1, ext: "Ngữ pháp: Câu có 'than' -> dùng so sánh hơn của tính từ ngắn 'warm' là **warmer**." },
            { q: "_____ I was tired, I stayed up late to finish the project.", options: ["Although", "Because", "Therefore", "So"], correct: 0, ext: "Liên từ: Liên kết 2 mệnh đề có ý nghĩa trái ngược nhau (Mặc dù mệt mỏi nhưng vẫn thức khuya) -> Dùng **Although**." },
            { q: "He is the artist _____ paintings are displayed in the gallery.", options: ["which", "who", "what", "whose"], correct: 3, ext: "Đại từ quan hệ: Chỉ sự sở hữu (những bức tranh CỦA họa sĩ ấy) -> dùng **whose**." },
            { q: "- Peter: \"Do you mind if I use your pencil?\"\n- Katy: \"_____\"", options: ["Sorry. I have no idea.", "Never mind. Help yourself", "Certainly, it's true", "That's a good idea."], correct: 1, ext: "Giao tiếp: Đáp lại lời xin phép 'Bạn có phiền không...'. Trong các đáp án, **Never mind. Help yourself** (Không phiền đâu. Cứ tự nhiên nhé) là phù hợp nhất để đồng ý cho mượn đồ." },
            { q: "We need to take action to help _____ derelict historical buildings.", options: ["include", "recommend", "astound", "preserve"], correct: 3, ext: "Từ vựng: Chúng ta cần hành động để giúp **bảo tồn (preserve)** các tòa nhà lịch sử đang bị bỏ hoang." },
            { q: "The mass media are _____ of communication, such as books, newspapers, recordings, radio, movies, television, mobile phones and the Internet.", options: ["models", "means", "parts", "types"], correct: 1, ext: "Cụm từ cố định: **means of communication** (phương tiện giao tiếp/phương tiện truyền thông)." },
            { q: "There are many flowers _____ the garden.", options: ["in", "on", "at", "to"], correct: 0, ext: "Giới từ chỉ nơi chốn: Nằm trong một không gian (khu vườn) ta dùng giới từ **in**." },
            { q: "They decided to _____ their vacation plans until the weather improves and becomes more predictable.", options: ["bring up", "put off", "get along", "turn in"], correct: 1, ext: "Phrasal verb: **put off** (trì hoãn). Họ quyết định trì hoãn kế hoạch đi nghỉ mát." },
            { q: "_____ life in the city can be very busy.", options: ["a", "an", "the", "Ø"], correct: 3, ext: "Ngữ pháp: Mạo từ. Từ 'life' (cuộc sống) đang nói tới ý nghĩa chung chung, khái quát -> không dùng mạo từ **(Ø)**." },
            { q: "We are planning to visit them _____ Christmas.", options: ["in", "of", "at", "to"], correct: 2, ext: "Giới từ thời gian: Đối với các kỳ nghỉ lễ kéo dài (như dịp Giáng sinh, dịp Phục sinh), ta dùng giới từ **at** (at Christmas)." },
            { q: "Do you know how _____ information is needed for this project?", options: ["much", "many", "a little", "few"], correct: 0, ext: "Lượng từ: 'information' (thông tin) là danh từ không đếm được -> Dùng từ để hỏi **how much**." },
            { q: "She is the _____ runner on the team according to last week's results.", options: ["fast", "faster", "the fastest", "as fast"], correct: 2, ext: "Ngữ pháp: Dấu hiệu 'on the team' (trong đội) -> dùng cấu trúc so sánh nhất **the fastest**." },
            { q: "He went to bed early _____ he had a headache.", options: ["so", "because of", "because", "even though"], correct: 2, ext: "Liên từ: Đằng sau là một mệnh đề (S + V) chỉ nguyên nhân -> Dùng **because** (bởi vì)." },
            { q: "The child _____ you helped yesterday was very grateful.", options: ["which", "who", "when", "whose"], correct: 1, ext: "Đại từ quan hệ: Thay thế cho danh từ chỉ người 'The child' làm tân ngữ (bạn đã giúp đỡ đứa trẻ) -> dùng **who** (hoặc whom)." },
            { q: "Antony: \"Give my best regards to your parents.\"\nMessi: \"_____\"", options: ["It's nice of you to say so", "I'm glad to hear that", "Thanks. I will", "Please go ahead"], correct: 2, ext: "Giao tiếp: Khi ai đó nhờ gửi lời hỏi thăm (Give my best regards to...), hãy đáp lại lịch sự: **Thanks. I will** (Cảm ơn, tôi sẽ chuyển lời)." },
            { q: "We had to _____ our meeting because too many people were unable to attend on the scheduled date.", options: ["take after", "call off", "break down", "look for"], correct: 1, ext: "Phrasal verb: **call off** (hủy bỏ). Chúng tôi phải hủy cuộc họp vì quá nhiều người vắng mặt." },
            { q: "The government has _____ every effort to improve the quality of education.", options: ["done", "made", "created", "brought"], correct: 1, ext: "Cụm từ cố định: **make an effort** / make every effort (cố gắng, nỗ lực hết sức)." },
            { q: "I've tried those tablets and they are not _____ in helping me stop coughing.", options: ["successful", "effective", "profitable", "careful"], correct: 1, ext: "Từ vựng: Tôi đã dùng thử thuốc nhưng chúng không **hiệu quả (effective)** trong việc giúp tôi ngừng ho." },
            { q: "She enjoys watching _____ movies in her free time.", options: ["a", "an", "the", "Ø"], correct: 3, ext: "Ngữ pháp: Mạo từ. 'movies' là danh từ đếm được số nhiều, và đang chỉ chung chung (cô ấy thích xem phim nói chung) -> không dùng mạo từ **(Ø)**." },
            { q: "_____ autumn, the leaves change color and fall.", options: ["in", "on", "at", "to"], correct: 0, ext: "Giới từ thời gian: Đứng trước các mùa trong năm, ta dùng giới từ **in** (in autumn, in spring...)." },
            { q: "How _____ money do you spend on food each month?", options: ["much", "many", "a lot of", "few"], correct: 0, ext: "Lượng từ: 'money' (tiền) là danh từ không đếm được -> Dùng từ để hỏi **how much**." },
            { q: "He arrived _____ than anyone else, so he had to wait more than an hour.", options: ["earlier", "more earlier", "early", "earliest"], correct: 0, ext: "Ngữ pháp: Trạng từ 'early' kết thúc bằng 'y' nên có dạng so sánh hơn giống tính từ ngắn -> **earlier** (sớm hơn)." },
            { q: "I have to finish my homework _____ I can go out.", options: ["so that", "because", "or", "but"], correct: 0, ext: "Liên từ: Liên kết mệnh đề chỉ mục đích. Tôi phải hoàn thành bài tập **để mà (so that)** tôi có thể đi chơi." },
            { q: "The river _____ flows through the city is very clean.", options: ["which", "who", "whom", "whose"], correct: 0, ext: "Đại từ quan hệ: Thay thế cho sự vật 'The river' làm chủ ngữ cho vế sau -> dùng **which**." },
            { q: "Tryndamere: \"What a delicious cake!\"\nMiss Fortune: \"_____\"", options: ["No, I don't think so", "Thanks. I'm glad you like it", "I'm sorry. I did it badly", "Watch out"], correct: 1, ext: "Giao tiếp: Đáp lại lời khen ngợi đồ ăn ngon (What a delicious cake!), người nấu sẽ cảm ơn: **Thanks. I'm glad you like it**." },
            { q: "She had been depressed all day but she started to _____ after she heard that was promoted.", options: ["turn up", "cheer up", "take up", "break up"], correct: 1, ext: "Phrasal verb: **cheer up** (trở nên vui vẻ, phấn khởi lên). Cô ấy vui lên khi nghe tin được thăng chức." },
            { q: "Unless we _____ our water resources, there will be a shortage of clean water someday.", options: ["predict", "use", "conserve", "replace"], correct: 2, ext: "Từ vựng: Nếu chúng ta không **bảo tồn (conserve)** nguồn tài nguyên nước, sẽ có ngày thiếu nước sạch." },
            { q: "Modern technology is widening the _____ gap between parents and their children.", options: ["tradition", "age", "gender", "generation"], correct: 3, ext: "Cụm danh từ: **generation gap** (khoảng cách thế hệ)." },
            { q: "I have _____ idea for our next project.", options: ["a", "an", "the", "Ø"], correct: 1, ext: "Ngữ pháp: 'idea' là danh từ đếm được số ít, bắt đầu bằng nguyên âm 'i' -> dùng mạo từ **an**." },
            { q: "He went _____ the hospital to visit his friend.", options: ["in", "on", "at", "to"], correct: 3, ext: "Giới từ: Đi tới một địa điểm ta dùng **go to** (went to the hospital)." },
            { q: "They didn't have too _____ time to prepare for the presentation.", options: ["much", "many", "lots of", "few"], correct: 0, ext: "Lượng từ: 'time' (thời gian) là danh từ không đếm được. Câu có 'too' mang nghĩa (không dành quá nhiều thời gian) -> dùng **much**." },
            { q: "His explanation is _____ than the previous one.", options: ["confusing", "more confusing", "the most confusing", "as confusing"], correct: 1, ext: "Ngữ pháp: Câu có 'than' -> dùng so sánh hơn của tính từ dài 'confusing' -> **more confusing**." },
            { q: "She wanted to stay longer _____ she left because it was late.", options: ["but", "because of", "because", "even though"], correct: 0, ext: "Liên từ: Nối 2 vế có ý nghĩa trái ngược nhau. Cô ấy muốn ở lại lâu hơn, **nhưng (but)** phải rời đi vì muộn." },
            { q: "The man _____ you are looking for is over there.", options: ["which", "who", "whom", "whose"], correct: 2, ext: "Đại từ quan hệ: Thay thế cho danh từ chỉ người 'The man' đóng vai trò làm tân ngữ (bạn đang tìm anh ta) -> dùng **whom** (hoặc who)." },
            { q: "Graves: \"How about giving me a hand?\"\nLucian: \"_____\"", options: ["I promise", "No, not yet", "Sure. I'd be glad to help", "You're welcome"], correct: 2, ext: "Giao tiếp: Đáp lại lời nhờ vả (Bạn có thể giúp tôi một tay không?). Rất sẵn lòng giúp đỡ: **Sure. I'd be glad to help**." },
            { q: "After a long discussion, they finally managed to _____ a compromise that satisfied both parties involved.", options: ["come up with", "take care of", "turn down", "give in"], correct: 0, ext: "Phrasal verb: **come up with** (nghĩ ra, nảy ra, đạt được). Cuối cùng họ cũng đạt được một sự thỏa hiệp." },
            { q: "Most of the secondary students are _____ about the coming exam.", options: ["worried", "surprised", "bored", "interested"], correct: 0, ext: "Từ vựng: Đi kèm với giới từ 'about' là tính từ **worried** (lo lắng về điều gì đó)." },
            { q: "People go to a _____ to look at famous works of art.", options: ["fair", "theater", "stadium", "gallery"], correct: 3, ext: "Từ vựng: Mọi người đến **phòng trưng bày nghệ thuật (gallery)** để ngắm các tác phẩm nổi tiếng." },
            { q: "She's _____ best student in her class.", options: ["a", "an", "the", "Ø"], correct: 2, ext: "Ngữ pháp: Đứng trước tính từ so sánh nhất (best) bắt buộc dùng mạo từ **the**." },
            { q: "She has a photo album _____ her phone.", options: ["in", "on", "at", "to"], correct: 1, ext: "Giới từ: Để chỉ dữ liệu, ứng dụng nằm trên thiết bị điện tử (điện thoại, máy tính), ta dùng giới từ **on** (on her phone)." },
            { q: "_____ of his friends could come to his birthday party yesterday.", options: ["Much", "Few", "Little", "Enough"], correct: 1, ext: "Lượng từ: 'friends' là danh từ đếm được số nhiều. Dùng **Few** (có rất ít) đi với danh từ đếm được, mang nghĩa phủ định." },
            { q: "Nam runs _____ than any boys in his class.", options: ["faster", "more faster", "the fastest", "fastest"], correct: 0, ext: "Ngữ pháp: Câu có 'than' nên phải dùng so sánh hơn. 'fast' là trạng từ ngắn -> thêm đuôi -er thành **faster**." },
            { q: "_____ I've cleaned and polished my leather jacket, it still doesn't look new.", options: ["Because", "Because of", "In spite of", "Although"], correct: 3, ext: "Liên từ: Liên kết 2 mệnh đề (S+V) mang nghĩa trái ngược. **Mặc dù (Although)** tôi đã làm sạch và đánh bóng áo khoác, nó trông vẫn không mới." },
            { q: "The car _____ she drives is very expensive and fast.", options: ["which", "what", "whom", "whose"], correct: 0, ext: "Đại từ quan hệ: Thay thế cho danh từ chỉ vật 'The car' -> dùng **which**." },
            { q: "Penaldo: \"Thank you for a lovely evening.\"\nMbappe: \"_____.\"", options: ["Thank you very much indeed.", "Yeah. I'm really looking forward to it", "You are welcome", "That's very kind of you"], correct: 2, ext: "Giao tiếp: Đáp lại lời cảm ơn sau một buổi đi chơi, ta nói **You are welcome** (Không có chi)." },
            { q: "Because of the global warming, we should _____ on our energy use.", options: ["look down", "cut down", "turn into", "put off"], correct: 1, ext: "Phrasal verb: Cấu trúc **cut down on something** (cắt giảm, giảm bớt). Chúng ta nên cắt giảm việc sử dụng năng lượng." },
            { q: "He is good at English. He rarely _____ a mistake in his English test.", options: ["does", "makes", "gets", "has"], correct: 1, ext: "Cụm từ cố định: **make a mistake** (phạm sai lầm)." },
            { q: "People rumor that he committed the crime under the _____ of drugs.", options: ["connection", "touch", "influence", "attraction"], correct: 2, ext: "Thành ngữ/Cụm từ cố định: **under the influence of** (chịu ảnh hưởng của, đặc biệt là cồn/thuốc phiện). Phạm tội trong tình trạng ngáo đá." },
            { q: "My mother told me that _____ key to success is hard work and persistence.", options: ["a", "an", "the", "Ø"], correct: 2, ext: "Ngữ pháp: 'key' (chìa khóa) ở đây đã được xác định rõ là chìa khóa dẫn đến đâu (to success) -> cần dùng mạo từ **the**." },
            { q: "The museum is located _____ the main street of the city.", options: ["in", "on", "at", "to"], correct: 1, ext: "Giới từ chỉ nơi chốn: Nằm **trên** một con đường/tuyến phố, ta dùng giới từ **on** (on the main street)." },
            { q: "Please give me _____ apples from that basket over there.", options: ["much", "some", "little", "few"], correct: 1, ext: "Lượng từ: Câu yêu cầu, đề nghị (Please give me...) thường dùng **some** thay cho any." },
            { q: "This exam is not _____ as the one we took last semester.", options: ["harder", "hard", "the hardest", "so hard"], correct: 3, ext: "Ngữ pháp: Cấu trúc so sánh bằng ở thể phủ định: **not as/so + adj + as** (không khó bằng) -> **so hard**." },
            { q: "Mark and Kate are close friends _____ they have a lot of interests in common.", options: ["despite", "because of", "because", "although"], correct: 2, ext: "Liên từ: Đằng sau là mệnh đề chỉ nguyên nhân (Họ có nhiều sở thích chung). Vì vậy họ là bạn thân -> Dùng **because** (bởi vì)." },
            { q: "The story _____ she told was very touching and inspiring.", options: ["which", "who", "whom", "whose"], correct: 0, ext: "Đại từ quan hệ: Thay thế cho danh từ chỉ vật 'The story' làm tân ngữ cho vế sau -> dùng **which**." },
            { q: "Jack 97: - \"Make yourself at home.\"\nSơn Tùng –MTP: - \"_____\"", options: ["Yes, can I help you?", "Not at all. Don't mention it.", "Thanks! Same to you.", "It's very kind of you. Thank you."], correct: 3, ext: "Giao tiếp: Lời đáp cho câu mời khách đến chơi nhà 'Cứ tự nhiên như ở nhà nhé'. Khách lịch sự đáp lại: **It's very kind of you. Thank you** (Bạn thật tốt. Cảm ơn nhé)." },
            { q: "He is really good at _____ his ideas in a clear and concise manner during presentations.", options: ["putting off", "bringing up", "getting across", "turning in"], correct: 2, ext: "Phrasal verb: **get across** (truyền đạt, làm cho người khác hiểu). Anh ấy rất giỏi truyền đạt ý tưởng rõ ràng." },
            { q: "My aunt excitedly _____ a compliment on the scarf I knitted for her as a birthday present.", options: ["took", "passed", "paid", "made"], correct: 2, ext: "Cụm từ cố định: **pay a compliment on something** (dành lời khen ngợi cho cái gì). Dì tôi hào hứng khen chiếc khăn." },
            { q: "For the most households, lighting _____ for 10% to 15% of the electricity bill.", options: ["applies", "accounts", "asks", "prepares"], correct: 1, ext: "Cụm từ cố định: **account for** (chiếm tỷ lệ bao nhiêu). Chiếu sáng chiếm 10% - 15% hóa đơn tiền điện." },
            { q: "After _____ long day at work, she loves to relax with a good book and a cup of tea.", options: ["a", "an", "the", "Ø"], correct: 0, ext: "Ngữ pháp: Cụm từ cố định thông dụng **After a long day** (Sau một ngày dài)." },
            { q: "She was born _____ March 3rd.", options: ["in", "on", "at", "to"], correct: 1, ext: "Giới từ thời gian: Đi với một ngày tháng cụ thể (ngày 3 tháng 3) bắt buộc dùng giới từ **on**." },
            { q: "There was _____ rain yesterday, and everything got wet.", options: ["much", "many", "little", "few"], correct: 0, ext: "Lượng từ: 'rain' (mưa) là danh từ không đếm được. Câu mang ý khẳng định mọi thứ đều ướt sũng -> có nhiều mưa (**much**)." },
            { q: "The blue car is _____ than the red one you saw.", options: ["expensive", "more expensive", "as expensive", "the most expensive"], correct: 1, ext: "Ngữ pháp: Có 'than' -> dùng so sánh hơn của tính từ dài 'expensive' -> **more expensive**." },
            { q: "They canceled the match _____ the bad weather.", options: ["despite", "although", "because", "because of"], correct: 3, ext: "Liên từ: Đằng sau là một cụm danh từ (the bad weather) chỉ nguyên nhân -> Dùng **because of** (bởi vì)." },
            { q: "The dress _____ she wore was designed by a famous designer.", options: ["which", "who", "whom", "whose"], correct: 0, ext: "Đại từ quan hệ: Thay thế cho danh từ chỉ vật 'The dress' làm tân ngữ cho mệnh đề sau -> dùng **which**." },
            { q: "Oriana: \"Shall we go out for dinner?\". Yone: \"_____\"", options: ["No, I wouldn't. That's boring", "I'd love", "That's a good idea.", "You can say that again."], correct: 2, ext: "Giao tiếp: Đáp lại lời rủ rê (Shall we...). Câu trả lời đồng ý tự nhiên nhất là **That's a good idea** (Đó là một ý kiến hay)." },
            { q: "The young boy _____ his father, both in appearance and personality.", options: ["picks up", "takes after", "turns out", "makes out"], correct: 1, ext: "Phrasal verb: **take after somebody** (giống ai đó về ngoại hình hoặc tính cách). Cậu bé rất giống cha mình." },
            { q: "When we tried to _____ a sign directing us right into Greater Bridgewater Street, we found the road was closed.", options: ["follow", "suppose", "provide", "defend"], correct: 0, ext: "Từ vựng: **follow a sign** (đi theo biển báo). Khi chúng tôi cố đi theo biển báo hướng dẫn... thì đường đã bị chặn." },
            { q: "Millions of _____ watch the Super Bowl on TV every year.", options: ["supporters", "viewers", "observers", "spectators"], correct: 1, ext: "Từ vựng: Người xem qua màn hình truyền hình (TV) được gọi là **viewers**. (Spectators dùng cho người đi xem trực tiếp)." },
            { q: "_____ youngest child in the family often receives a lot of attention and love.", options: ["a", "an", "the", "Ø"], correct: 2, ext: "Ngữ pháp: Đứng trước tính từ so sánh nhất (youngest) bắt buộc phải dùng mạo từ **the**." },
            { q: "They moved _____ the city to find better job opportunities.", options: ["in", "on", "at", "to"], correct: 3, ext: "Giới từ: Chuyển đến nơi nào đó dùng động từ move đi với giới từ **to** (move to the city)." },
            { q: "He didn't spend too _____ time studying for the final exam.", options: ["much", "many", "little", "few"], correct: 0, ext: "Lượng từ: 'time' (thời gian) là danh từ không đếm được. Câu có 'too' mang nghĩa (không dành quá nhiều thời gian) -> dùng **much**." },
            { q: "This challenge is not as _____ as I thought it would be.", options: ["easy", "easier", "the easiest", "as easy"], correct: 0, ext: "Ngữ pháp: Cấu trúc so sánh bằng phủ định (not as + tính từ nguyên thể + as). Dùng **easy**." },
            { q: "_____ the storm, the ship couldn't reach its destination on time.", options: ["Because", "In spite of", "Because of", "Although"], correct: 2, ext: "Liên từ: Đằng sau khoảng trống là cụm danh từ 'the storm' (cơn bão) làm nguyên nhân gây trễ tàu -> dùng **Because of**." },
            { q: "The computer _____ he fixed is working perfectly now.", options: ["which", "who", "whom", "whose"], correct: 0, ext: "Đại từ quan hệ: Thay thế cho danh từ chỉ vật 'The computer' -> dùng **which**." },
            { q: "Ozawe: \"May I have something to drink, please?\"\nTokude: \"_____\"", options: ["Yes, of course. Help yourself.", "Of course you may.", "Why do you have to ask?", "You must help others too."], correct: 0, ext: "Giao tiếp: Đáp lại lời xin đồ ăn/thức uống. Lịch sự và hiếu khách nhất là nói: **Yes, of course. Help yourself** (Vâng tất nhiên rồi. Cứ tự nhiên nhé)." },
            { q: "If you want to understand the topic better, you should _____ the material we covered in class.", options: ["look over", "check out", "break down", "run into"], correct: 0, ext: "Phrasal verb: **look over** (xem xét lại, ôn tập, đọc lướt qua). Bạn nên ôn lại tài liệu đã học trên lớp." },
            { q: "You need to buy _____ pair of shoes for the hiking trip.", options: ["a", "an", "the", "Ø"], correct: 0, ext: "Ngữ pháp: 'pair of shoes' (đôi giày) đếm được, nhắc đến lần đầu và bắt đầu bằng phụ âm -> dùng mạo từ **a**." },
            { q: "The class starts _____ 8:30 AM every day.", options: ["in", "on", "at", "to"], correct: 2, ext: "Giới từ thời gian: Đối với giờ giấc cụ thể trên đồng hồ (8:30 AM), bắt buộc dùng giới từ **at**." },
            { q: "Do you have _____ friends living in another country?", options: ["much", "any", "little", "a lot"], correct: 1, ext: "Lượng từ: Trong câu hỏi nghi vấn với danh từ đếm được số nhiều 'friends', ta sử dụng **any** (Bạn có NGƯỜI BẠN NÀO... không?)." },
            { q: "He is the _____ player on the team this season.", options: ["experienced", "more experienced", "as experienced", "most experienced"], correct: 3, ext: "Ngữ pháp: Cấu trúc có 'the', chỉ một người xuất sắc nhất trong nhóm (on the team) -> dùng so sánh nhất **most experienced**." },
            { q: "He tried his best in the competition _____ he wanted to win the first prize.", options: ["although", "because of", "in spite of", "because"], correct: 3, ext: "Liên từ: Đằng sau là một mệnh đề (S + V) chỉ nguyên nhân mục đích (Anh ấy cố gắng VÌ anh ấy muốn thắng) -> dùng **because**." },
            { q: "The man _____ daughter is my friend is very generous.", options: ["which", "who", "whom", "whose"], correct: 3, ext: "Đại từ quan hệ: Chỉ sự sở hữu (Người đàn ông mà CON GÁI CỦA ÔNG ẤY là bạn tôi) -> dùng **whose**." },
            { q: "Putin: \"I think you've taken my bag by mistake.\"\nClinton: \"_____\"", options: ["What a shame!", "Pardon?", "I'm so sorry.", "Have I?"], correct: 2, ext: "Giao tiếp: Khi nhận ra mình lấy nhầm đồ của người khác, phản ứng lịch sự đầu tiên là xin lỗi: **I'm so sorry**." },
            { q: "The firefighters arrived at the scene just in time to _____ the fire.", options: ["call back", "stand up", "count on", "put out"], correct: 3, ext: "Phrasal verb: **put out** (dập tắt ngọn lửa)." },
            { q: "To save money, we should _____ the amount of energy used in our homes.", options: ["reduce", "increase", "stop", "leave"], correct: 0, ext: "Từ vựng: Để tiết kiệm tiền, chúng ta nên **cắt giảm (reduce)** lượng năng lượng tiêu thụ." },
            { q: "We went to _____ cinema last weekend.", options: ["a", "an", "the", "Ø"], correct: 2, ext: "Ngữ pháp: Đi kèm với cụm từ chỉ hoạt động giải trí phổ biến thường có mạo từ 'the' -> **go to the cinema**." },
            { q: "They are planning to go skiing _____ winter.", options: ["in", "on", "at", "to"], correct: 0, ext: "Giới từ thời gian: Đứng trước các mùa (xuân, hạ, thu, đông), ta dùng giới từ **in**." },
            { q: "We have _____ time left, so let's hurry and finish this.", options: ["much", "many", "little", "few"], correct: 2, ext: "Lượng từ: Câu mang ý nghĩa giục giã (hãy nhanh lên) chứng tỏ còn rất RẤT ÍT thời gian. 'time' không đếm được nên dùng **little**." },
            { q: "Titanic is the _____ film that I have ever seen.", options: ["interesting", "more interesting", "most interesting", "as interesting"], correct: 2, ext: "Ngữ pháp: Cấu trúc so sánh nhất đi cùng 'the' và thì hiện tại hoàn thành (ever seen) -> **most interesting**." },
            { q: "We decided to keep walking _____ the rain.", options: ["despite", "even though", "because of", "because"], correct: 0, ext: "Liên từ: Đằng sau là một cụm danh từ 'the rain' (cơn mưa). Ý nghĩa nhượng bộ 'Mặc dù trời mưa' -> dùng **despite**." },
            { q: "The cake _____ she baked was delicious and beautifully decorated.", options: ["which", "who", "whom", "whose"], correct: 0, ext: "Đại từ quan hệ: Thay thế cho danh từ chỉ vật 'The cake' làm tân ngữ cho vế sau -> dùng **which**." },
            { q: "Dương: \"I think we should use less paper so that we can save trees.\"\nAlex: \"_____\"", options: ["Congratulations", "yes, I'd love to", "That's a good idea", "It's nice of you to say so"], correct: 2, ext: "Giao tiếp: Đáp lại lời một quan điểm mang tính đề xuất, rủ rê (we should use less...). Tán thành ý kiến đó bằng câu **That's a good idea**." },
            { q: "My big brother always _____ for me when my mom yelled at me.", options: ["stuck up", "blocked up", "hooked up", "stood up"], correct: 3, ext: "Phrasal verb: **stand up for somebody** (hoặc stick up for) (đứng ra bảo vệ/bênh vực ai đó)." },
            { q: "She also took dance lessons and yoga to maintain her already _____ build.", options: ["strong", "energetic", "dynamic", "athletic"], correct: 3, ext: "Từ vựng: Cụm từ **athletic build** (vóc dáng khỏe khoắn, thể thao)." },
            { q: "Nam is trying to break the _____ of getting up too late.", options: ["habit", "sound", "option", "race"], correct: 0, ext: "Cụm từ cố định: **break the habit of** (từ bỏ thói quen làm gì đó)." },
            { q: "She has always dreamed of becoming _____ artist because she loves to paint.", options: ["a", "an", "the", "Ø"], correct: 1, ext: "Ngữ pháp: 'artist' (họa sĩ/nghệ sĩ) là danh từ đếm được chỉ nghề nghiệp, bắt đầu bằng nguyên âm -> dùng mạo từ **an**." },
            { q: "He is very good _____ math and enjoys solving problems.", options: ["in", "on", "at", "to"], correct: 2, ext: "Giới từ: Cụm tính từ **be good at something** (giỏi về lĩnh vực/môn gì đó)." },
            { q: "How _____ time do you need to complete your assignment?", options: ["much", "many", "little", "few"], correct: 0, ext: "Lượng từ: 'time' (thời gian) là danh từ không đếm được. Câu hỏi dùng **How much**." },
            { q: "My sister is _____ as most students in her class.", options: ["more intelligent", "as intelligent", "intelligent", "most intelligent"], correct: 1, ext: "Ngữ pháp: Phía sau có chữ 'as' -> Cấu trúc so sánh bằng: **as + adj + as** (thông minh như...)." },
            { q: "_____ it was raining, they still went for a walk.", options: ["So", "Because", "Even though", "Therefore"], correct: 2, ext: "Liên từ: Liên kết 2 mệnh đề có ý nghĩa tương phản. **Mặc dù (Even though)** trời mưa, họ vẫn đi dạo." },
            { q: "The girl _____ you met yesterday is my cousin.", options: ["which", "what", "whom", "whose"], correct: 2, ext: "Đại từ quan hệ: Thay thế cho danh từ chỉ người 'The girl' làm tân ngữ cho vế sau (bạn đã gặp CÔ ẤY) -> dùng **whom** (hoặc who/that)." },
            { q: "Firefly: \"It's very kind of you to help me.\"\nSky: \"_____\"", options: ["Yes, certainly", "Not really", "Not at all", "Yes, I do"], correct: 2, ext: "Giao tiếp: Đáp lại lời cảm ơn hoặc khen ngợi sự tốt bụng. Câu đáp lịch sự là **Not at all** (Không có gì đâu)." },
            { q: "This guide will help the learners _____ their difficult exam with flying colours.", options: ["get through", "get along", "get on", "get over"], correct: 0, ext: "Phrasal verb: **get through an exam** (vượt qua kỳ thi). Vượt qua kỳ thi với điểm số cao (flying colours)." },
            { q: "I'm calling to _____ a reservation for a table of four for my birthday.", options: ["do", "make", "show", "meet"], correct: 1, ext: "Cụm từ cố định: **make a reservation** (đặt bàn/chỗ trước)." },
            { q: "In my family, everybody has to do their _____ of the housework.", options: ["responsibility", "division", "bit", "share"], correct: 3, ext: "Cụm từ cố định: **do one's share of something** (làm phần việc thuộc về mình/chia sẻ trách nhiệm)." },
            { q: "My dad is watching a football game on _____ TV.", options: ["a", "an", "the", "Ø"], correct: 3, ext: "Ngữ pháp: Cụm từ nói về việc xem tivi, nghe radio thường không có mạo từ (ví dụ: on TV, watch TV) -> **Ø**." },
            { q: "They live _____ a small village by the sea.", options: ["in", "on", "at", "to"], correct: 0, ext: "Giới từ: Sống BÊN TRONG không gian của một ngôi làng, ta dùng giới từ **in**." },
            { q: "The teacher gave _____ homework this weekend for practice.", options: ["much", "many", "any", "few"], correct: 0, ext: "Lượng từ: 'homework' (bài tập về nhà) là danh từ không đếm được. Trong 4 đáp án, chỉ có **much** có thể đứng trước danh từ không đếm được mang nghĩa khẳng định (bài tập)." },
            { q: "Winter is _____ than autumn in most regions of the country.", options: ["cold", "the coldest", "colder", "as cold"], correct: 2, ext: "Ngữ pháp: Có 'than' -> cấu trúc so sánh hơn. Tính từ ngắn 'cold' -> **colder**." },
            { q: "We went out for dinner _____ the heavy rain.", options: ["in spite of", "because of", "because", "even though"], correct: 0, ext: "Liên từ: Đằng sau là cụm danh từ 'the heavy rain' mang nghĩa nhượng bộ (Mặc dù mưa to, vẫn đi ăn) -> dùng **in spite of**." },
            { q: "The doctor _____ treated me was very kind and patient.", options: ["which", "who", "whom", "whose"], correct: 1, ext: "Đại từ quan hệ: Thay thế cho danh từ chỉ người 'The doctor' làm chủ ngữ cho động từ 'treated' -> dùng **who**." },
            { q: "Rodrygo: \"Thank you very much for your help.\"\nVinicius: \"_____\"", options: ["It's quite OK", "I'd love to", "You're welcome", "Of course"], correct: 2, ext: "Giao tiếp: Để đáp lời khi ai đó cảm ơn mình, ta nói **You're welcome** (Không có chi)." },
            { q: "They need to _____ their budget for the project to avoid overspending and ensure successful completion.", options: ["add up", "keep track of", "turn in", "take over"], correct: 1, ext: "Cụm từ: **keep track of** (theo dõi, nắm bắt). Họ cần theo dõi sát sao ngân sách để tránh chi tiêu lố." },
            { q: "If you eat too quickly, you may not _____ attention to whether your hunger is satisfied.", options: ["pay", "take", "keep", "show"], correct: 0, ext: "Cụm từ cố định: **pay attention to** (chú ý đến điều gì đó)." },
            { q: "They met on board of a luxurious yacht during a _____ in the Caribbean.", options: ["tour", "voyage", "cruise", "trip"], correct: 2, ext: "Từ vựng: Chuyến du ngoạn nghỉ dưỡng trên tàu thủy sang trọng được gọi là **cruise**." },
            { q: "They had _____ lunch at a new café.", options: ["a", "an", "the", "Ø"], correct: 3, ext: "Ngữ pháp: Không dùng mạo từ trước các bữa ăn thông thường hàng ngày (have breakfast, have lunch, have dinner) -> **Ø**." },
            { q: "My family loves going _____ the movies on weekends.", options: ["in", "on", "at", "to"], correct: 3, ext: "Giới từ: Đi tới một địa điểm giải trí, ta dùng **go to** (go to the movies)." },
            { q: "_____ students in our school like to play sports every day.", options: ["Much", "Many", "Little", "Any"], correct: 1, ext: "Lượng từ: 'students' là danh từ đếm được số nhiều -> dùng **Many** (nhiều học sinh)." },
            { q: "This restaurant serves the _____ food ever.", options: ["more delicious", "so delicious", "delicious", "most delicious"], correct: 3, ext: "Ngữ pháp: Có mạo từ 'the' và từ 'ever' (từ trước tới nay) báo hiệu cấu trúc so sánh nhất -> **most delicious**." },
            { q: "_____ Lan is very busy with her work, she reads a story to her children every night.", options: ["Despite", "Because of", "Because", "Although"], correct: 3, ext: "Liên từ: Liên kết mệnh đề mang ý nhượng bộ (Mặc dù bận rộn...). Phía sau là một mệnh đề hoàn chỉnh (S+V) -> dùng **Although**." },
