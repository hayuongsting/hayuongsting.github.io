            { q: "The city council is planning to ________ the old stadium and build a modern shopping mall.", options: ["demolish", "destroy", "damage", "erase"], correct: 0, ext: "Từ vựng: **demolish** (phá dỡ một công trình xây dựng để giải phóng mặt bằng)." }
        ];

        // Biến lưu trữ Test
        let tests = [];
        let currentTestIdx = -1;
        let currentTestData = [];
        let userChoices = [];
        let score = 0;
        let currentIdx = 0;
        let allUserChoices = [];

        // Hàm trộn mảng
        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Khởi tạo và chia Test
        function init() {
            // Trộn toàn bộ ngân hàng câu hỏi 1 lần duy nhất
            const shuffled = shuffle(qData);
            const QUESTIONS_PER_TEST = 20;
            tests = [];
            
            // Chia đều mảng đã trộn thành các block 20 câu
            for (let i = 0; i < shuffled.length; i += QUESTIONS_PER_TEST) {
                tests.push(shuffled.slice(i, i + QUESTIONS_PER_TEST));
            }
            
            allUserChoices = tests.map(test => new Array(test.length).fill(null));
            renderTestGrid();
        }

        // Render nút chọn Test
        function renderTestGrid() {
            const grid = document.getElementById('test-grid');
            grid.innerHTML = '';
            
            tests.forEach((test, index) => {
                const btn = document.createElement('button');
                btn.className = 'test-btn';
                
                // Calculate correct answers
                const choices = allUserChoices[index];
                let correctCount = 0;
                let answeredCount = 0;
                if (choices) {
                    choices.forEach((c, i) => {
                        if (c !== null) {
                            answeredCount++;
                            if (c === test[i].correct) correctCount++;
                        }
                    });
                }

                if (answeredCount > 0) {
                    btn.innerHTML = `Test ${index + 1} <span>(${correctCount}/${test.length} đúng)</span>`;
                } else {
                    btn.innerHTML = `Test ${index + 1}`;
                }

                btn.onclick = () => loadTest(index);
                grid.appendChild(btn);
            });
        }

        // Chuyển sang màn hình làm Quiz
        function loadTest(index) {
            currentTestIdx = index;
            currentTestData = tests[index];
            userChoices = allUserChoices[index];
            
            score = 0;
            userChoices.forEach((choice, i) => {
                if (choice !== null && choice === currentTestData[i].correct) {
                    score += 10;
                }
            });
            
            currentIdx = userChoices.indexOf(null);
            if (currentIdx === -1) currentIdx = 0;

            // UI updates
            document.getElementById('test-selector-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('main-title').innerText = `Test ${index + 1}`;
            document.getElementById('total-idx').innerText = currentTestData.length;

            // Tạo bảng điều hướng câu hỏi cho Test hiện tại
            const nav = document.getElementById('nav-panel');
            nav.innerHTML = '';
            currentTestData.forEach((_, i) => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn'; 
                btn.innerText = i + 1;
                btn.onclick = () => jumpTo(i);
                nav.appendChild(btn);
            });

            loadQuestion();
        }

        // Trở về danh sách Test
        function goHome() {
            document.getElementById('test-selector-screen').style.display = 'block';
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('main-title').innerText = 'English Quiz: Ultimate Collection';
            renderTestGrid();
        }

        // Render câu hỏi chi tiết
        function loadQuestion() {
            const data = currentTestData[currentIdx];
            document.getElementById('cur-idx').innerText = currentIdx + 1;
            document.getElementById('score').innerText = score;
            
            const qEl = document.getElementById('question');
            qEl.innerText = data.q;

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            data.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${String.fromCharCode(65 + i)}. ${opt}`;
                
                // Nếu người dùng đã chọn đáp án cho câu này
                if (userChoices[currentIdx] !== null) {
                    btn.disabled = true;
                    if (i === data.correct) btn.classList.add('correct');
                    if (i === userChoices[currentIdx] && i !== data.correct) btn.classList.add('wrong');
                } else {
                    btn.onclick = () => selectOption(i);
                }
                optionsDiv.appendChild(btn);
            });

            const exp = document.getElementById('explanation');
            const nxt = document.getElementById('next-btn');
            
            // Xử lý hiện Giải thích & Nút chuyển câu
            if (userChoices[currentIdx] !== null) {
                let htmlExt = data.ext.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                exp.innerHTML = "💡 Giải thích: " + htmlExt;
                exp.style.display = 'block'; 
                nxt.style.display = 'inline-block';
            } else {
                exp.style.display = 'none'; 
                nxt.style.display = 'none';
            }
            
            updateNav();
        }

        // Xử lý chọn đáp án
        function selectOption(i) {
            if (userChoices[currentIdx] !== null) return;
            userChoices[currentIdx] = i;
            if (i === currentTestData[currentIdx].correct) {
                score += 10;
            }
            loadQuestion();
        }

        // Xử lý nút Tiếp theo
        function handleNext() {
            if (currentIdx < currentTestData.length - 1) {
                currentIdx++; 
                loadQuestion();
            } else {
                alert(`🎉 Chúc mừng! Bạn đã hoàn thành Test ${currentTestIdx + 1}.\nĐiểm của bạn: ${score}/${currentTestData.length * 10}`);
            }
        }

        // Nhảy đến câu hỏi bất kỳ
        function jumpTo(i) { 
            currentIdx = i; 
            loadQuestion(); 
        }

        // Cập nhật trạng thái thanh Nav Menu
        function updateNav() {
            const btns = document.getElementById('nav-panel').children;
            for (let i = 0; i < btns.length; i++) {
                btns[i].classList.remove('active');
                if (i === currentIdx) btns[i].classList.add('active');
                if (userChoices[i] !== null) {
                    btns[i].classList.add(userChoices[i] === currentTestData[i].correct ? 'correct' : 'wrong');
                }
            }
        }

        // === MUSIC PLAYER LOGIC ===
        const audio = document.getElementById('bg-audio');
        const playBtn = document.getElementById('play-btn');
        const progressBar = document.getElementById('music-progress');
        const curTime = document.getElementById('music-cur');
        const durTime = document.getElementById('music-dur');
        const noteIcon = document.getElementById('music-note');

        function fmtTime(s) {
            if (isNaN(s)) return "0:00";
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return m + ':' + (sec < 10 ? '0' : '') + sec;
        }

        audio.addEventListener('loadedmetadata', () => {
            progressBar.max = audio.duration;
            durTime.textContent = fmtTime(audio.duration);
        });

        audio.addEventListener('timeupdate', () => {
            progressBar.value = audio.currentTime;
            curTime.textContent = fmtTime(audio.currentTime);
        });

        audio.addEventListener('play',  () => { playBtn.textContent = '⏸'; noteIcon.style.animationPlayState = 'running'; });
        audio.addEventListener('pause', () => { playBtn.textContent = '▶'; noteIcon.style.animationPlayState = 'paused'; });
        audio.addEventListener('ended', () => { playBtn.textContent = '▶'; noteIcon.style.animationPlayState = 'paused'; });

        progressBar.addEventListener('input', () => { audio.currentTime = progressBar.value; });

        function togglePlay() {
            if (audio.paused) { audio.play(); } else { audio.pause(); }
        }
        function restartTrack() {
            audio.currentTime = 0;
            audio.play();
        }
        function setVolume(v) {
            audio.volume = v;
        }

        audio.volume = 0.6;
        noteIcon.style.animationPlayState = 'paused';

        // Khởi động khi load trang
        window.onload = init;
    </script>
</body>
</html>
