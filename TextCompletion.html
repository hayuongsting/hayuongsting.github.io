<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THPT 2025 – English Exam: Biometrics 2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: rgba(99,179,237,0.15);
    --accent1: #63b3ed;
    --accent2: #9f7aea;
    --correct: #48bb78;
    --correct-bg: rgba(72,187,120,0.12);
    --correct-border: rgba(72,187,120,0.5);
    --wrong: #fc8181;
    --wrong-bg: rgba(252,129,129,0.1);
    --wrong-border: rgba(252,129,129,0.5);
    --text: #e2e8f0;
    --muted: #8896a8;
    --highlight: rgba(99,179,237,0.12);
    --grad1: linear-gradient(135deg, #63b3ed 0%, #9f7aea 100%);
    --grad2: linear-gradient(135deg, #0a0e1a 0%, #1a1a2e 50%, #0d1b2a 100%);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--grad2);
    min-height: 100vh;
    color: var(--text);
    overflow-x: hidden;
  }

  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(99,179,237,0.08) 0%, transparent 70%);
    top: -200px; left: -200px;
  }
  body::after {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(159,122,234,0.07) 0%, transparent 70%);
    bottom: -150px; right: -150px;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
    position: relative;
    z-index: 1;
  }

  .exam-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    align-items: start;
  }

  @media (max-width: 900px) {
    .exam-layout {
      grid-template-columns: 1fr;
    }
  }

  .left-col {
    position: sticky;
    top: 2rem;
    max-height: calc(100vh - 4rem);
    overflow-y: auto;
    /* Custom scrollbar for the passage area */
    scrollbar-width: thin;
    scrollbar-color: var(--accent1) var(--surface);
  }
  .left-col::-webkit-scrollbar {
    width: 6px;
  }
  .left-col::-webkit-scrollbar-track {
    background: var(--surface);
    border-radius: 4px;
  }
  .left-col::-webkit-scrollbar-thumb {
    background-color: var(--accent1);
    border-radius: 4px;
  }

  .right-col {
    display: flex;
    flex-direction: column;
  }

  .exam-header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeDown 0.7s ease both;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(99,179,237,0.1);
    border: 1px solid rgba(99,179,237,0.3);
    border-radius: 100px;
    padding: 5px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent1);
    margin-bottom: 1rem;
  }
  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent1);
    animation: pulse 2s infinite;
  }
  h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    background: var(--grad1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }
  .subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  .scorebar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.9rem 1.25rem;
    margin-bottom: 1.75rem;
    animation: fadeDown 0.7s 0.1s ease both;
    gap: 1rem;
  }
  .score-item { text-align: center; flex-shrink: 0; }
  .score-item .val {
    font-size: 1.5rem;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    background: var(--grad1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .score-item .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
  .progress-wrap { flex: 1; }
  .progress-track {
    background: rgba(255,255,255,0.06);
    border-radius: 100px;
    height: 6px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 100px;
    background: var(--grad1);
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }
  .progress-lbl { font-size: 11px; color: var(--muted); margin-top: 5px; text-align: right; }

  .section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent1);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .passage-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    margin-bottom: 2rem;
    font-size: 0.875rem;
    line-height: 2;
    color: #c8d3e0;
    animation: fadeUp 0.6s 0.2s ease both;
    position: relative;
    overflow: hidden;
  }
  .passage-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--grad1);
  }
  .passage-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .passage-tag {
    font-size: 0.7rem;
    font-weight: 500;
    background: var(--highlight);
    color: var(--accent1);
    border: 1px solid rgba(99,179,237,0.2);
    border-radius: 6px;
    padding: 2px 8px;
  }
  .blank-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    background: rgba(159,122,234,0.15);
    color: #c4b5fd;
    border: 1px solid rgba(159,122,234,0.3);
    border-radius: 5px;
    padding: 1px 7px;
    margin: 0 2px;
    vertical-align: middle;
  }
  .passage-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 1rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
    font-style: italic;
  }

  .questions-wrap { display: flex; flex-direction: column; gap: 1.25rem; }

  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
    transition: border-color 0.3s;
  }
  .q-card:hover { border-color: rgba(99,179,237,0.25); }

  .q-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }
  .q-num {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--grad1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .q-type {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .q-body { padding: 1.25rem; }

  .options { display: flex; flex-direction: column; gap: 8px; }

  .opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.07);
    cursor: pointer;
    font-size: 13.5px;
    color: var(--text);
    background: rgba(255,255,255,0.025);
    transition: all 0.2s ease;
    line-height: 1.55;
  }
  .opt:hover:not(.locked) {
    border-color: rgba(99,179,237,0.35);
    background: rgba(99,179,237,0.06);
    transform: translateX(2px);
  }
  .opt-letter {
    width: 24px; height: 24px;
    border-radius: 6px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
    transition: all 0.2s;
    color: var(--muted);
    margin-top: 1px;
  }
  .opt.correct {
    border-color: var(--correct-border);
    background: var(--correct-bg);
    color: #c6f6d5;
  }
  .opt.correct .opt-letter {
    background: var(--correct);
    border-color: var(--correct);
    color: white;
  }
  .opt.wrong {
    border-color: var(--wrong-border);
    background: var(--wrong-bg);
    color: #fed7d7;
  }
  .opt.wrong .opt-letter {
    background: var(--wrong);
    border-color: var(--wrong);
    color: white;
  }
  .opt.locked { cursor: default; pointer-events: none; }
  .opt.dimmed { opacity: 0.32; }

  .feedback {
    display: none;
    margin-top: 1rem;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 12.5px;
    line-height: 1.65;
    animation: slideIn 0.3s ease;
  }
  .feedback.show { display: block; }
  .feedback.ok {
    background: var(--correct-bg);
    border: 1px solid var(--correct-border);
    color: #9ae6b4;
  }
  .feedback.err {
    background: var(--wrong-bg);
    border: 1px solid var(--wrong-border);
    color: #feb2b2;
  }
  .fb-row { display: flex; gap: 8px; margin-bottom: 4px; align-items: flex-start; }
  .fb-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .fb-title { font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
  .fb-explain { font-size: 12.5px; color: rgba(255,255,255,0.65); margin-top: 6px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 6px; }
  .fb-grammar {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #c4b5fd;
    background: rgba(159,122,234,0.1);
    border-radius: 4px;
    padding: 2px 6px;
  }

  .actions {
    display: flex;
    gap: 10px;
    margin-top: 2rem;
    flex-wrap: wrap;
    animation: fadeUp 0.5s 0.5s ease both;
  }
  .btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }
  .btn-primary {
    background: var(--grad1);
    color: white;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--muted);
  }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

  .result-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    margin-top: 2rem;
    text-align: center;
    animation: fadeUp 0.5s ease;
    position: relative;
    overflow: hidden;
  }
  .result-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--grad1);
  }
  .result-grade {
    font-size: 3.5rem;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    background: var(--grad1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  .result-msg { font-size: 0.9rem; color: var(--muted); margin-bottom: 1.25rem; }
  .result-stats {
    display: flex;
    justify-content: center;
    gap: 2rem;
    font-size: 13px;
    color: var(--muted);
  }
  .result-stats span { color: var(--text); font-weight: 500; }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .q-card:nth-child(1) { animation-delay: 0.1s; }
  .q-card:nth-child(2) { animation-delay: 0.15s; }
  .q-card:nth-child(3) { animation-delay: 0.2s; }
  .q-card:nth-child(4) { animation-delay: 0.25s; }
  .q-card:nth-child(5) { animation-delay: 0.3s; }

  .instruction {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 1.5rem;
    font-style: italic;
  }

  /* Selection Screen Styles */
  .select-screen {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }
  .exam-option {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem 2rem;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .exam-option:hover {
    border-color: var(--accent1);
    transform: translateY(-2px);
    background: rgba(255,255,255,0.03);
  }
  .eo-title {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  .eo-meta {
    font-size: 0.85rem;
    color: var(--muted);
  }
  .eo-btn {
    background: var(--grad1);
    color: white;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Sora', sans-serif;
    border: none;
    cursor: pointer;
  }

  #exam-container {
    display: none;
  }
  
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--accent1);
    background: rgba(99,179,237,0.1);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid rgba(99,179,237,0.2);
    margin-bottom: 1.5rem;
    transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(99,179,237,0.2); }
</style>
</head>
<body>
<div class="container">

  <div class="exam-header">
    <div class="badge"><span class="badge-dot"></span>Kỳ thi tốt nghiệp THPT 2025</div>
    <h1>English Exam Practice</h1>
    <p class="subtitle" id="main-subtitle">Text Completion · Reading Comprehension</p>
  </div>

  <!-- SELECTION SCREEN -->
  <div id="select-screen" class="select-screen">
    <!-- Populated by JS -->
  </div>

  <!-- EXAM CONTAINER -->
  <div id="exam-container">
    <div class="back-btn" onclick="showSelectScreen()">← Back to exams</div>
    
    <div class="scorebar">
      <div class="score-item">
        <div class="val" id="val-correct">0</div>
        <div class="lbl">Đúng</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-lbl" id="progress-lbl">0 / 5 câu</div>
      </div>
      <div class="score-item">
        <div class="val" id="val-wrong">0</div>
        <div class="lbl">Sai</div>
      </div>
    </div>

    <div class="exam-layout">
      <!-- Cột trái: Passage -->
      <div class="left-col">
        <div class="section-title">Reading Passage</div>
        <div class="passage-card">
          <div class="passage-title" id="p-title">Title <span class="passage-tag">Source text</span></div>
          <div class="passage-meta" id="p-meta">Meta</div>
          <div id="p-content"></div>
        </div>
      </div>
      
      <!-- Cột phải: Questions -->
      <div class="right-col">
        <div class="section-title">Questions 1–5</div>
        <p class="instruction">Mark the letter A, B, C, or D to indicate the option that best fits each numbered blank.</p>

        <div class="questions-wrap" id="qlist"></div>

        <div class="actions">
          <button class="btn btn-primary" onclick="revealAll()">Show all answers</button>
          <button class="btn btn-ghost" onclick="resetAll()">Reset</button>
        </div>

        <div class="result-panel" id="result-panel">
          <div class="result-grade" id="result-grade">5/5</div>
          <div class="result-msg" id="result-msg"></div>
          <div class="result-stats" id="result-stats"></div>
        </div>
      </div> <!-- end right-col -->
    </div> <!-- end exam-layout -->
  </div> <!-- end exam-container -->

</div>

<script>
const ALL_EXAMS = [
  {
    id: 'biometrics',
    title: 'BIOMETRICS 2.0',
    meta: 'Adapted from a technology article',
    html: `
      <p>From iris scans to cardiac signatures, next-generation biometrics promise seamless journeys through airports.</p>
      <p>From iris scans to cardiac signatures, next-generation biometrics promise seamless journeys through airports.</p>
      <p>The next time you fly you may be able to simply walk through the scanning gate and continue without stopping. There’ll be no need to take out your passport or phone <span class="blank-tag">1</span>. Nothing new? Well, now it won’t be your face the system is scanning, but your heartbeat. Welcome to Biometrics 2.0.</p>
      <br>
      <p><span class="blank-tag">2</span> is continuous verification rather than one-off checks. Currently, most airports rely on fingerprints or a single facial scan at a gate. The next wave, powered by AI, verifies identity seamlessly as you move through the airport.</p>
      <br>
      <p>Biometrics 2.0 represents a shift from checkpoint-based security to background identity assurance. Instead of isolated inspection points, verification happens quietly and continuously. By reducing reliance on manual checks, <span class="blank-tag">3</span> such as immigration and security screenings.</p>
      <br>
      <p>Singapore’s Changi Airport already uses iris and facial recognition at multiple checkpoints. Airports in Jakarta and Surabaya have introduced biometric corridors that enable passengers to move through checkpoints using facial verification. Meanwhile, the Smart Path platform by SITA, the world’s leading specialist in air transport communications and information technology, is deployed in more than 40 airports worldwide, <span class="blank-tag">4</span> through a single facial enrolment.</p>
      <br>
      <p>Biometrics 2.0 is no longer theoretical. <span class="blank-tag">5</span>.</p>
    `,
    questions: [
      {
        num: 1,
        type: "Sentence Structure",
        opts: [
          "passing through immigration and security",
          "to pass through immigration and security",
          "when passed through immigration and security",
          "to be passing through immigration and security"
        ],
        ans: 1, // B
        grammar: "Purpose infinitive",
        tip: "Cấu trúc chỉ mục đích (in order to do sth/ to do sth). 'to pass through...' mang nghĩa 'để đi qua...'. Do đó, cần dùng động từ nguyên mẫu có 'to'."
      },
      {
        num: 2,
        type: "Noun Clause",
        opts: [
          "What sets next-generation biometrics apart from today’s systems",
          "That next-generation biometrics set apart from today’s systems",
          "Setting next-generation biometrics apart from today’s systems",
          "It sets next-generation biometrics apart from today’s systems"
        ],
        ans: 0, // A
        grammar: "Noun clause as subject",
        tip: "Cấu trúc mệnh đề danh ngữ (Noun clause) đóng vai trò làm chủ ngữ cho động từ 'is' phía sau. 'What sets next-generation biometrics apart...' = Điều làm cho sinh trắc học thế hệ tiếp theo khác biệt..."
      },
      {
        num: 3,
        type: "Sentence Structure",
        opts: [
          "the margin for human error can lower by AI-driven systems in high-security settings",
          "high-security settings can lower the margin for human error by AI-driven systems",
          "AI-driven systems can lower the margin for human error in high-security settings",
          "human error in high-security settings can be lowered margin by AI-driven systems"
        ],
        ans: 2, // C
        grammar: "Subject alignment",
        tip: "Mệnh đề chỉ phương thức 'By reducing...' có chủ ngữ ngầm định là người thực hiện hành động hoặc chủ thể gây ra hành động đó. Ở đây, 'AI-driven systems' là chủ ngữ hợp lý nhất có thể 'lower the margin for human error'. Các phương án dùng bị động hoặc chủ ngữ sai lô-gic đều không phù hợp."
      },
      {
        num: 4,
        type: "Participle clause",
        opts: [
          "integrated biometrics across check-in, security, border control and boarding",
          "integrates biometrics across check-in, security, border control and boarding",
          "to integrate biometrics across check-in, security, border control and boarding",
          "integrating biometrics across check-in, security, border control and boarding"
        ],
        ans: 3, // D
        grammar: "Present participle clause",
        tip: "Đây là cấu trúc Rút gọn mệnh đề quan hệ (hoặc mệnh đề phân từ) mang ý nghĩa chủ động, nối tiếp ý của câu trước (..., which integrates... -> ..., integrating...)."
      },
      {
        num: 5,
        type: "Sentence Cohesion",
        opts: [
          "Steadily reshaping the passenger journey, identity itself turns into the ultimate travel document.",
          "It is steadily reshaping the passenger journey and turning identity itself into the ultimate travel document.",
          "It steadily reshapes the passenger journey and to turn identity itself into the ultimate travel document.",
          "Reshaping the passenger journey steadily and identity itself is turned into the ultimate travel document."
        ],
        ans: 1, // B
        grammar: "Pronoun reference & Parallelism",
        tip: "Liên kết đại từ. 'It' ở đây thay thế cho 'Biometrics 2.0'. Động từ chia ở thì hiện tại tiếp diễn 'is steadily reshaping... and turning...' diễn tả một quá trình đang diễn ra."
      }
    ]
  },
  {
    id: 'heart',
    title: 'Heart Problems in Young Adults',
    meta: 'Health & Lifestyle',
    html: `
      <p>Mounting evidence shows that more young adults are experiencing heart problems than in previous decades. Heart attacks occur when blood flow to the heart <span class="blank-tag">1</span>. One reason is the growing number of lifestyle-related health problems, <span class="blank-tag">2</span>. Other factors like tobacco, cocaine, marijuana, and alcohol use have been associated with increased risks of heart attack in younger adults, too.</p>
      <br>
      <p>The major risk factors—high blood pressure, high cholesterol, diabetes, and obesity—can damage arteries over time. While these conditions may be inherited, <span class="blank-tag">3</span> often play a larger role.</p>
      <br>
      <p><span class="blank-tag">4</span>. A recent survey found that 47% of people under 45 don’t believe they’re at risk for heart disease, and one-third of adults wouldn’t confidently recognize heart attack symptoms. Half of 3,500 younger adults with significant risk factors didn’t believe they were at risk before their heart attack occurred. Even fewer said their doctors warned them—especially women.</p>
      <br>
      <p>Experts say that getting young adults to care about heart health is a unique challenge. <span class="blank-tag">5</span>. Experts emphasize early prevention, since untreated risk factors lead to worse outcomes over time.</p>
    `,
    questions: [
      {
        num: 1,
        type: "Verb Phrase",
        opts: [
          "has been incompletely blocked",
          "that is partially or completely blocking",
          "is getting a blockage completely",
          "is partially or completely blocked"
        ],
        ans: 3,
        grammar: "Passive Voice",
        tip: "Mệnh đề trạng ngữ chỉ thời gian 'when blood flow to the heart...'. 'blood flow' (lưu lượng máu) cần đi với dạng bị động 'is blocked' (bị tắc nghẽn)."
      },
      {
        num: 2,
        type: "Relative Clause",
        opts: [
          "largely resulting from poor diet and physical inactivity",
          "which are influenced by diet and regular exercise",
          "mainly associated with poor diet and physical inactivity",
          "that are closely linked to poor diet and physical inactivity"
        ],
        ans: 0,
        grammar: "Participle phrase",
        tip: "Rút gọn mệnh đề quan hệ dạng chủ động: which largely result from -> largely resulting from. Các đáp án khác sai về nghĩa hoặc không phải là hệ quả hợp lý."
      },
      {
        num: 3,
        type: "Noun Phrase",
        opts: [
          "the unhealthy lifestyle choices kept in childhood",
          "unhealthy lifestyle choices starting in childhood",
          "people keep unhealthy lifestyle choices in childhood",
          "choosing unhealthy lifestyle in childhood"
        ],
        ans: 1,
        grammar: "Noun phrase as subject",
        tip: "Vị trí này cần một cụm danh từ làm chủ ngữ cho 'often play a larger role'. 'choices starting in childhood' (những lựa chọn bắt đầu từ thời thơ ấu) là phù hợp nhất về mặt ngữ pháp và ngữ nghĩa."
      },
      {
        num: 4,
        type: "Sentence Cohesion",
        opts: [
          "Because of these risks, many young adults remain unaware",
          "Being aware of the risk, many young adults are taking risks",
          "Despite these risks, many young adults remain unaware",
          "There is unawareness among young adults due to these risks"
        ],
        ans: 2,
        grammar: "Concession",
        tip: "Đoạn văn mang ý tương phản: Nguy cơ có thật và rất lớn (được nhắc ở đoạn trước), nhưng người trẻ lại KHÔNG tin (don't believe). Do đó cần dùng cấu trúc nhượng bộ: Despite these risks... (Bất chấp những nguy cơ này...)"
      },
      {
        num: 5,
        type: "Sentence Structure",
        opts: [
          "As they are busy with careers and families, this group often overlooks their heart health",
          "While they are busy with careers and families, they consider long-term health risks carefully",
          "When they neglect their heart health, it is often due to pressure from work and family duties",
          "Although they are busy with careers and families, they manage to take good care of their heart health"
        ],
        ans: 0,
        grammar: "Adverbial clause of reason",
        tip: "Hợp lý về mặt ngữ nghĩa nhất nối tiếp ý 'thử thách độc đáo' (unique challenge): Vì bận rộn sự nghiệp và gia đình nên nhóm người này thường bỏ qua việc chăm sóc tim mạch."
      }
    ]
  }
];

let QS = [];
const L = ['A','B','C','D'];
let done = Array(5).fill(false);
let corr = Array(5).fill(false);
let cntC = 0, cntW = 0;

function initApp() {
  const selectScreen = document.getElementById('select-screen');
  selectScreen.innerHTML = '';
  
  ALL_EXAMS.forEach((exam, idx) => {
    const div = document.createElement('div');
    div.className = 'exam-option';
    div.innerHTML = `
      <div>
        <div class="eo-title">Test ${idx + 1}: ${exam.title}</div>
        <div class="eo-meta">${exam.meta}</div>
      </div>
      <button class="eo-btn">Start Test</button>
    `;
    div.onclick = () => startExam(exam.id);
    selectScreen.appendChild(div);
  });
}

function showSelectScreen() {
  document.getElementById('exam-container').style.display = 'none';
  document.getElementById('select-screen').style.display = 'flex';
  document.getElementById('main-subtitle').textContent = 'Text Completion · Reading Comprehension';
}

function startExam(id) {
  const exam = ALL_EXAMS.find(e => e.id === id);
  if (!exam) return;
  
  document.getElementById('select-screen').style.display = 'none';
  document.getElementById('exam-container').style.display = 'block';
  document.getElementById('main-subtitle').textContent = `Text Completion · ${exam.title}`;
  
  document.getElementById('p-title').innerHTML = `${exam.title} <span class="passage-tag">Source text</span>`;
  document.getElementById('p-meta').textContent = exam.meta;
  document.getElementById('p-content').innerHTML = exam.html;
  
  QS = exam.questions;
  resetAll();
}

function build() {
  const wrap = document.getElementById('qlist');
  wrap.innerHTML = '';
  QS.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">${q.num}</div>
        <div>
          <div style="font-size:13px;font-weight:500;color:var(--text)">Question ${q.num}</div>
          <div class="q-type">${q.type}</div>
        </div>
      </div>
      <div class="q-body">
        <div class="options" id="opts-${qi}">
          ${q.opts.map((o, oi) => `
            <div class="opt" id="op${qi}_${oi}" onclick="pick(${qi},${oi})">
              <div class="opt-letter">${L[oi]}</div>
              <span>${o}</span>
            </div>`).join('')}
        </div>
        <div class="feedback" id="fb-${qi}"></div>
      </div>
    `;
    wrap.appendChild(card);
  });
  updateBar();
}

function pick(qi, oi) {
  if (done[qi]) return;
  done[qi] = true;
  const q = QS[qi];
  const ok = oi === q.ans;
  corr[qi] = ok;
  if (ok) cntC++; else cntW++;

  for (let i = 0; i < 4; i++) {
    const el = document.getElementById(`op${qi}_${i}`);
    el.classList.add('locked');
    if (i === q.ans) el.classList.add('correct');
    else if (i === oi) el.classList.add('wrong');
    else el.classList.add('dimmed');
  }

  const fb = document.getElementById(`fb-${qi}`);
  fb.className = `feedback show ${ok ? 'ok' : 'err'}`;
  fb.innerHTML = `
    <div class="fb-row">
      <span class="fb-icon">${ok ? '&#10003;' : '&#10007;'}</span>
      <div>
        <div class="fb-title">${ok ? 'Correct!' : 'Incorrect — Dap an dung: ' + L[q.ans]}</div>
      </div>
    </div>
    <div class="fb-explain">
      <span class="fb-grammar">${q.grammar}</span>&nbsp;&nbsp;${q.tip}
    </div>
  `;

  updateBar();
  if (done.every(Boolean)) showResult();
}

function revealAll() {
  QS.forEach((q, qi) => {
    if (done[qi]) return;
    done[qi] = true;
    for (let i = 0; i < 4; i++) {
      const el = document.getElementById(`op${qi}_${i}`);
      el.classList.add('locked');
      if (i === q.ans) el.classList.add('correct');
      else el.classList.add('dimmed');
    }
    const fb = document.getElementById(`fb-${qi}`);
    fb.className = 'feedback show ok';
    fb.innerHTML = `
      <div class="fb-row">
        <span class="fb-icon">&#8594;</span>
        <div><div class="fb-title">Dap an: ${L[q.ans]} &mdash; ${q.opts[q.ans]}</div></div>
      </div>
      <div class="fb-explain">
        <span class="fb-grammar">${q.grammar}</span>&nbsp;&nbsp;${q.tip}
      </div>
    `;
  });
  updateBar();
  showResult();
}

function resetAll() {
  done = Array(5).fill(false);
  corr = Array(5).fill(false);
  cntC = 0; cntW = 0;
  document.getElementById('result-panel').style.display = 'none';
  build();
}

function updateBar() {
  const answered = done.filter(Boolean).length;
  const pct = (answered / 5) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-lbl').textContent = answered + ' / 5 cau';
  document.getElementById('val-correct').textContent = cntC;
  document.getElementById('val-wrong').textContent = cntW;
}

function showResult() {
  const n = corr.filter(Boolean).length;
  const panel = document.getElementById('result-panel');
  panel.style.display = 'block';
  document.getElementById('result-grade').textContent = n + '/5';
  const msgs = ['Can on tap them!', 'Kha tot — tiep tuc co gang!', 'Tot lam!', 'Xuat sac!', 'Hoan hao!'];
  document.getElementById('result-msg').textContent = msgs[n] || 'Hoan thanh!';
  document.getElementById('result-stats').innerHTML =
    '<div>Dung <span>' + n + ' cau</span></div><div>Sai <span>' + (5 - n) + ' cau</span></div><div>Diem <span>' + (n * 2) + '/10</span></div>';
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// Khởi tạo app
initApp();
</script>
