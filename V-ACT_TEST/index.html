<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V-ACT TEST — English Proficiency Practice</title>
  <meta name="description" content="V-ACT English Proficiency Practice Tests for ĐGNL preparation. 30-question tests at B1-B2 CEFR level.">
  <link rel="stylesheet" href="css/test.css">
  <style>
    .menu-container {
      position: relative; z-index: 1;
      max-width: 700px; margin: 0 auto;
      padding: 24px 20px 80px;
    }
    .menu-header {
      text-align: center;
      padding: 48px 20px 32px;
      position: relative; z-index: 1;
    }
    .menu-header .logo {
      font-size: 3rem; margin-bottom: 12px;
    }
    .menu-header h1 {
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1, #818cf8, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .menu-header p {
      color: var(--text-muted);
      font-size: 1rem;
      max-width: 500px;
      margin: 0 auto;
    }
    .test-list { display: grid; gap: 16px; margin-top: 32px; }
    .test-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      transition: all 0.25s ease;
      text-decoration: none;
      color: inherit;
    }
    .test-item:hover {
      border-color: var(--primary);
      box-shadow: 0 0 24px rgba(99,102,241,0.15);
      transform: translateY(-2px);
    }
    .test-info h3 {
      font-size: 1.1rem; font-weight: 700;
      margin-bottom: 6px; color: var(--text);
    }
    .test-info p { color: var(--text-muted); font-size: 0.88rem; }
    .test-meta {
      display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap;
    }
    .meta-tag {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--surface-2); border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 8px;
      font-size: 0.75rem; color: var(--text-muted);
      font-weight: 600;
    }
    .arrow-icon {
      font-size: 1.4rem; color: var(--primary);
      transition: transform 0.2s ease; flex-shrink: 0;
    }
    .test-item:hover .arrow-icon { transform: translateX(4px); }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text-muted); text-decoration: none;
      font-size: 0.9rem; margin-bottom: 20px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="menu-container">
    <a href="../index.html" class="back-link">← Back to Home</a>
    <div class="menu-header">
      <div class="logo">🎯</div>
      <h1>V-ACT TEST</h1>
      <p>Bài tập tự luyện Tiếng Anh ĐGNL — Chuẩn cấu trúc V-ACT, mức độ B1–B2</p>
    </div>
    <div class="test-list">
      <a href="test1/index.html" class="test-item">
        <div class="test-info">
          <h3>📝 Test 1 — English Proficiency</h3>
          <p>Multiple Choice · Error ID · Sentence Restatement · Reading Comprehension</p>
          <div class="test-meta">
            <span class="meta-tag">📊 30 Questions</span>
            <span class="meta-tag">⏱️ ~45 min</span>
            <span class="meta-tag">📈 B1–B2</span>
          </div>
        </div>
        <span class="arrow-icon">→</span>
      </a>
      <!-- More tests will be added here -->
    </div>
  </div>
</body>
</html>
