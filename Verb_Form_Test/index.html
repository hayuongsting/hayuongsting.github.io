<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verb Form & Word Form - Interactive Game</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/verbformgame.css">
</head>
<body>

<div id="app">
  <!-- START SCREEN (LIST OF QUIZZES) -->
  <div class="screen active" id="start-screen">
    <a class="home-link" href="../../index.html">🏠 Return to Home</a>
    
    <div class="header-section">
      <h1 class="title-gradient">Master Verb & Word Forms</h1>
      <p class="subtitle">Challenge your grammar skills with our interactive quizzes.</p>
    </div>

    <div class="quiz-list" id="quiz-list">
      <!-- Quiz cards will be generated here -->
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen" id="game-screen">
    <div class="game-header">
      <a class="btn-back" href="../../index.html" style="text-decoration:none;display:flex;align-items:center;">← Home</a>
      <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="score-display" id="score-display">0 / 113</div>
    </div>

    <div class="question-container">
      <div class="question-number" id="q-num">Question 1</div>
      <div class="question-text" id="q-text"></div>
      <div class="options-grid" id="options-grid"></div>
    </div>

    <div class="feedback-panel" id="feedback-panel">
      <div class="feedback-header">
        <div class="feedback-title" id="feedback-title"></div>
      </div>
      <div class="feedback-explain" id="feedback-explain"></div>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">Next Question →</button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen" id="result-screen">
    <div class="result-card">
      <h2 class="result-title">Quiz Completed!</h2>
      <div class="result-score" id="final-score"></div>
      <p class="result-message" id="final-message"></p>
      
      <div class="btn-group">
        <button class="btn-primary" onclick="location.reload()">Try Again</button>
        <a class="btn-secondary" href="../../index.html">Return to Home</a>
      </div>
    </div>
  </div>
</div>


<!-- Local Audio Player -->
<audio id="bg-audio" src="../../Playlist_3.mp3" loop preload="auto"></audio>

<!-- Audio bar -->
<div id="audio-bar">
  <div class="vinyl-spin" id="vinyl"></div>
  <button id="play-btn" onclick="toggleAudio()" title="Play / Pause">▶</button>
  <div style="display:flex;flex-direction:column;gap:2px;min-width:90px;">
    <div class="audio-label">STUDY MUSIC</div>
    <div class="audio-info" id="track-name">Playlist 3</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:4px;align-items:center;">
    <label style="font-size:9px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;letter-spacing:1px;">VOL</label>
    <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="1"
      oninput="setVolume(this.value)"
      style="width:80px;height:3px;accent-color:var(--accent);cursor:pointer;">
  </div>
</div>

<script src="js/verbformgame.js"></script>
</body>
</html>
