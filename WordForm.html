<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Form Quiz - English Mastery</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/wordform.css">
</head>
<body>

    <audio id="bg-audio" loop preload="auto">
        <source src="assets/Tong_hop.mp3" type="audio/mpeg">
    </audio>

    <div id="menu-screen">
        <a href="index.html" class="home-link">🏠 Home</a>
        <h1>Word Form Quiz 🎮</h1>
        <p class="subtitle">Lịch sử làm bài được lưu tự động trên máy của bạn.</p>
        
        <div class="stats-board">
            <span id="stat-progress">Đã làm: 0/317</span>
            <span id="stat-score">Điểm: 0</span>
        </div>

        <div class="question-grid-container" id="grid-container"></div>

        <button class="reset-btn" onclick="resetProgress()">🗑️ Xóa lịch sử làm bài</button>
    </div>

    <div id="game-container">
        <div class="header">
            <button class="back-btn" onclick="initMenu()">← MENU</button>
            <span id="question-tracker">Câu 1 / 317</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        
        <div class="question-text" id="question-text">Đang tải câu hỏi...</div>
        <div class="options-grid" id="options-grid"></div>
        <div id="explanation-box"></div>
        <button id="next-btn" onclick="nextQuestion()">TIẾP TỤC ➡️</button>
    </div>

    <div id="music-widget">
        <div class="player-icon"></div>
        <button class="play-btn" id="play-pause-btn">▶</button>
        <div class="track-info">
            <span class="track-title">Playlist</span>
            <span class="track-name">Tổng Hợp MP3</span>
        </div>
        <div class="volume-control">
            <span class="vol-label">VOL</span>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
        </div>
        <div class="track-badge">🎵 Playing...</div>
    </div>

    <!-- Load Questions from External File -->
    <script src="js/wordform.js"></script>

    <script>
        let savedData = JSON.parse(localStorage.getItem('lofiQuizProgress')) || { answered: {} };
        let currentQuestionIndex = 0;
        let hasAnswered = false;
        
        const bgAudio = document.getElementById('bg-audio');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const volumeSlider = document.getElementById('volume-slider');
        const trackBadge = document.querySelector('.track-badge');
        let musicStarted = false;

        bgAudio.volume = 0.5;
        volumeSlider.value = 0.5;

        bgAudio.addEventListener('play', () => {
            playPauseBtn.innerHTML = '⏸';
            trackBadge.innerHTML = '🎵 Playing...';
            trackBadge.style.color = '#e2e2e2';
        });
        
        bgAudio.addEventListener('pause', () => {
            playPauseBtn.innerHTML = '▶';
            trackBadge.innerHTML = '🎵 Paused';
        });

        bgAudio.addEventListener('error', () => {
            trackBadge.innerHTML = '❌ Lỗi File MP3';
            trackBadge.style.color = '#ef4444';
        });

        function toggleMusic() {
            if (bgAudio.paused) {
                bgAudio.play().then(() => {
                    musicStarted = true;
                }).catch(e => {
                    trackBadge.innerHTML = '🔇 Cần click';
                });
            } else {
                bgAudio.pause();
            }
        }

        playPauseBtn.addEventListener('click', toggleMusic);
        volumeSlider.addEventListener('input', (e) => { bgAudio.volume = e.target.value; });

        // Khởi tạo nhạc khi người dùng click bất kỳ đâu (giống file gốc)
        window.addEventListener('click', () => {
            if (!musicStarted) {
                bgAudio.play().then(() => {
                    musicStarted = true;
                }).catch(() => {});
            }
        }, { once: true });

        function getCalculatedScore() {
            return Object.values(savedData.answered).filter(a => a.isCorrect).length;
        }

        function initMenu() {
            document.getElementById('menu-screen').style.display = 'block';
            document.getElementById('game-container').style.display = 'none';
            document.body.style.backgroundColor = "#a9d6e5";

            let total = questions.length;
            let answeredCount = Object.keys(savedData.answered).length;
            let score = getCalculatedScore();

            document.getElementById('stat-progress').innerText = `Đã làm: ${answeredCount}/${total}`;
            document.getElementById('stat-score').innerText = `Điểm: ${score}`;

            let grid = document.getElementById('grid-container');
            grid.innerHTML = '';
            for(let i = 0; i < total; i++) {
                let btn = document.createElement('button');
                btn.className = 'grid-btn';
                btn.innerText = i + 1;
                if(savedData.answered[i]) {
                    if(savedData.answered[i].isCorrect) btn.classList.add('correct');
                    else btn.classList.add('wrong');
                }
                btn.onclick = () => openQuestion(i);
                grid.appendChild(btn);
            }
        }

        function resetProgress() {
            if(confirm('Xóa toàn bộ lịch sử?')) {
                localStorage.removeItem('lofiQuizProgress');
                savedData = { answered: {} };
                initMenu();
            }
        }

        function openQuestion(index) {
            currentQuestionIndex = index;
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            loadQuestion();
        }

        function loadQuestion() {
            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            const q = questions[currentQuestionIndex];
            document.getElementById('question-text').innerText = q.question;
            document.getElementById('question-tracker').innerText = `Câu ${currentQuestionIndex + 1} / ${questions.length}`;
            const optionsGrid = document.getElementById('options-grid');
            optionsGrid.innerHTML = ''; 
            const previousAnswer = savedData.answered[currentQuestionIndex];

            if (previousAnswer) {
                hasAnswered = true;
                q.options.forEach((optText, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn locked';
                    btn.innerText = optText;
                    if (index === q.correctIndex) btn.classList.add('correct');
                    else if (index === previousAnswer.selected) btn.classList.add('wrong');
                    optionsGrid.appendChild(btn);
                });
                showExplanation(q.explanation);
                document.getElementById('next-btn').style.display = 'block';
            } else {
                hasAnswered = false;
                q.options.forEach((optText, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = optText;
                    btn.onclick = () => checkAnswer(index, btn);
                    optionsGrid.appendChild(btn);
                });
            }
            document.getElementById('progress-fill').style.width = ((currentQuestionIndex + 1) / questions.length * 100) + '%';
        }

        function showExplanation(text) {
            const expBox = document.getElementById('explanation-box');
            expBox.innerHTML = text;
            expBox.style.display = 'block';
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (hasAnswered) return; 
            hasAnswered = true;
            const q = questions[currentQuestionIndex];
            const buttons = document.querySelectorAll('.option-btn');
            const isCorrect = (selectedIndex === q.correctIndex);

            savedData.answered[currentQuestionIndex] = { selected: selectedIndex, isCorrect: isCorrect };
            localStorage.setItem('lofiQuizProgress', JSON.stringify(savedData));
            
            buttons.forEach(btn => btn.classList.add('locked'));
            if (isCorrect) btnElement.classList.add('correct');
            else {
                btnElement.classList.add('wrong');
                buttons[q.correctIndex].classList.add('correct');
            }
            showExplanation(q.explanation);
            document.getElementById('next-btn').style.display = 'block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) loadQuestion();
            else initMenu();
        }

        window.onload = initMenu;
    </script>
</body>
</html>
